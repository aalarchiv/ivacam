          format: double
          type:
          - number
          - 'null'
        frame_shape:
          anyOf:
          - $ref: '#/components/schemas/FrameShape'
          - type: 'null'
          description: Pocket-Outside wrapper shape. Set only on ops created via the Pocket-Outside UX.
        pocket_insideout:
          default: false
          description: Cascade outward-in instead of inward-out.
          type: boolean
        pocket_islands:
          default: false
          description: Treat inner contours as islands (don't cut them).
          type: boolean
        pocket_nocontour:
          default: false
          description: Skip the wall-defining ring (contour cut).
          type: boolean
        xy_overlap:
          default: 0.0
          description: XY overlap between consecutive pocket cuts (0..1). Stored at 0.0 means "use the default".
          format: double
          type: number
      type: object
    PocketStrategy:
      oneOf:
      - enum:
        - cascade
        - zigzag
        - spiral
        type: string
      - properties:
          angle_deg:
            format: double
            type: number
          kind:
            enum:
            - zigzag
            type: string
        required:
        - kind
        type: object
      - properties:
          engagement_angle_deg:
            format: double
            type: number
          kind:
            enum:
            - trochoidal
            type: string
          loop_radius_factor:
            format: double
            type: number
        required:
        - engagement_angle_deg
        - kind
        - loop_radius_factor
        type: object
