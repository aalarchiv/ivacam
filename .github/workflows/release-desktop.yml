name: Release desktop bundles

# Triggered on a `v*` tag push (e.g. v0.1.0). Builds Tauri 2 bundles for
# Linux (.deb / .rpm / AppImage), macOS (.dmg / .app, optionally notarized),
# and Windows (.msi + NSIS .exe) in parallel, then attaches the artifacts
# to a GitHub Release.
#
# Windows code signing is done by SignPath Foundation (free OV cert for
# OSS) — see docs/SIGNING.md. The signing steps stay INERT until the repo
# variable SIGNPATH_ENABLED is set to 'true' (after SignPath approves the
# project). Until then the Windows installers are produced unsigned and
# kept as CI artifacts only — public Releases publish signed installers
# exclusively.
#
# Manual triggers (workflow_dispatch) build the bundles without a release
# so we can sanity-check the matrix against main.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Disable the local-dev sccache wrapper from .cargo/config.toml (not present
  # on runners — empty string overrides the config and calls rustc directly).
  RUSTC_WRAPPER: ""
  # Setting RUSTFLAGS shadows the per-target `-fuse-ld=lld` rustflags in
  # .cargo/config.toml, so the Linux build doesn't require lld on the runner.
  # (Unlike ci.yml, this workflow had no RUSTFLAGS, so lld would otherwise
  # apply.) Dependency warnings are capped by cargo, so -D warnings only gates
  # our own already-clean crates.
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - name: macos
            runner: macos-13
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - name: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
    steps:
      - uses: actions/checkout@v5

      # ── frontend prerequisites ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # ── rust toolchain pinned to match rust-toolchain.toml; bump both together ──
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./crates/ivac-tauri -> target"

      # ── Linux system libs ──
      - name: install linux deps
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libfreetype6-dev \
            patchelf

      # ── wasm-pack ──
      # `cargo tauri build` runs the frontend's beforeBuildCommand
      # (`pnpm build`), which runs scripts/ensure-wasm-fresh.mjs and rebuilds
      # the gitignored crates/ivac-wasm/pkg via wasm-pack. A fresh checkout
      # has no pkg, so wasm-pack must be present or the frontend build fails.
      # Cross-platform prebuilt install (the matrix includes Windows, where
      # the shell installer used in ci.yml won't run). wasm-pack adds the
      # wasm32-unknown-unknown target itself.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      # ── tauri-cli ──
      - name: install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      # ── build the bundle ──
      - name: tauri build
        working-directory: crates/ivac-tauri
        env:
          # macOS notarization (set in repo secrets if signing is desired):
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build ${{ matrix.platform.args }}

      - name: list artifacts
        shell: bash
        run: |
          find target -type f \( \
            -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
            -o -name "*.dmg" -o -name "*.app.tar.gz" \
            -o -name "*.msi" -o -name "*.exe" \
          \) -print

      # Linux + macOS bundles publish directly. Windows is handled by the
      # dedicated steps below so it can route through SignPath.
      - name: upload artifacts
        if: matrix.platform.name != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ivaCAM-${{ matrix.platform.name }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz

      # ── Windows: unsigned upload → SignPath → signed upload ──
      # The unsigned upload is ALWAYS produced: it's the input SignPath
      # signs (referenced by artifact-id), and it stays a CI artifact for
      # dev testing. It is excluded from public Releases (see release job).
      - name: upload unsigned Windows installers
        id: upload-unsigned-windows
        if: matrix.platform.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ivaCAM-windows-unsigned
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe

      # Submit to SignPath Foundation for Authenticode signing. Inert
      # until SIGNPATH_ENABLED=true and the SIGNPATH_* vars + token exist
      # (Settings → Secrets and variables → Actions). Obtain the org id /
      # slugs / API token from the SignPath web console after approval;
      # define an artifact configuration there that signs the .msi and
      # the NSIS .exe. See docs/SIGNING.md.
      - name: submit to SignPath for signing
        id: signpath
        if: matrix.platform.name == 'windows' && vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: upload signed Windows installers
        if: matrix.platform.name == 'windows' && vars.SIGNPATH_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ivaCAM-windows-signed
          path: signed/**/*

  release:
    name: draft pre-release
    needs: build
    runs-on: ubuntu-latest
    # !cancelled() + the tag guard: run after the build matrix concludes even
    # if one platform (e.g. macOS) failed or was unavailable — the others
    # still ship. NOT always(): always() also fires when the run is *cancelled*,
    # which once spawned a second draft when a macOS-blocked run was cancelled
    # mid-flight. !cancelled() ships on partial failure but stays out of the way
    # on cancellation. The release is a DRAFT pre-release for human review.
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: assemble release files + SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          # Windows: prefer the SignPath-signed set; fall back to unsigned.
          # Unsigned installers trip SmartScreen — acceptable for a draft
          # pre-release aimed at testers, never for a public stable release.
          if [ -d artifacts/ivaCAM-windows-signed ]; then
            win=artifacts/ivaCAM-windows-signed
          elif [ -d artifacts/ivaCAM-windows-unsigned ]; then
            win=artifacts/ivaCAM-windows-unsigned
            echo "::warning::Publishing UNSIGNED Windows installers (SignPath disabled) — draft pre-release only"
          else
            win=""
          fi

          # Flatten the shippable bundles from whichever platforms built.
          srcs=()
          for d in artifacts/ivaCAM-linux artifacts/ivaCAM-macos "$win"; do
            [ -n "$d" ] && [ -d "$d" ] && srcs+=("$d")
          done
          find "${srcs[@]}" -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
               -o -name '*.dmg' -o -name '*.app.tar.gz' \
               -o -name '*.msi' -o -name '*-setup.exe' \) \
            -exec cp -v {} release/ \;

          # Checksums over every shipped desktop artifact so downloads can be
          # verified (sha256sum -c SHA256SUMS.txt). The Android APK is built
          # out-of-band and its line is appended when it's uploaded.
          ( cd release && sha256sum * | tee SHA256SUMS.txt )
          echo "=== release/ ==="; ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          generate_release_notes: true
          files: release/*
