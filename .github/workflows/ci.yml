name: CI

on:
  # CI does not run on every push to main — only when a release tag is
  # pushed (the same `v*` trigger as release-desktop.yml, so a tag validates
  # and builds together). Pull requests still run the full suite, and
  # workflow_dispatch allows on-demand validation of main without tagging.
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # The checked-in .cargo/config.toml sets `rustc-wrapper = "sccache"` as a
  # local dev speed-up that fails loudly on machines without sccache — i.e.
  # every CI runner. Empty string overrides the config and calls rustc
  # directly. (The config's lld linker rustflags are already shadowed by the
  # RUSTFLAGS above — a set RUSTFLAGS replaces per-target config rustflags.)
  RUSTC_WRAPPER: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      # Pinned to match rust-toolchain.toml; bump both together.
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      # ivac-tauri is excluded from the lint/test matrix: it's the GUI shell,
      # so compiling it needs the frontend `dist/` (tauri::generate_context!
      # embeds it) plus the platform WebView dev libs (glib/gtk/webkit on
      # Linux). That full build is already validated on every tag by
      # release-desktop.yml on all three OSes — re-doing it here would be
      # redundant and force a frontend build + apt installs onto this fast
      # logic gate. Nothing else in the workspace depends on ivac-tauri.
      - run: cargo clippy --workspace --exclude ivac-tauri --all-targets -- -D warnings
      - run: cargo test --workspace --exclude ivac-tauri --all-features
      - name: schema drift guard
        run: cargo run -p xtask -- schema-check
      - name: version drift guard
        # tauri.conf.json's version must match [workspace.package].version
        # (single source of truth). Tauri can't resolve `version.workspace`,
        # so the config carries an explicit copy that bump-version.sh writes;
        # this fails the build if it drifts.
        run: cargo run -p xtask -- version-check

  wasm:
    name: wasm-pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to match rust-toolchain.toml; bump both together.
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build ivac-wasm (web target)
        run: wasm-pack build crates/ivac-wasm --target web --release

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      # `pnpm run build` runs scripts/ensure-wasm-fresh.mjs, which builds the
      # gitignored crates/ivac-wasm/pkg via wasm-pack. A fresh checkout has no
      # pkg, so the frontend job needs a Rust toolchain + wasm-pack to produce
      # it (matches the wasm-pack job's setup). Pinned to rust-toolchain.toml.
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: codegen drift guard
        # Re-run openapi-typescript against schema/openapi.yaml; the
        # checked-in generated.ts must not diff. Pairs with the
        # `cargo run -p xtask -- schema-check` step in the rust job —
        # together they enforce Rust → YAML → TypeScript stay in sync.
        run: |
          pnpm run codegen
          git diff --exit-code -- src/lib/api/generated.ts
      - name: i18n keys drift guard
        # Regenerate keys.ts from messages/en.json; the checked-in file must
        # not diff. Same pattern as the openapi codegen guard above — keeps
        # the typed MsgKey union in sync with the base catalog so every
        # t('…') call site stays type-checked.
        run: |
          pnpm run i18n:codegen
          git diff --exit-code -- src/lib/i18n/keys.ts
      - name: prettier
        run: pnpm run lint
      - name: type-check
        run: pnpm run check
      - name: test
        # Includes the i18n coverage gates (locale parity, no-empty,
        # placeholder parity, no-dead-keys, hardcoded-string guard) from
        # src/lib/i18n/coverage.test.ts. Project-file locale-invariance is
        # guarded by `cargo test` in the rust job.
        run: pnpm run test
      - name: build
        run: pnpm run build

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Run natively rather than via EmbarkStudios/cargo-deny-action: that
      # action runs in a musl container, and our rust-toolchain.toml pins
      # channel 1.88.0, so rustup tries to use an uninstalled musl toolchain
      # and `cargo metadata` fails before deny ever runs. On the gnu runner
      # with the pinned toolchain installed, the override resolves cleanly.
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check bans licenses sources advisories
