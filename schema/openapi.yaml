openapi: 3.0.3
info:
  title: wiaConstructor API
  version: 0.0.1
  description: |
    JSON contract for wiaConstructor core operations.
    Implementation-agnostic: served by the Stage-1 Python FastAPI bridge,
    the Rust axum server, Tauri command bindings, and the WASM browser
    bindings — same shape everywhere.
  license:
    name: GPL-3.0-or-later
servers:
- url: http://localhost:8765
  description: local Stage-1 FastAPI bridge
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: health
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /version:
    get:
      summary: Version + capabilities
      operationId: version
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /import:
    post:
      summary: Parse a vector file into wiaConstructor geometry
      operationId: import
      description: |
        Accepts the bytes of a DXF, SVG, HPGL, NGC, STL or other supported
        format and returns the flattened geometry: layers, segments
        (LINE/ARC primitives with bulge for arcs), bounding box, and unit
        scale.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                format:
                  type: string
                  description: Optional explicit format hint (dxf|svg|hpgl|ngc|stl). Inferred from filename otherwise.
      responses:
        '200':
          description: Parsed geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /generate:
    post:
      summary: Generate gcode + 3D toolpath preview from imported geometry
      operationId: generate
      description: |
        Stub for Stage-1; full setup-tree input lands in d0d follow-ups.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generated output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /text:
    post:
      summary: Render TTF text into geometry segments
      operationId: renderText
      description: |
        Tessellates a TTF/OTF font + a string into the project's standard
        Segment shape. Used by the Add-Text dialog. The response also
        carries a `single_line` flag derived by `is_single_line_font` so
        the dialog can warn when a filled-outline font is paired with the
        Engraving style.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderTextRequest'
      responses:
        '200':
          description: Rendered text geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTextResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /helix-radius:
    post:
      summary: Preview the auto-fit helix radius for a pocket selection
      operationId: computeHelixRadius
      description: |
        Runs the same inscribed-circle search the gcode generator does at
        run time, so the OpPropertiesPanel can display the detected radius
        (or a short fallback reason) before the user clicks Generate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HelixRadiusRequest'
      responses:
        '200':
          description: Detected helix radius or a fallback reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelixRadiusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  schemas:
    AutoFix:
      oneOf:
      - properties:
          kind:
            enum:
            - assign_tool
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested_tool_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        - suggested_tool_id
        type: object
      - properties:
          kind:
            enum:
            - lower_sim_resolution
            type: string
          suggested_cell_mm:
            format: double
            type: number
        required:
        - kind
        - suggested_cell_mm
        type: object
      - properties:
          kind:
            enum:
            - disable_op
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        type: object
      - properties:
          kind:
            enum:
            - change_profile_offset
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested:
            $ref: '#/components/schemas/ToolOffset'
        required:
        - kind
        - op_id
        - suggested
        type: object
    AxisLimits:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
        z:
          format: double
          type: number
      required:
      - x
      - y
      - z
      type: object
    BBox:
      properties:
        max_x:
          format: double
          type: number
        max_y:
          format: double
          type: number
        min_x:
          format: double
          type: number
        min_y:
          format: double
          type: number
      required:
      - max_x
      - max_y
      - min_x
      - min_y
      type: object
    Coolant:
      enum:
      - off
      - mist
      - flood
      type: string
    CutDirection:
      description: |-
        Climb vs conventional milling. Determines the path winding the generator emits — for a standard right-hand spindle:

        | context (cutter location) | conventional      | climb              | |---------------------------|-------------------|--------------------| | outer (cutter outside)    | CW (area < 0)     | CCW (area > 0)     | | inner (cutter in pocket)  | CCW (area > 0)    | CW (area < 0)      |

        "Conventional" is the safer default — most hobby and older mills don't have the rigidity / backlash takeup needed for clean climb cuts. Climb gives a better surface finish but requires a stiff machine. The finishing pass typically stays conventional regardless of the main strategy because the finish wall quality matters most.
      enum:
      - conventional
      - climb
      type: string
    DrillCycle:
      description: Drill-cycle picker for [`OperationKind::Drill`]. Mirrors the canned cycles G81 / G83 / G73 from the LinuxCNC / Fanuc dialect plus the dwell-at-bottom parameter PyCAM's `Drilling.py` exposes. Posts that don't support canned cycles fall back to a manual G0/G1 expansion of the same cycle (see `PostProcessor::drill_*` defaults).
      oneOf:
      - description: G81 — single plunge to depth, retract.
        properties:
          dwell_sec:
            default: 0.0
            description: Dwell at bottom in seconds before retract. 0 = no dwell.
            format: double
            type: number
          kind:
            enum:
            - simple
            type: string
        required:
        - kind
        type: object
      - description: G83 — peck with full retract to clearance plane between pecks.
        properties:
          dwell_sec:
            default: 0.0
            format: double
            type: number
          kind:
            enum:
            - peck
            type: string
          peck_step_mm:
            format: double
            type: number
        required:
        - kind
        - peck_step_mm
        type: object
      - description: G73 — peck with chip-break (small partial retract between pecks).
        properties:
          dwell_sec:
            default: 0.0
            format: double
            type: number
          kind:
            enum:
            - chip_break
            type: string
          peck_step_mm:
            format: double
            type: number
        required:
        - kind
        - peck_step_mm
        type: object
    Error:
      properties:
        details: true
        error:
          type: string
      required:
      - error
      type: object
    ErrorKind:
      enum:
      - bad_input
      - misconfigured
      - limit
      - unsupported
      - io
      - internal
      type: string
    Fixture:
      description: A user-declared physical obstacle on the stock the cutter must miss. Lives in stock-relative XY (same frame as the imported geometry) and occupies a Z range; the sim collision test gates on that range first then falls back to a per-shape XY swept-region check.
      properties:
        color:
          default: 4288696512
          description: Visual color in 2D / 3D previews, packed RGBA (0xRRGGBBAA).
          format: uint32
          minimum: 0.0
          type: integer
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/FixtureKind'
        name:
          type: string
        origin:
          description: Center of the fixture in stock XY (mm).
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type: array
        z_bottom:
          description: Z range the fixture occupies (relative to stock-top = 0). Typically `z_top` is positive (a clamp standing above stock); both can be negative for cleats below.
          format: double
          type: number
        z_top:
          format: double
          type: number
      required:
      - id
      - kind
      - name
      - origin
      - z_bottom
      - z_top
      type: object
    FixtureKind:
      oneOf:
      - description: Axis-aligned rectangle centered on `origin`.
        properties:
          depth:
            format: double
            type: number
          shape:
            enum:
            - box
            type: string
          width:
            format: double
            type: number
        required:
        - depth
        - shape
        - width
        type: object
      - description: Cylinder centered on `origin`.
        properties:
          radius:
            format: double
            type: number
          shape:
            enum:
            - cylinder
            type: string
        required:
        - radius
        - shape
        type: object
      - description: Polygon outline in fixture-local coordinates (origin-relative).
        properties:
          shape:
            enum:
            - polygon
            type: string
          vertices:
            items:
              items:
              - format: double
                type: number
              - format: double
                type: number
              maxItems: 2
              minItems: 2
              type: array
            type: array
        required:
        - shape
        - vertices
        type: object
    FrameShape:
      description: Shape of the synthetic frame built around a Pocket-Outside selection. Rectangle is a plain padded bbox; RoundedRectangle uses the same bbox with a quarter-arc bulge at each corner. Oval and TightOutline are explicit follow-ups — not in v1.
      enum:
      - rectangle
      - rounded_rectangle
      type: string
    GcodeIndex:
      description: 'Lookup table the frontend uses to wire the gcode text panel to the 3D toolpath: line N in the gcode corresponds to `segments[lines_to_segment[N]]`, and `segments_to_line[i]` is the 1-based gcode line that produced segment `i`. Both vectors are dense — gcode lines that don''t move the tool map to `usize::MAX` so callers can detect the gap.'
      properties:
        lines_to_segment:
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments_to_line:
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
      required:
      - lines_to_segment
      - segments_to_line
      type: object
    GenerateRequest:
      properties:
        post_processor:
          anyOf:
          - $ref: '#/components/schemas/PostProcessorKind'
          - type: 'null'
        project:
          allOf:
          - $ref: '#/components/schemas/Project'
          description: The full project — geometry + machine + tools + operations + tabs.
      required:
      - project
      type: object
    GenerateResponse:
      properties:
        gcode:
          type: string
        gcode_index:
          $ref: '#/components/schemas/GcodeIndex'
        regions:
          description: 'Filled-area preview for Pocket ops: the actual region the cutter will machine, computed via the per-op SourceCombine mode (Auto by default — outer + inner = annulus). The frontend paints these as translucent fills so the user sees what they''re cutting before reading the toolpath. Empty for non-Pocket ops.'
          items:
            $ref: '#/components/schemas/RegionPreview'
          type: array
        stats:
          $ref: '#/components/schemas/PipelineStats'
        time_estimate:
          allOf:
          - $ref: '#/components/schemas/TimeEstimate'
          description: Acceleration- and jerk-aware program-time estimate. See [`crate::sim::timing`] for the integrator. The total accounts for motion under the trapezoidal profile, tool-change time (`MachineConfig.toolchange_s` × number of M6s), and per-tool spindle pauses summed across used tools.
        toolpath:
          items:
            $ref: '#/components/schemas/ToolpathSegment'
          type: array
        warnings:
          description: Non-fatal warnings raised during planning — mostly tool-fit problems (cutter doesn't fit the geometry, kind mismatch, …). The frontend surfaces these in the operations list status badge and a sidebar list; the gcode is still emitted.
          items:
            $ref: '#/components/schemas/PipelineWarning'
          type: array
      required:
      - gcode
      - gcode_index
      - stats
      - time_estimate
      - toolpath
      type: object
    GenerateStats:
      properties:
        closed_object_count:
          format: uint
          minimum: 0.0
          type: integer
        object_count:
          format: uint
          minimum: 0.0
          type: integer
        offset_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - closed_object_count
      - object_count
      - offset_count
      type: object
    HealthResponse:
      properties:
        ok:
          type: boolean
      required:
      - ok
      type: object
    HelixRadiusRequest:
      description: Cross-transport request for the helix auto-fit preview. The frontend sends imported segments + the operation's selected object ids + the active tool diameter; the backend walks the same chaining/combine pipeline the gcode generator does and returns the largest inscribed circle that fits inside the resulting pocket boundary.
      properties:
        object_ids:
          description: Object ids from the import that should participate in the pocket boundary computation. Same shape as `OperationSource::Objects.ids`. Empty = "use all segments as one region".
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments:
          description: Source segments to derive the closed-pocket boundary from.
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        tool_diameter_mm:
          format: double
          type: number
      required:
      - object_ids
      - segments
      - tool_diameter_mm
      type: object
    HelixRadiusResponse:
      properties:
        fallback_reason:
          description: Short reason string when None (so the UI can show "Pocket too small for tool" instead of just an empty Auto state).
          type:
          - string
          - 'null'
        radius_mm:
          description: Some(r) when an inscribed circle fits; None when the auto path would fall back to Ramp/Direct.
          format: double
          type:
          - number
          - 'null'
      type: object
    HolderShape:
      description: Geometry of the tool holder above the shank. The holder is treated as cylindrically symmetric around the tool axis (Z), so set-screw flats / asymmetric ER nuts get approximated by their bounding cylinder/cone — good enough to flag clear collisions, conservative on tight cases.
      oneOf:
      - properties:
          diameter_mm:
            format: double
            type: number
          kind:
            enum:
            - cylinder
            type: string
          length_mm:
            format: double
            type: number
        required:
        - diameter_mm
        - kind
        - length_mm
        type: object
      - properties:
          bottom_diameter_mm:
            format: double
            type: number
          kind:
            enum:
            - cone
            type: string
          length_mm:
            format: double
            type: number
          top_diameter_mm:
            format: double
            type: number
        required:
        - bottom_diameter_mm
        - kind
        - length_mm
        - top_diameter_mm
        type: object
      - properties:
          cone_length_mm:
            format: double
            type: number
          cone_top_diameter_mm:
            format: double
            type: number
          cylinder_diameter_mm:
            format: double
            type: number
          cylinder_length_mm:
            format: double
            type: number
          kind:
            enum:
            - stepped
            type: string
        required:
        - cone_length_mm
        - cone_top_diameter_mm
        - cylinder_diameter_mm
        - cylinder_length_mm
        - kind
        type: object
    ImportResponse:
      properties:
        bbox:
          $ref: '#/components/schemas/BBox'
        filename:
          type: string
        format:
          type: string
        layers:
          items:
            $ref: '#/components/schemas/Layer'
          type: array
        object_meta:
          default: []
          description: Object metadata (closed flag, layer, color, bbox) keyed by the same 1-based id — `object_meta[id - 1]` is the entry for object `id`.
          items:
            $ref: '#/components/schemas/ImportedObject'
          type: array
        objects:
          default: []
          description: Per-segment object id from the chaining pass — `objects[i]` is the 1-based id of the chained object that consumed `segments[i]` (0 means "didn't chain into any object", e.g. an isolated point). The frontend uses this to do object-level selection in 2D.
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        unit_scale:
          format: double
          type: number
        warnings:
          items:
            type: string
          type: array
      required:
      - bbox
      - filename
      - format
      - layers
      - segments
      - unit_scale
      - warnings
      type: object
    ImportedObject:
      properties:
        bbox:
          $ref: '#/components/schemas/BBox'
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        id:
          format: uint32
          minimum: 0.0
          type: integer
        layer:
          type: string
      required:
      - bbox
      - closed
      - color
      - id
      - layer
      type: object
    Layer:
      properties:
        color:
          format: int32
          type: integer
        name:
          type: string
        segment_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - color
      - name
      - segment_count
      type: object
    LeadKind:
      enum:
      - off
      - straight
      - arc
      type: string
    LeadsConfig:
      properties:
        in:
          $ref: '#/components/schemas/LeadKind'
        in_lenght:
          description: 'Lead-in size. Interpreted by `LeadKind`: * `Straight`: straight-line LENGTH (mm) of the approach. * `Arc`: tangent roll-on arc RADIUS (mm). The arc sweeps a quarter turn from the approach point (radius away on the perpendicular) to the contour start, landing tangent to the first cut segment. * `Off`: ignored.'
          format: double
          type: number
        out:
          $ref: '#/components/schemas/LeadKind'
        out_lenght:
          description: Lead-out size. Same interpretation as `in_lenght` but applied at the END of the cut path (cutter rolls off the contour at Pn).
          format: double
          type: number
      required:
      - in
      - in_lenght
      - out
      - out_lenght
      type: object
    MachineConfig:
      properties:
        accel:
          anyOf:
          - $ref: '#/components/schemas/AxisLimits'
          - type: 'null'
          description: Per-axis acceleration in mm/s². When None the kinematic time estimator falls back to 250 mm/s² per axis (LinuxCNC default).
        arc_fit_tolerance_mm:
          description: Maximum deviation (mm) between the fitted G2/G3 arc and the original chord polyline. None ⇒ 0.01 mm. Only consulted when `arcs == true`.
          format: double
          type:
          - number
          - 'null'
        arcs:
          description: Whether the machine emits arc commands (G2/G3).
          type: boolean
        comments:
          type: boolean
        decimal_separator:
          description: Decimal separator for emitted numbers (rt1.36). `'.'` (default) suits LinuxCNC / GRBL / Mach3 and any controller configured in US locale. `','` covers European-locale Siemens / Heidenhain controllers that require `X1,5` instead of `X1.5`. Anything other than '.' / ',' silently falls back to '.'.
          maxLength: 1
          minLength: 1
          type: string
        jerk:
          anyOf:
          - $ref: '#/components/schemas/AxisLimits'
          - type: 'null'
          description: Per-axis jerk in mm/s³. None ⇒ trapezoidal-only profiling (S-curve refinement is Phase 2).
        line_number_start:
          description: Starting line number for `N<n>` prefixes (rt1.36). `None` (the default) emits unnumbered lines. `Some(10)` emits `N10`, `N20`, `N30`, … incrementing by 10. Required by some FANUC / vintage controllers; useful operator reference even on modern ones.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        mode:
          $ref: '#/components/schemas/MachineMode'
        plot_mode_z:
          description: 'Plot-mode Z (rt1.35 / Estlcam c_PP.Z_Up_Dn): when true, the pipeline collapses every cut to ONE pass at the op''s cut depth and skips the multi-step descent / ramp / helix machinery. Z values written into gcode are restricted to `fast_move_z` (pen up between cuts) and the op''s `depth` (pen down on cut moves). Right setting for laser / plasma / pen plotters / 3D-printer extrusion and drag-knife controllers.'
          type: boolean
        rapid_speed:
          description: Rapid (G0) traverse speed in mm/min. None ⇒ 5000 mm/min default.
          format: double
          type:
          - number
          - 'null'
        supports_toolchange:
          type: boolean
        toolchange_s:
          description: Tool-change time in seconds.
          format: double
          type: number
        unit:
          $ref: '#/components/schemas/UnitSystem'
        use_kinematic_time_estimate:
          description: When true (the default), use the accel/jerk-aware integrator. Set to false for the legacy length/feed-only estimator.
          type: boolean
      required:
      - arcs
      - comments
      - mode
      - supports_toolchange
      - unit
      type: object
    MachineMode:
      enum:
      - mill
      - laser
      - drag
      type: string
    MillConfig:
      properties:
        active:
          type: boolean
        corner_feed_reduction:
          default: 0.0
          description: When > 0, slow the feedrate at sharp line-to-line corners by this fraction so the machine doesn't dwell on the corner with high accel demand. 0.0 = no reduction (current behavior). 0.5 = half the feed at corners. Most useful for zigzag pocket fills with their many 180° turns.
          format: double
          type: number
        depth:
          format: double
          type: number
        depth_list:
          default: []
          description: Explicit ordered list of Z depths to cut at. When non-empty, overrides the step / finish_step / through_depth schedule.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          format: double
          type: number
        finish_step:
          default: null
          description: Optional smaller step for the FINAL Z pass (cleaner bottom finish). None = use `step` for every pass.
          format: double
          type:
          - number
          - 'null'
        helix_mode:
          type: boolean
        objectorder:
          $ref: '#/components/schemas/ObjectOrder'
        offset:
          $ref: '#/components/schemas/ToolOffset'
        overcut:
          default: false
          description: When true, dip into sharp inner corners so the cutter fully clears them. Mirrors viaConstructor's `mill.overcut`.
          type: boolean
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          default:
            kind: direct
          description: How the cutter descends into material at the start of each Z pass. `Direct` is a straight plunge; `Ramp` walks the first `ramp_length` of the path while linearly descending Z so the cutter takes a chip in both Z and XY simultaneously.
        reverse:
          type: boolean
        start_depth:
          format: double
          type: number
        step:
          description: Per-pass z step (negative ⇒ down).
          format: double
          type: number
        through_depth:
          default: 0.0
          description: Cut past `depth` by this many mm (positive). Used for through-cuts on edge-clamped sheet.
          format: double
          type: number
      required:
      - active
      - depth
      - fast_move_z
      - helix_mode
      - objectorder
      - offset
      - reverse
      - start_depth
      - step
      type: object
    MoveKind:
      enum:
      - rapid
      - cut
      - plunge
      - retract
      - arc
      type: string
    ObjectOrder:
      enum:
      - nearest
      - per_object
      - unordered
      type: string
    Operation:
      properties:
        enabled:
          type: boolean
        finish_tool_id:
          description: Optional finish tool id for dual-tool Pocket ops (rt1.33 / Estlcam TS slot). When `Some(id)` and `id != tool_id`, the pipeline emits a toolchange after the rough cascade and runs the wall-defining ring with the finish tool's geometry + finish-set feed/speed. When `None` or equal to `tool_id`, the op runs single-tool (current behavior).
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/OperationKind'
        name:
          type: string
        params:
          $ref: '#/components/schemas/OperationParams'
        pattern:
          anyOf:
          - $ref: '#/components/schemas/PatternConfig'
          - type: 'null'
          description: Optional pattern repetition. When set, the op runs once per pattern instance with the source geometry translated/rotated. See [`PatternConfig`] for the concrete pattern shapes.
        source:
          $ref: '#/components/schemas/OperationSource'
        tool_id:
          description: id of a `Project.tools` entry. For dual-tool Pocket ops this is the roughing tool; the finish ring is cut by `finish_tool_id`.
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - enabled
      - id
      - kind
      - name
      - params
      - source
      - tool_id
      type: object
    OperationKind:
      oneOf:
      - description: Contour cut — equivalent to today's "mill" with a parallel-offset pass at `offset` of the tool radius.
        properties:
          offset:
            $ref: '#/components/schemas/ToolOffset'
          type:
            enum:
            - profile
            type: string
        required:
        - offset
        - type
        type: object
      - description: Pocket fill — cascade of inward offsets, optionally zigzag.
        properties:
          strategy:
            $ref: '#/components/schemas/PocketStrategy'
          type:
            enum:
            - pocket
            type: string
        required:
        - strategy
        - type
        type: object
      - description: Drill cycle — point or circle smaller than tool. Carries a [`DrillCycle`] that picks G81 / G83 / G73 (or the manual G0/G1 fallback for posts that don't support canned cycles).
        properties:
          cycle:
            $ref: '#/components/schemas/DrillCycle'
          type:
            enum:
            - drill
            type: string
        required:
        - cycle
        - type
        type: object
      - description: Helical thread — single-point cutter walks a helix inside a bore (internal) or around a stud (external). Z descends linearly by `pitch_mm` per revolution between `start_depth` and `depth`. The source must be a closed circle (single Circle / closed Arc loop); the helix radius derives from the circle's radius plus tool radius for internal threads, or minus tool radius for external. (rt1.17)
        properties:
          climb:
            default: false
            description: Climb (CCW helix on a right-hand spindle) vs conventional (CW). Default conventional. Surface quality on hobby rigs almost always favors conventional even for threading.
            type: boolean
          internal:
            default: true
            description: '`true` = internal (tap-style, cutter walks INSIDE the bore); `false` = external (cutter walks AROUND a stud).'
            type: boolean
          pitch_mm:
            default: 1.0
            description: Thread pitch in mm — Z descent per full revolution. Positive; defaults to 1.0 mm (M6 fine).
            format: double
            type: number
          type:
            enum:
            - thread
            type: string
        required:
        - type
        type: object
      - description: 'V-bit edge break (rt1.18). The cutter walks the source path itself at a single Z computed from the bit''s cone angle and the desired chamfer width: `z = -width_mm / tan(tip_angle / 2)`. One pass at that depth carves a beveled edge whose horizontal width on the workpiece equals `width_mm`. Optionally followed by a second pass at the tool''s finish-set feed/speed for surface quality. Default values for the variant fields keep legacy payloads (`{ "type": "chamfer" }`) backward-compatible.'
        properties:
          finish_pass:
            default: false
            description: When `true`, the chamfer is cut twice — once at the rough feed (cleanup) and once at the tool's finish-set feed (rt1.27) for surface quality. Default `false`.
            type: boolean
          type:
            enum:
            - chamfer
            type: string
          width_mm:
            default: 1.0
            description: Horizontal width of the chamfer cut on the workpiece, mm. Mirrors Estlcam's Fasenabstand. Positive; defaults to 1.0.
            format: double
            type: number
        required:
        - type
        type: object
      - description: Tool-on engraving — no offset, follows the source path.
        properties:
          type:
            enum:
            - engrave
            type: string
        required:
        - type
        type: object
      - description: Drag-knife — emits trail-compensation moves.
        properties:
          type:
            enum:
            - drag_knife
            type: string
        required:
        - type
        type: object
      - description: Helical entry into a closed contour.
        properties:
          type:
            enum:
            - helix
            type: string
        required:
        - type
        type: object
      - description: 'V-Carve: drives a V-bit along the medial axis of a closed region, with depth varying per point so the V''s tip dips deepest where the region is widest. The depth at each point is `z = -R_inscribed / tan(tip_angle / 2)` for the inscribed-circle radius `R_inscribed` at that point of the medial axis.'
        properties:
          type:
            enum:
            - v_carve
            type: string
        required:
        - type
        type: object
    OperationParams:
      properties:
        approach_point:
          description: 'Anfahrpunkt (rt1.26 / Estlcam): user-picked XY where the cutter enters each pocket / closed-contour ring. Honored on Pocket / Profile ops with closed offsets. When `Some((x, y))`, each closed offset gets its segment list rotated so the start vertex is the segment vertex closest to the approach point — the plunge / lead-in then happens there instead of an arbitrary auto-picked point. `None` = auto.'
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type:
          - array
          - 'null'
        carve_max_width_mm:
          description: V-Carve cap on the inscribed-circle radius (mm). When set, any medial-axis point with `R_inscribed > carve_max_width_mm` clips to the cap — the V doesn't carve any wider than the bit's usable diameter. None = no cap (use the geometric inscribed circle directly).
          format: double
          type:
          - number
          - 'null'
        chamfer_after_width_mm:
          description: 'Stufenfase (rt1.20 / Estlcam Prog_KTD_Stufenfase): chamfer a drilled hole''s rim immediately after the drill cycle. Honored only on `OperationKind::Drill`. The post emits the drill cycle for each hole, then walks the cutter on a single revolution at the hole''s edge at z = -width / tan(tip_angle / 2). When `Operation.finish_tool_id` is set to a distinct tool, a M6 + G92 toolchange happens BEFORE the chamfer revolution so the user can chamfer with a V-bit / fly-cutter different from the drill. mm, positive only. None / 0 = no countersink.'
          format: double
          type:
          - number
          - 'null'
        corner_feed_reduction:
          description: When > 0, slow the feed at sharp corners by this fraction so the machine doesn't dwell on the corner with high accel demand. 0.0 = no reduction (current behavior). 0.5 = half the feed at corners. Most useful for zigzag pocket fills with their many 180° turns.
          format: double
          type: number
        cut_direction:
          allOf:
          - $ref: '#/components/schemas/CutDirection'
          description: 'Cut direction for the main (roughing) passes. Default: Conventional. See [`CutDirection`] for the winding rules.'
        depth:
          description: Final cut depth (negative number — a depth, not a height).
          format: double
          type: number
        depth_list:
          description: Explicit list of Z depths for each pass, overriding the step+finish_step schedule. Useful for non-linear schedules (shallower at start for tough material, deeper later, slow finish at the end). Each entry is an absolute Z (negative number); the cutter visits them in order. Empty = use the step-down loop.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          description: Z for rapid moves between cuts.
          format: double
          type: number
        feed_rate_override:
          description: 'Override the tool''s `feed_rate` for this op only. Some materials or finishing passes need a slower feed than the tool''s default; rather than editing the tool library, set this per-op. None = use the tool''s `feed_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        finish_cut_direction:
          allOf:
          - $ref: '#/components/schemas/CutDirection'
          description: 'Cut direction for the finishing pass — the offset that defines the wall surface (Pocket level=0 ring; Profile single-pass cut). Default: Conventional, regardless of the main `cut_direction`. Surface quality on the finish wall is almost always best with conventional milling on hobby machines.'
        finish_step:
          description: Optional smaller step for the FINAL Z pass, for a cleaner bottom finish. None = use the same `step` for the last pass too. Negative just like `step`.
          format: double
          type:
          - number
          - 'null'
        finish_xy_allowance_mm:
          description: XY stock allowance left UNCUT by the roughing pass, removed by a dedicated finish pass walking the actual boundary (rt1.24 / Estlcam Schlichtzugabe). Honored on Pocket ops only — the roughing cascade insets the cutter centerline by `tool_radius + allowance`, then a wall-defining ring at `tool_radius` runs at the tool's finish-set feed/speed (rt1.27). None / 0 = no allowance (current behavior). mm, positive only.
          format: double
          type:
          - number
          - 'null'
        frame_corner_radius_mm:
          description: Corner radius for `FrameShape::RoundedRectangle`. None ⇒ defaults to `frame_padding_mm` inside the frame builder.
          format: double
          type:
          - number
          - 'null'
        frame_padding_mm:
          description: Padding added on every side of the selection bbox to size the frame. Honored only when `frame_shape` is set.
          format: double
          type:
          - number
          - 'null'
        frame_shape:
          anyOf:
          - $ref: '#/components/schemas/FrameShape'
          - type: 'null'
          description: 'Pocket-Outside wrapper: shape of the synthetic frame the pipeline auto-prepends around `source` before pocketing. Set only on ops created via the Pocket-Outside UX. None = no frame (regular Pocket).'
        helix:
          default: false
          description: Helical descent inside a closed contour.
          type: boolean
        leads:
          allOf:
          - $ref: '#/components/schemas/LeadsConfig'
          default:
            in: off
            in_lenght: 5.0
            out: off
            out_lenght: 5.0
          description: Lead-in / lead-out shape for this op.
        multi_pass_refine:
          default: false
          description: V-Carve "second-pass" toggle. When true, the emitter runs a refinement pass that re-cuts only the points whose first pass fell short of the geometric target depth. Off by default.
          type: boolean
        objectorder:
          allOf:
          - $ref: '#/components/schemas/ObjectOrder'
          default: nearest
          description: Cut-order strategy for multiple objects.
        overcut:
          default: false
          description: Dip into sharp inner corners so the cutter clears the geometric corner. Only meaningful for Profile ops with non-zero offset.
          type: boolean
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          description: How the cutter descends into material at the start of each Z pass. Default Direct (straight plunge). Ramp { angle_deg } walks forward along the path while descending Z, taking a chip in both directions simultaneously — required for non-center-cutting bits and for harder materials.
        plunge_rate_override:
          description: 'Override the tool''s `plunge_rate` (Z feed) for this op. Useful for slowing the plunge on hard materials without changing the XY feed. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        pocket_insideout:
          default: false
          type: boolean
        pocket_islands:
          default: false
          type: boolean
        pocket_nocontour:
          default: false
          type: boolean
        reverse:
          default: false
          description: Reverse the cut direction (climb ↔ conventional).
          type: boolean
        start_depth:
          description: Z at which the first pass starts.
          format: double
          type: number
        step:
          description: Per-pass step (negative ⇒ down). None = inherit from `ToolEntry.default_step`. Legacy projects wrote a bare `0.0` to mean "unset"; the deserializer maps that to None.
          format: double
          type:
          - number
          - 'null'
        tabs:
          allOf:
          - $ref: '#/components/schemas/TabsConfig'
          default:
            active: false
            height: 1.0
            tab_type: rectangle
            width: 10.0
          description: Per-op tabs config. The Project's `tabs` map carries the actual placement points; this controls width / height / type.
        through_depth:
          description: Cut past the nominal `depth` by this much (positive number — gets subtracted from the working depth). Useful for through-cuts on edge-clamped sheet so the cutter clears the bottom even with minor stock thickness variation. 0.0 = no extension.
          format: double
          type: number
        xy_overlap:
          default: 0.0
          description: XY overlap between consecutive pocket cuts, as a fraction in (0, 1). Drives the cascade step (= tool_diameter * (1 - overlap)) and the zigzag stride. 0.5 = 50% overlap = 50% stepover, a conservative default that fills tight pockets cleanly. Higher overlap = smaller step = more rings, slower cut, better finish. Lower overlap = bigger step = fewer rings, faster cut, may leave stripes. Honored only for Pocket ops; ignored elsewhere. Stored at 0.0 means "use the default" so old payloads still work.
          format: double
          type: number
      required:
      - depth
      - fast_move_z
      - start_depth
      type: object
    OperationSource:
      oneOf:
      - description: Run on every chain on the listed layer names.
        properties:
          combine:
            $ref: '#/components/schemas/SourceCombine'
          kind:
            enum:
            - layers
            type: string
          layers:
            items:
              type: string
            type: array
        required:
        - kind
        - layers
        type: object
      - description: Run on the listed chain ids only.
        properties:
          combine:
            $ref: '#/components/schemas/SourceCombine'
          ids:
            items:
              format: uint32
              minimum: 0.0
              type: integer
            type: array
          kind:
            enum:
            - objects
            type: string
        required:
        - ids
        - kind
        type: object
      - description: Run on every chained object in the project.
        properties:
          kind:
            enum:
            - all
            type: string
        required:
        - kind
        type: object
    PatternConfig:
      description: |-
        Pattern repetition for an [`Operation`]. When attached, the pipeline expands the op into N instances by translating (or rotating) the source geometry per instance — useful for "drill the same hole pattern N times" or "pocket N copies of the same shape on a grid".

        The original geometry stays at the (0, 0) translation / 0° rotation instance so a single-instance pattern is identical to no pattern at all.
      oneOf:
      - description: 1D linear array. `count` instances total (including the original at offset (0, 0)). Each instance i is translated by (i*dx, i*dy).
        properties:
          count:
            format: uint32
            minimum: 0.0
            type: integer
          dx:
            format: double
            type: number
          dy:
            format: double
            type: number
          kind:
            enum:
            - linear
            type: string
        required:
        - count
        - dx
        - dy
        - kind
        type: object
      - description: 2D rectangular grid. `count_x × count_y` instances total. Instance (i, j) is translated by (i*dx, j*dy).
        properties:
          count_x:
            format: uint32
            minimum: 0.0
            type: integer
          count_y:
            format: uint32
            minimum: 0.0
            type: integer
          dx:
            format: double
            type: number
          dy:
            format: double
            type: number
          kind:
            enum:
            - grid
            type: string
        required:
        - count_x
        - count_y
        - dx
        - dy
        - kind
        type: object
      - description: Polar (rotational) array. `count` instances around (`center_x`, `center_y`), with `angle_step_deg` between consecutive instances. Instance i is rotated by i * angle_step_deg about that center.
        properties:
          angle_step_deg:
            format: double
            type: number
          center_x:
            format: double
            type: number
          center_y:
            format: double
            type: number
          count:
            format: uint32
            minimum: 0.0
            type: integer
          kind:
            enum:
            - polar
            type: string
        required:
        - angle_step_deg
        - center_x
        - center_y
        - count
        - kind
        type: object
    PipelineStats:
      properties:
        closed_object_count:
          format: uint
          minimum: 0.0
          type: integer
        object_count:
          format: uint
          minimum: 0.0
          type: integer
        offset_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - closed_object_count
      - object_count
      - offset_count
      type: object
    PipelineWarning:
      description: One non-fatal warning attached to (optionally) a specific op.
      properties:
        kind:
          description: Stable identifier — frontend can branch on this to render an icon, link to docs, etc.
          type: string
        message:
          description: Human-readable description.
          type: string
        op_id:
          description: Op the warning applies to. `None` means project-wide.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
      required:
      - kind
      - message
      type: object
    PlungeStrategy:
      description: Per-pass entry strategy.
      oneOf:
      - description: Straight plunge — current behavior. Safe for end mills with center-cutting geometry on shallow steps; risky on harder materials or non-center-cutting bits.
        properties:
          kind:
            enum:
            - direct
            type: string
        required:
        - kind
        type: object
      - description: 'Linear ramp into the first cut: descend Z at `angle_deg` from the previous Z to the current pass Z while walking forward along the path. The horizontal distance traveled during the ramp is `step / tan(angle_deg)`. Falls back to Direct if the path is shorter than the required ramp.'
        properties:
          angle_deg:
            format: double
            type: number
          kind:
            enum:
            - ramp
            type: string
        required:
        - angle_deg
        - kind
        type: object
      - description: 'Helical descent: spiral down on a circle of `radius_mm` around a point inside the closed pocket boundary, descending Z at `angle_deg` per revolution. `radius_mm = None` ⇒ auto-fit to the largest inscribed circle inside the pocket boundary at gcode-emission time. Falls back to Ramp (and then Direct) when the helix circle can''t fit.'
        properties:
          angle_deg:
            format: double
            type: number
          kind:
            enum:
            - helix
            type: string
          radius_mm:
            format: double
            type:
            - number
            - 'null'
        required:
        - angle_deg
        - kind
        type: object
    PocketConfig:
      properties:
        active:
          type: boolean
        insideout:
          type: boolean
        islands:
          type: boolean
        nocontour:
          description: Skip the boundary contour pass (used by HATCH-equivalent layers).
          type: boolean
        zigzag:
          type: boolean
      required:
      - active
      - insideout
      - islands
      - nocontour
      - zigzag
      type: object
    PocketStrategy:
      oneOf:
      - enum:
        - cascade
        - zigzag
        - spiral
        type: string
      - properties:
          engagement_angle_deg:
            format: double
            type: number
          kind:
            enum:
            - trochoidal
            type: string
          loop_radius_factor:
            format: double
            type: number
        required:
        - engagement_angle_deg
        - kind
        - loop_radius_factor
        type: object
      - properties:
          kind:
            enum:
            - halfpipe
            type: string
          profile:
            oneOf:
            - properties:
                kind:
                  enum:
                  - circular_arc
                  type: string
                radius_mm:
                  format: double
                  type: number
              required:
              - kind
              - radius_mm
              type: object
            - properties:
                included_angle_deg:
                  format: double
                  type: number
                kind:
                  enum:
                  - v_bottom
                  type: string
              required:
              - included_angle_deg
              - kind
              type: object
        required:
        - kind
        - profile
        type: object
    Point2:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
      required:
      - x
      - y
      type: object
    PolylineOffset:
      description: One concentric offset of a closed object — used for both the boundary pass and any inward pocket cascade rings.
      properties:
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        is_finish:
          description: When true, the gcode emitter swaps in the finish-set feed / speed / plunge rates (`ToolConfig::*_finish`) before cutting this offset. The pipeline tags the wall-defining level=0 ring of a Pocket op as finish; everything else stays at the rough rates.
          type: boolean
        is_pocket:
          description: 0 = boundary, 1 = zigzag fill stroke, 2 = pocket ring.
          format: uint8
          minimum: 0.0
          type: integer
        layer:
          type: string
        level:
          description: 0 = outer boundary, 1+ = pocket cascade inward.
          format: uint32
          minimum: 0.0
          type: integer
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        source_object_idx:
          format: uint
          minimum: 0.0
          type: integer
        tabs:
          description: Tab positions (data-space XY) the cutter should lift over while cutting this offset. Frontend places these via mtm.10; the gcode emitter splits the cut at each crossing and lifts Z to tabs.height.
          items:
            $ref: '#/components/schemas/TabPoint'
          type: array
      required:
      - closed
      - color
      - is_pocket
      - layer
      - level
      - segments
      - source_object_idx
      type: object
    Pose3:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
        z:
          format: double
          type: number
      required:
      - x
      - y
      - z
      type: object
    PostProcessorKind:
      enum:
      - linuxcnc
      - grbl
      - hpgl
      type: string
    Project:
      properties:
        fixtures:
          description: 'Fixtures (clamps, dogs, vise jaws, hold-downs) the cutter must avoid throughout the entire program — including rapids. The sim pass tests every toolpath segment against this set and emits `SimWarning::FixtureCollision` on overlap. Default empty: a project with no fixtures behaves exactly as before.'
          items:
            $ref: '#/components/schemas/Fixture'
          type: array
        machine:
          $ref: '#/components/schemas/MachineConfig'
        operations:
          items:
            $ref: '#/components/schemas/Operation'
          type: array
        segments:
          description: Imported geometry — the same `segments` the existing pipeline consumes. We keep it inline rather than referencing it by id so the project file is self-contained.
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        tabs:
          additionalProperties:
            items:
              $ref: '#/components/schemas/TabPoint'
            type: array
          description: Tab placements keyed by imported-segment index. Same shape as the legacy PipelineRequest.tabs.
          type: object
        tools:
          items:
            $ref: '#/components/schemas/ToolEntry'
          type: array
      required:
      - machine
      - operations
      - segments
      - tools
      type: object
    RegionPreview:
      description: One filled region attached to a specific operation. `outer` is the outer boundary; `holes` are the islands the cutter must avoid. Both in project units (typically mm).
      properties:
        holes:
          items:
            items:
              $ref: '#/components/schemas/Point2'
            type: array
          type: array
        op_id:
          format: uint32
          minimum: 0.0
          type: integer
        outer:
          items:
            $ref: '#/components/schemas/Point2'
          type: array
      required:
      - op_id
      - outer
      type: object
    RenderTextRequest:
      description: Request payload for the cross-transport `/text` endpoint. The frontend hands us TTF bytes (uploaded by the user or pulled from `frontend/public/fonts/`) plus a string + placement parameters; we return flattened [`Segment`]s and a single-line / outline classification the dialog uses to drive the engraving warning chip.
      properties:
        color:
          default: 7
          format: int32
          type: integer
        font_bytes:
          description: The font file as bytes (TTF / OTF). Encoded as a JSON `Vec<u8>` (i.e. an array of byte values) so the contract works equally well over HTTP/Tauri/WASM without picking a base64 layer.
          items:
            format: uint8
            minimum: 0.0
            type: integer
          type: array
        height_mm:
          format: double
          type: number
        layer:
          default: TEXT
          type: string
        origin:
          $ref: '#/components/schemas/Point2'
        text:
          type: string
      required:
      - font_bytes
      - height_mm
      - origin
      - text
      type: object
    RenderTextResponse:
      description: Response payload — the rendered geometry plus metadata the dialog uses to warn the user when an outline font is paired with the Engraving style.
      properties:
        family_name:
          description: Family / style names (best-effort). Useful for showing what the user actually loaded next to the dropdown.
          type:
          - string
          - 'null'
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        single_line:
          description: True if the font is a single-line / engraving / Hershey-port style font. Drives the dialog's "use a single-line font" chip.
          type: boolean
      required:
      - segments
      - single_line
      type: object
    Segment:
      description: A flat LINE/ARC primitive. ARC geometry is encoded as the bulge between `start` and `end` (bulge = `tan(included_angle / 4)`).
      properties:
        bulge:
          default: 0.0
          format: double
          type: number
        center:
          anyOf:
          - $ref: '#/components/schemas/Point2'
          - type: 'null'
        color:
          default: 7
          format: int32
          type: integer
        end:
          $ref: '#/components/schemas/Point2'
        layer:
          default: '0'
          type: string
        start:
          $ref: '#/components/schemas/Point2'
        type:
          $ref: '#/components/schemas/SegmentKind'
      required:
      - end
      - start
      - type
      type: object
    SegmentKind:
      enum:
      - LINE
      - ARC
      - CIRCLE
      - POINT
      type: string
    Setup:
      properties:
        leads:
          $ref: '#/components/schemas/LeadsConfig'
        machine:
          $ref: '#/components/schemas/MachineConfig'
        mill:
          $ref: '#/components/schemas/MillConfig'
        pockets:
          $ref: '#/components/schemas/PocketConfig'
        tabs:
          $ref: '#/components/schemas/TabsConfig'
        tool:
          $ref: '#/components/schemas/ToolConfig'
      required:
      - leads
      - machine
      - mill
      - pockets
      - tabs
      - tool
      type: object
    SimDiagnostics:
      properties:
        warnings:
          items:
            $ref: '#/components/schemas/SimWarning'
          type: array
      required:
      - warnings
      type: object
    SimSeverity:
      enum:
      - critical
      - warning
      - info
      type: string
    SimWarning:
      oneOf:
      - properties:
          kind:
            enum:
            - rapid_through_material
            type: string
          rapid_pz:
            format: double
            type: number
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
          worst_cell_z:
            format: float
            type: number
          worst_x:
            format: double
            type: number
          worst_y:
            format: double
            type: number
        required:
        - kind
        - rapid_pz
        - segment_idx
        - worst_cell_z
        - worst_x
        - worst_y
        type: object
      - properties:
          fixture_id:
            format: uint32
            minimum: 0.0
            type: integer
          kind:
            enum:
            - fixture_collision
            type: string
          nearest_x:
            format: double
            type: number
          nearest_y:
            format: double
            type: number
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
        required:
        - fixture_id
        - kind
        - nearest_x
        - nearest_y
        - segment_idx
        type: object
      - properties:
          kind:
            enum:
            - holder_collision
            type: string
          required_clearance_mm:
            format: float
            type: number
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
          wall_z:
            format: float
            type: number
          worst_x:
            format: double
            type: number
          worst_y:
            format: double
            type: number
        required:
        - kind
        - required_clearance_mm
        - segment_idx
        - wall_z
        - worst_x
        - worst_y
        type: object
      - properties:
          engagement_pct:
            format: float
            type: number
          kind:
            enum:
            - engagement_overload
            type: string
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
        required:
        - engagement_pct
        - kind
        - segment_idx
        type: object
      - properties:
          count:
            format: uint
            minimum: 0.0
            type: integer
          first_segment_idx:
            format: uint
            minimum: 0.0
            type: integer
          kind:
            enum:
            - dragging_rapids
            type: string
        required:
        - count
        - first_segment_idx
        - kind
        type: object
    SourceCombine:
      description: How a multi-object source selection is combined into the region(s) the operation actually consumes. Default is `Auto` — containment-based, which gives the user "outer + inner = annulus" behavior with no extra thought. The other modes are clipper2-driven boolean ops; `None` keeps each selected object as its own boundary (the pre-combine behavior, surfaced for callers who really want it).
      oneOf:
      - description: 'Containment-aware: nested closed objects in the selection become islands of their outermost selected ancestor. Equivalent to today''s pipeline-level behavior (see pipeline.rs''s selected_set logic).'
        enum:
        - auto
        type: string
      - description: Boolean union of all selected closed polygons.
        enum:
        - union
        type: string
      - description: First selected polygon minus the union of the rest.
        enum:
        - difference
        type: string
      - description: Boolean intersection of all selected closed polygons.
        enum:
        - intersection
        type: string
      - description: Symmetric difference (xor) of all selected closed polygons.
        enum:
        - xor
        type: string
      - description: No combination — emit one boundary per selected object as-is. This is the pre-j7y behavior, kept for callers who explicitly want it.
        enum:
        - none
        type: string
    SourceSpan:
      properties:
        column:
          format: uint32
          minimum: 0.0
          type: integer
        file:
          type: string
        line:
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - column
      - file
      - line
      type: object
    TabPoint:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
      required:
      - x
      - y
      type: object
    TabType:
      enum:
      - rectangle
      - ramp
      type: string
    TabsConfig:
      properties:
        active:
          type: boolean
        height:
          description: Z height the cutter lifts to over a tab (positive distance above the cut floor). The actual tab Z is `mill.depth + tabs.height`.
          format: double
          type: number
        ramp_angle_deg:
          description: Ramp angle in degrees, used only when `tab_type == Ramp`. The horizontal length of each ramp into / out of a tab is `tabs.height / tan(ramp_angle_deg)`. 30° gives a 1:√3 slope. Ignored for Rectangle tabs.
          format: double
          type: number
        tab_type:
          $ref: '#/components/schemas/TabType'
        width:
          format: double
          type: number
      required:
      - active
      - height
      - tab_type
      - width
      type: object
    TimeEstimate:
      properties:
        arc_s:
          format: double
          type: number
        cut_s:
          format: double
          type: number
        plunge_s:
          format: double
          type: number
        rapid_s:
          format: double
          type: number
        retract_s:
          format: double
          type: number
        spindle_warmup_s:
          format: double
          type: number
        toolchange_s:
          format: double
          type: number
        total_s:
          format: double
          type: number
      required:
      - arc_s
      - cut_s
      - plunge_s
      - rapid_s
      - retract_s
      - spindle_warmup_s
      - toolchange_s
      - total_s
      type: object
    ToolConfig:
      properties:
        diameter:
          format: double
          type: number
        dragoff:
          description: Drag-knife offset (if present, otherwise None).
          format: double
          type:
          - number
          - 'null'
        flood:
          type: boolean
        mist:
          type: boolean
        number:
          format: uint32
          minimum: 0.0
          type: integer
        pause:
          description: Spindle warm-up pause in seconds.
          format: uint32
          minimum: 0.0
          type: integer
        pierce_sec:
          default: 0.0
          description: Laser pierce time (rt1.29) — seconds to dwell after laser-on before each plunge so the beam burns through stock. Resolved from `ToolEntry.laser_pierce_sec` at synth time; 0 = no pierce dwell.
          format: double
          type: number
        rate_h:
          description: Cutting feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        rate_h_finish:
          default: 0
          description: Resolved cutting feedrate for the finishing pass. mm/min.
          format: uint32
          minimum: 0.0
          type: integer
        rate_v:
          description: Plunge feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        rate_v_finish:
          default: 0
          description: Resolved plunge feedrate for the finishing pass. mm/min.
          format: uint32
          minimum: 0.0
          type: integer
        speed:
          format: uint32
          minimum: 0.0
          type: integer
        speed_finish:
          default: 0
          description: Resolved RPM for the finishing pass. Equal to `speed` unless the tool library carried a `speed_finish` override. The gcode emitter switches to these on level=0 rings of a Pocket op.
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - diameter
      - flood
      - mist
      - number
      - pause
      - rate_h
      - rate_v
      - speed
      type: object
    ToolEntry:
      properties:
        coolant:
          $ref: '#/components/schemas/Coolant'
        corner_radius_mm:
          description: Bull-nose / radius-endmill corner radius (rt1.28). Honored only when `kind == BullNose`. The corner radius produces a fillet on the cut floor edge — relevant for sim cross-section (the sim envelope falls below `corner_radius_mm` of the nominal flat floor). mm, positive only.
          format: double
          type:
          - number
          - 'null'
        default_peck_step_mm:
          description: Default peck step (positive, mm) for `DrillCycle::Peck` / `ChipBreak` ops that don't set their own `peck_step_mm`. None = the op must specify its own.
          format: double
          type:
          - number
          - 'null'
        default_step:
          description: Default depth-per-pass (negative, mm). Operations using this tool inherit this when their own `step` is unset. None = no default.
          format: double
          type:
          - number
          - 'null'
        diameter:
          format: double
          type: number
        dragoff:
          description: Drag-knife trailing offset (None for everything else).
          format: double
          type:
          - number
          - 'null'
        feed_rate:
          description: Cutting feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        feed_rate_drill:
          description: 'Cutting feedrate override when this tool is used in a Drill op. None = inherit `feed_rate`. Units: mm/min. Only meaningful for posts that emit XY-traverse feed lines between drill points.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        feed_rate_finish:
          description: 'Cutting feedrate override for the finishing pass. None = inherit `feed_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        flute_length_mm:
          description: Length of cutting flutes (mm). None = treat entire tool as cutting.
          format: double
          type:
          - number
          - 'null'
        flutes:
          format: uint8
          minimum: 0.0
          type: integer
        holder:
          anyOf:
          - $ref: '#/components/schemas/HolderShape'
          - type: 'null'
          description: Holder geometry above the shank. None = no holder check.
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/ToolKind'
        laser_lead_in_mm:
          description: 'Laser lead-in distance (rt1.29 / Estlcam T_Lead_In): mm of approach travel the head takes along the entry tangent before the cut starts, to reduce edge entry burn. Honored only when `kind == LaserBeam`. Wired into `LeadsConfig` at op synth time — the per-op lead-in field overrides this if set explicitly. None = no tool-level lead-in.'
          format: double
          type:
          - number
          - 'null'
        laser_pierce_sec:
          description: 'Laser pierce time (rt1.29 / Estlcam T_Pierce_Time): seconds the beam dwells at the start point BEFORE the cut begins so it burns through thick stock. Honored only when `kind == LaserBeam`. The post emits a `G4 P<seconds>` after the laser-on before each plunge. None = no pierce dwell.'
          format: double
          type:
          - number
          - 'null'
        name:
          type: string
        pause:
          description: Spindle warm-up pause in seconds applied once per used tool by the time estimator. Mirrors `ToolConfig.pause`.
          format: uint32
          minimum: 0.0
          type: integer
        plunge_rate:
          description: Plunge feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        plunge_rate_drill:
          description: 'Plunge feedrate override when this tool is used in a Drill op. None = inherit `plunge_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        plunge_rate_finish:
          description: 'Plunge feedrate override for the finishing pass. None = inherit `plunge_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        shank_diameter_mm:
          description: Shank diameter (mm). None = same as `diameter` (parallel-shank bit).
          format: double
          type:
          - number
          - 'null'
        speed:
          format: uint32
          minimum: 0.0
          type: integer
        speed_drill:
          description: Spindle RPM override when this tool is used in a Drill op. None = inherit `speed`.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        speed_finish:
          description: Spindle RPM override for the finishing pass (the wall-defining level=0 ring of a Pocket). None = inherit `speed`. Hard-material finish quality usually wants a slower RPM than roughing.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        tip_angle_deg:
          default: 60.0
          description: V-bit full included tip angle in degrees (apex angle of the cone). Drives the V-Carve depth-from-width relationship `z = -R / tan(tip_angle / 2)`. Validated to (0, 180); defaults to 60° for the most common engraving V-bit.
          format: double
          type: number
        tip_diameter:
          description: V-bit tip diameter (None for endmill / ball nose / drag knife).
          format: double
          type:
          - number
          - 'null'
        tslot_neck_diameter_mm:
          description: T-slot / keyway cutter neck diameter (rt1.28). Honored only when `kind == TSlot`. The undercut cutter has a wide disk (`diameter`) at the tip and a narrow neck of this diameter above. mm, positive only.
          format: double
          type:
          - number
          - 'null'
        tslot_neck_length_mm:
          description: T-slot / keyway cutter neck length (rt1.28). Honored only when `kind == TSlot`. The vertical extent of the narrow neck above the disk. mm, positive only.
          format: double
          type:
          - number
          - 'null'
        z_shift_mm:
          description: Per-tool Z origin offset (rt1.30 / Estlcam Z_Shift). For machines without automatic tool-length probing — the user pre-measures each tool's tip Z relative to a reference tool and records the delta here (positive = sticks out further; negative = shorter). At toolchange / program-start the post emits a `G92 Z<shift>` that pins the new tool's tip at the same work-Z the reference tool used. mm. None = no shift.
          format: double
          type:
          - number
          - 'null'
      required:
      - coolant
      - diameter
      - feed_rate
      - flutes
      - id
      - kind
      - name
      - plunge_rate
      - speed
      type: object
    ToolKind:
      oneOf:
      - enum:
        - endmill
        - ball_nose
        - v_bit
        - engraver
        - drag_knife
        - drill
        type: string
      - description: Used for laser cutting / etching — no physical tool radius.
        enum:
        - laser_beam
        type: string
      - description: 'Bull-nose / radius-corner endmill (rt1.28): flat endmill with a rounded transition between the cylindrical wall and the flat floor. Cuts a fillet on the floor edge. `ToolEntry.corner_radius_mm` carries the radius.'
        enum:
        - bull_nose
        type: string
      - description: Compression / up-down spiral endmill (rt1.28 / Estlcam Obenunten). Cuts down on top half, up on bottom half — clean edges on both faces of sheet material. v1 treats it like an Endmill at the cutting algorithm; the variant is here so the tool library can label it accurately for the user.
        enum:
        - compression
        type: string
      - description: 'T-slot / keyway / undercut cutter (rt1.28): plunges vertically down a narrow neck, then a wider disk at the tip cuts the undercut slot. `ToolEntry.tslot_neck_diameter_mm` / `tslot_neck_length_mm` carry the neck geometry.'
        enum:
        - t_slot
        type: string
      - description: 'Form / profile cutter (rt1.28 / Estlcam Profil): bull-nose / cove / ogee / dovetail / custom — a profile bit with a fixed cross-section. v1 treats as an Endmill at the algorithm; the variant labels it.'
        enum:
        - form_profile
        type: string
    ToolOffset:
      enum:
      - none
      - outside
      - inside
      - on
      type: string
    ToolpathSegment:
      properties:
        from:
          $ref: '#/components/schemas/Pose3'
        gcode_line:
          default: 0
          description: 1-based line number in the source gcode that produced this move. 0 means "synthetic / unknown".
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/MoveKind'
        op_id:
          default: 0
          description: Operation id from the per-op emitter. 0 = legacy / unstamped.
          format: uint32
          minimum: 0.0
          type: integer
        to:
          $ref: '#/components/schemas/Pose3'
      required:
      - from
      - kind
      - to
      type: object
    TransportKind:
      enum:
      - python-bridge
      - rust-server
      - tauri
      - wasm
      type: string
    UnitSystem:
      enum:
      - mm
      - inch
      type: string
    VcObject:
      description: '`VcObject` analogue: a chain of segments grouped after `segments2objects`.'
      properties:
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        inner_objects:
          description: IDs of objects fully contained by this one.
          items:
            format: uint
            minimum: 0.0
            type: integer
          type: array
        layer:
          type: string
        outer_objects:
          description: IDs of objects fully containing this one.
          items:
            format: uint
            minimum: 0.0
            type: integer
          type: array
        overwrite_offset:
          description: Per-object override of the tool-radius offset (None ⇒ tool diameter / 2).
          format: double
          type:
          - number
          - 'null'
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        setup:
          allOf:
          - $ref: '#/components/schemas/Setup'
          description: Per-object setup overrides (mill depth, leads, tabs, …).
        start:
          anyOf:
          - $ref: '#/components/schemas/Point2'
          - type: 'null'
          description: Optional starting point for cut-order seeding.
        tool_offset:
          allOf:
          - $ref: '#/components/schemas/ToolOffset'
          description: '"outside" / "inside" / "none" — see `setup::ToolOffset`.'
      required:
      - closed
      - color
      - inner_objects
      - layer
      - outer_objects
      - segments
      - setup
      - tool_offset
      type: object
    VersionResponse:
      properties:
        capabilities:
          items:
            type: string
          type: array
        transport:
          $ref: '#/components/schemas/TransportKind'
        version:
          type: string
      required:
      - capabilities
      - transport
      - version
      type: object
    WiacAutoFix:
      oneOf:
      - properties:
          kind:
            enum:
            - assign_tool
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested_tool_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        - suggested_tool_id
        type: object
      - properties:
          kind:
            enum:
            - lower_sim_resolution
            type: string
          suggested_cell_mm:
            format: double
            type: number
        required:
        - kind
        - suggested_cell_mm
        type: object
      - properties:
          kind:
            enum:
            - disable_op
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        type: object
      - properties:
          kind:
            enum:
            - change_profile_offset
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested:
            $ref: '#/components/schemas/ToolOffset'
        required:
        - kind
        - op_id
        - suggested
        type: object
    WiacError:
      properties:
        auto_fix:
          anyOf:
          - $ref: '#/components/schemas/AutoFix'
          - type: 'null'
        kind:
          $ref: '#/components/schemas/ErrorKind'
        message:
          type: string
        recovery_hint:
          type:
          - string
          - 'null'
        span:
          anyOf:
          - $ref: '#/components/schemas/SourceSpan'
          - type: 'null'
      required:
      - kind
      - message
      type: object
    WiacErrorKind:
      enum:
      - bad_input
      - misconfigured
      - limit
      - unsupported
      - io
      - internal
      type: string
    WiacSourceSpan:
      properties:
        column:
          format: uint32
          minimum: 0.0
          type: integer
        file:
          type: string
        line:
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - column
      - file
      - line
      type: object
  responses:
    BadRequest:
      description: Malformed input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Could not parse content
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
