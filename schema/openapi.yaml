openapi: 3.0.3
info:
  title: wiaConstructor API
  version: 0.0.1
  description: |
    JSON contract for wiaConstructor core operations.
    Implementation-agnostic: served by the Stage-1 Python FastAPI bridge,
    the Rust axum server, Tauri command bindings, and the WASM browser
    bindings — same shape everywhere.
  license:
    name: GPL-3.0-or-later
servers:
- url: http://localhost:8765
  description: local Stage-1 FastAPI bridge
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: health
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /version:
    get:
      summary: Version + capabilities
      operationId: version
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /import:
    post:
      summary: Parse a vector file into wiaConstructor geometry
      operationId: import
      description: |
        Accepts the bytes of a DXF, SVG, HPGL, NGC, STL or other supported
        format and returns the flattened geometry: layers, segments
        (LINE/ARC primitives with bulge for arcs), bounding box, and unit
        scale.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                format:
                  type: string
                  description: Optional explicit format hint (dxf|svg|hpgl|ngc|stl). Inferred from filename otherwise.
      responses:
        '200':
          description: Parsed geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /generate:
    post:
      summary: Generate gcode + 3D toolpath preview from imported geometry
      operationId: generate
      description: |
        Stub for Stage-1; full setup-tree input lands in d0d follow-ups.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generated output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /text:
    post:
      summary: Render TTF text into geometry segments
      operationId: renderText
      description: |
        Tessellates a TTF/OTF font + a string into the project's standard
        Segment shape. Used by the Add-Text dialog. The response also
        carries a `single_line` flag derived by `is_single_line_font` so
        the dialog can warn when a filled-outline font is paired with the
        Engraving style.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderTextRequest'
      responses:
        '200':
          description: Rendered text geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTextResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /helix-radius:
    post:
      summary: Preview the auto-fit helix radius for a pocket selection
      operationId: computeHelixRadius
      description: |
        Runs the same inscribed-circle search the gcode generator does at
        run time, so the OpPropertiesPanel can display the detected radius
        (or a short fallback reason) before the user clicks Generate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HelixRadiusRequest'
      responses:
        '200':
          description: Detected helix radius or a fallback reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelixRadiusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  schemas:
    AutoFix:
      oneOf:
      - properties:
          kind:
            enum:
            - assign_tool
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested_tool_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        - suggested_tool_id
        type: object
      - properties:
          kind:
            enum:
            - lower_sim_resolution
            type: string
          suggested_cell_mm:
            format: double
            type: number
        required:
        - kind
        - suggested_cell_mm
        type: object
      - properties:
          kind:
            enum:
            - disable_op
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        type: object
      - properties:
          kind:
            enum:
            - change_profile_offset
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested:
            $ref: '#/components/schemas/ToolOffset'
        required:
        - kind
        - op_id
        - suggested
        type: object
    AxesConfig:
      description: Bundle of per-axis output configs. Set on `PostProfile::axes` to take over from the hard-coded axis letters / `%.3f` format in the `LinuxCNC` / GRBL posts. All seven axes default to their natural letter + sensible format, so `AxesConfig::default()` is the same as the legacy hand-written behavior — the user only changes what they care about.
      properties:
        feed:
          $ref: '#/components/schemas/AxisFormat'
        i:
          $ref: '#/components/schemas/AxisFormat'
        j:
          $ref: '#/components/schemas/AxisFormat'
        speed:
          $ref: '#/components/schemas/AxisFormat'
        x:
          $ref: '#/components/schemas/AxisFormat'
        y:
          $ref: '#/components/schemas/AxisFormat'
        z:
          $ref: '#/components/schemas/AxisFormat'
      required:
      - feed
      - i
      - j
      - speed
      - x
      - y
      - z
      type: object
    AxisFormat:
      description: Per-axis output configuration. `enabled=false` means "drop this axis from the line entirely" (laser controllers commonly ignore Z; some lathes ignore Y). `name` is the output letter — rename Z to A for a rotary-as-Z setup. `format` is a tiny printf-ish spec. `scale` is a multiplier applied BEFORE formatting (`-1.0` flips the Z-up vs Z-down convention; `0.0393701` mm→inch).
      properties:
        enabled:
          default: true
          type: boolean
        format:
          type: string
        name:
          type: string
        scale:
          format: double
          type: number
      required:
      - format
      - name
      - scale
      type: object
    AxisLimits:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
        z:
          format: double
          type: number
      required:
      - x
      - y
      - z
      type: object
    BBox:
      properties:
        max_x:
          format: double
          type: number
        max_y:
          format: double
          type: number
        min_x:
          format: double
          type: number
        min_y:
          format: double
          type: number
      required:
      - max_x
      - max_y
      - min_x
      - min_y
      type: object
    ContourParams:
      description: Parameters shared by every closed-contour op (Profile / Pocket / Engrave / `DragKnife`). Embedded in the matching [`super::op::OpKind`] variants. Holds tab shape + placement, lead-in / lead-out, cut direction, corner-feed reduction, and the optional user-picked approach point. (kbx5 step 1.)
      properties:
        approach_point:
          description: 'Anfahrpunkt (rt1.26): user-picked XY where the cutter enters each closed-contour ring. `None` = auto.'
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type:
          - array
          - 'null'
        corner_feed_reduction:
          description: When > 0, slow the feed at sharp corners by this fraction.
          format: double
          type: number
        cut_direction:
          allOf:
          - $ref: '#/components/schemas/CutDirection'
          description: Cut direction for the main (roughing) passes.
        finish_cut_direction:
          allOf:
          - $ref: '#/components/schemas/CutDirection'
          description: Cut direction for the finishing pass — the offset that defines the wall surface (Pocket level=0 ring; Profile single-pass cut).
        leads:
          allOf:
          - $ref: '#/components/schemas/LeadsConfig'
          default:
            in: off
            in_lenght: 5.0
            out: off
            out_lenght: 5.0
          description: Lead-in / lead-out shape.
        tab_mode:
          allOf:
          - $ref: '#/components/schemas/TabPlacementMode'
          description: How tab positions are sourced for this op (rt1.10).
        tab_placements:
          description: User-placed tabs, anchored geometry-relative as `(object_id, t)`. Honored when `tab_mode` is `Manual` or `Mixed`; `Off` / `Auto` ignore.
          items:
            $ref: '#/components/schemas/TabPlacement'
          type: array
        tabs:
          allOf:
          - $ref: '#/components/schemas/TabsConfig'
          default:
            active: false
            height: 1.0
            tab_type: rectangle
            width: 10.0
          description: 'Per-op tab SHAPE config: width / height / kind (rectangle vs ramp) / ramp angle. Effective tab POSITIONS come from `tab_placements` (manual) and / or `tab_mode` (auto-spaced).'
      type: object
    Coolant:
      enum:
      - off
      - mist
      - flood
      type: string
    CutDirection:
      description: |-
        Climb vs conventional milling. Determines the path winding the generator emits — for a standard right-hand spindle:

        | context (cutter location) | conventional      | climb              | |---------------------------|-------------------|--------------------| | outer (cutter outside)    | CW (area < 0)     | CCW (area > 0)     | | inner (cutter in pocket)  | CCW (area > 0)    | CW (area < 0)      |

        "Conventional" is the safer default — most hobby and older mills don't have the rigidity / backlash takeup needed for clean climb cuts. Climb gives a better surface finish but requires a stiff machine. The finishing pass typically stays conventional regardless of the main strategy because the finish wall quality matters most.
      enum:
      - conventional
      - climb
      type: string
    DrillCycle:
      description: Drill-cycle picker for [`OpKind::Drill`]. Mirrors the canned cycles G81 / G83 / G73 from the `LinuxCNC` / Fanuc dialect plus the dwell-at-bottom parameter `PyCAM`'s `Drilling.py` exposes. Posts that don't support canned cycles fall back to a manual G0/G1 expansion of the same cycle (see `PostProcessor::drill_*` defaults).
      oneOf:
      - description: G81 — single plunge to depth, retract.
        properties:
          dwell_sec:
            default: 0.0
            description: Dwell at bottom in seconds before retract. 0 = no dwell.
            format: double
            type: number
          kind:
            enum:
            - simple
            type: string
        required:
        - kind
        type: object
      - description: G83 — peck with full retract to clearance plane between pecks.
        properties:
          dwell_sec:
            default: 0.0
            format: double
            type: number
          kind:
            enum:
            - peck
            type: string
          peck_step_mm:
            format: double
            type: number
        required:
        - kind
        - peck_step_mm
        type: object
      - description: G73 — peck with chip-break (small partial retract between pecks).
        properties:
          dwell_sec:
            default: 0.0
            format: double
            type: number
          kind:
            enum:
            - chip_break
            type: string
          peck_step_mm:
            format: double
            type: number
        required:
        - kind
        - peck_step_mm
        type: object
    DwellUnit:
      description: 'nxn0: which time unit the post emits for `P<value>` dwell words. `LinuxCNC` and Smoothieware read P in seconds; Mach3/Mach4/Centroid/ most Fanuc-derived controllers read P in milliseconds. Defaulting to Seconds keeps the existing `LinuxCNC` golden snapshots stable.'
      enum:
      - seconds
      - milliseconds
      type: string
    Error:
      properties:
        details: true
        error:
          type: string
      required:
      - error
      type: object
    ErrorKind:
      enum:
      - bad_input
      - misconfigured
      - limit
      - unsupported
      - io
      - internal
      type: string
    Fixture:
      description: A user-declared physical obstacle on the stock the cutter must miss. Lives in stock-relative XY (same frame as the imported geometry) and occupies a Z range; the sim collision test gates on that range first then falls back to a per-shape XY swept-region check.
      properties:
        color:
          default: 4288696512
          description: Visual color in 2D / 3D previews, packed RGBA (0xRRGGBBAA).
          format: uint32
          minimum: 0.0
          type: integer
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/FixtureKind'
        name:
          type: string
        origin:
          description: Center of the fixture in stock XY (mm).
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type: array
        z_bottom:
          description: Z range the fixture occupies (relative to stock-top = 0). Typically `z_top` is positive (a clamp standing above stock); both can be negative for cleats below.
          format: double
          type: number
        z_top:
          format: double
          type: number
      required:
      - id
      - kind
      - name
      - origin
      - z_bottom
      - z_top
      type: object
    FixtureKind:
      oneOf:
      - description: Axis-aligned rectangle centered on `origin`.
        properties:
          depth:
            format: double
            type: number
          shape:
            enum:
            - box
            type: string
          width:
            format: double
            type: number
        required:
        - depth
        - shape
        - width
        type: object
      - description: Cylinder centered on `origin`.
        properties:
          radius:
            format: double
            type: number
          shape:
            enum:
            - cylinder
            type: string
        required:
        - radius
        - shape
        type: object
      - description: Polygon outline in fixture-local coordinates (origin-relative).
        properties:
          shape:
            enum:
            - polygon
            type: string
          vertices:
            items:
              items:
              - format: double
                type: number
              - format: double
                type: number
              maxItems: 2
              minItems: 2
              type: array
            type: array
        required:
        - shape
        - vertices
        type: object
    FormProfileSample:
      description: '1wit: one cross-section sample of a form / profile cutter outline, measured up from the cutting tip. The cutter is treated as cylindrically symmetric, so a sorted list of these describes the full profile (cove / ogee / dovetail / custom). See [`ToolEntry::form_profile_mm`].'
      properties:
        r_mm:
          description: Cutter radius at this height (mm), `diameter / 2` at the widest point.
          format: double
          type: number
        z_mm:
          description: Height above the cutting tip (mm). 0 is the bottom face; the list runs tip → top.
          format: double
          type: number
      required:
      - r_mm
      - z_mm
      type: object
    FrameShape:
      description: Shape of the synthetic frame built around a Pocket-Outside selection. Rectangle is a plain padded bbox; `RoundedRectangle` uses the same bbox with a quarter-arc bulge at each corner. Oval and `TightOutline` are deferred follow-ups (not yet implemented).
      enum:
      - rectangle
      - rounded_rectangle
      type: string
    GcodeIndex:
      description: 'Lookup table the frontend uses to wire the gcode text panel to the 3D toolpath: line N in the gcode corresponds to `segments[lines_to_segment[N]]`, and `segments_to_line[i]` is the 1-based gcode line that produced segment `i`. Both vectors are dense — gcode lines that don''t move the tool map to `usize::MAX` so callers can detect the gap.'
      properties:
        lines_to_segment:
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments_to_line:
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
      required:
      - lines_to_segment
      - segments_to_line
      type: object
    GenerateRequest:
      properties:
        post_processor:
          anyOf:
          - $ref: '#/components/schemas/PostProcessorKind'
          - type: 'null'
        project:
          allOf:
          - $ref: '#/components/schemas/Project'
          description: The full project — geometry + machine + tools + operations + tabs.
      required:
      - project
      type: object
    GenerateResponse:
      properties:
        gcode:
          type: string
        gcode_index:
          $ref: '#/components/schemas/GcodeIndex'
        regions:
          description: 'Filled-area preview for Pocket ops: the actual region the cutter will machine, computed via the per-op `SourceCombine` mode (Auto by default — outer + inner = annulus). The frontend paints these as translucent fills so the user sees what they''re cutting before reading the toolpath. Empty for non-Pocket ops.'
          items:
            $ref: '#/components/schemas/RegionPreview'
          type: array
        stats:
          $ref: '#/components/schemas/PipelineStats'
        time_estimate:
          allOf:
          - $ref: '#/components/schemas/TimeEstimate'
          description: Acceleration- and jerk-aware program-time estimate. See [`crate::sim::timing`] for the integrator. The total accounts for motion under the trapezoidal profile, tool-change time (`MachineConfig.toolchange_s` × number of M6s), and per-tool spindle pauses summed across used tools.
        toolpath:
          items:
            $ref: '#/components/schemas/ToolpathSegment'
          type: array
        warnings:
          description: Non-fatal warnings raised during planning — mostly tool-fit problems (cutter doesn't fit the geometry, kind mismatch, …). The frontend surfaces these in the operations list status badge and a sidebar list; the gcode is still emitted.
          items:
            $ref: '#/components/schemas/PipelineWarning'
          type: array
      required:
      - gcode
      - gcode_index
      - stats
      - time_estimate
      - toolpath
      type: object
    GenerateStats:
      properties:
        closed_object_count:
          format: uint
          minimum: 0.0
          type: integer
        object_count:
          format: uint
          minimum: 0.0
          type: integer
        offset_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - closed_object_count
      - object_count
      - offset_count
      type: object
    HealthResponse:
      properties:
        ok:
          type: boolean
      required:
      - ok
      type: object
    HelixRadiusRequest:
      description: Cross-transport request for the helix auto-fit preview. The frontend sends imported segments + the operation's selected object ids + the active tool diameter; the backend walks the same chaining/combine pipeline the gcode generator does and returns the largest inscribed circle that fits inside the resulting pocket boundary.
      properties:
        object_ids:
          description: Object ids from the import that should participate in the pocket boundary computation. Same shape as `OpSource::Objects.ids`. Empty = "use all segments as one region".
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments:
          description: Source segments to derive the closed-pocket boundary from.
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        tool_diameter_mm:
          format: double
          type: number
      required:
      - object_ids
      - segments
      - tool_diameter_mm
      type: object
    HelixRadiusResponse:
      properties:
        fallback_reason:
          description: Short reason string when None (so the UI can show "Pocket too small for tool" instead of just an empty Auto state).
          type:
          - string
          - 'null'
        radius_mm:
          description: Some(r) when an inscribed circle fits; None when the auto path would fall back to Ramp/Direct.
          format: double
          type:
          - number
          - 'null'
      type: object
    HolderCollisionCell:
      description: '24ht: per-cell holder-wall overlap record. `required_clearance_mm` is how much extra clearance the holder would need at this cell for the envelope to fit; `wall_z` is the cell''s current heightmap value (the top of the wall the holder is hitting).'
      properties:
        cell_x:
          format: double
          type: number
        cell_y:
          format: double
          type: number
        required_clearance_mm:
          format: float
          type: number
        wall_z:
          format: float
          type: number
      required:
      - cell_x
      - cell_y
      - required_clearance_mm
      - wall_z
      type: object
    HolderShape:
      description: Geometry of the tool holder above the shank. The holder is treated as cylindrically symmetric around the tool axis (Z), so set-screw flats / asymmetric ER nuts get approximated by their bounding cylinder/cone — good enough to flag clear collisions, conservative on tight cases.
      oneOf:
      - properties:
          diameter_mm:
            format: double
            type: number
          kind:
            enum:
            - cylinder
            type: string
          length_mm:
            format: double
            type: number
        required:
        - diameter_mm
        - kind
        - length_mm
        type: object
      - properties:
          bottom_diameter_mm:
            format: double
            type: number
          kind:
            enum:
            - cone
            type: string
          length_mm:
            format: double
            type: number
          top_diameter_mm:
            format: double
            type: number
        required:
        - bottom_diameter_mm
        - kind
        - length_mm
        - top_diameter_mm
        type: object
      - properties:
          cone_length_mm:
            format: double
            type: number
          cone_top_diameter_mm:
            format: double
            type: number
          cylinder_diameter_mm:
            format: double
            type: number
          cylinder_length_mm:
            format: double
            type: number
          kind:
            enum:
            - stepped
            type: string
        required:
        - cone_length_mm
        - cone_top_diameter_mm
        - cylinder_diameter_mm
        - cylinder_length_mm
        - kind
        type: object
    ImportResponse:
      properties:
        bbox:
          $ref: '#/components/schemas/BBox'
        filename:
          type: string
        format:
          type: string
        layers:
          items:
            $ref: '#/components/schemas/Layer'
          type: array
        object_meta:
          default: []
          description: Object metadata (closed flag, layer, color, bbox) keyed by the same 1-based id — `object_meta[id - 1]` is the entry for object `id`.
          items:
            $ref: '#/components/schemas/ImportedObject'
          type: array
        objects:
          default: []
          description: Per-segment object id from the chaining pass — `objects[i]` is the 1-based id of the chained object that consumed `segments[i]` (0 means "didn't chain into any object", e.g. an isolated point). The frontend uses this to do object-level selection in 2D.
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        text_entities:
          description: DXF TEXT / MTEXT entities — emitted as editable metadata instead of being rendered to opaque polylines at import time. The frontend converts each into a `TextLayer` so the user can edit the content, font, size, rotation, etc., and the pipeline re-renders them at Generate. Empty for formats that don't carry text entities (SVG).
          items:
            $ref: '#/components/schemas/ImportedTextEntity'
          type: array
        unit_scale:
          format: double
          type: number
        warnings:
          items:
            type: string
          type: array
      required:
      - bbox
      - filename
      - format
      - layers
      - segments
      - unit_scale
      - warnings
      type: object
    ImportedObject:
      properties:
        bbox:
          $ref: '#/components/schemas/BBox'
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        id:
          format: uint32
          minimum: 0.0
          type: integer
        layer:
          type: string
      required:
      - bbox
      - closed
      - color
      - id
      - layer
      type: object
    ImportedTextEntity:
      description: Metadata for a TEXT / MTEXT entity captured during import. Carries just enough for the frontend to construct a `TextLayer` — the editable inputs the pipeline pre-pass uses to render glyphs.
      properties:
        kind:
          $ref: '#/components/schemas/ImportedTextKind'
        origin:
          description: Anchor in stock XY (mm).
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type: array
        rotation_deg:
          default: 0.0
          description: CCW degrees around `origin`.
          format: double
          type: number
        size_mm:
          format: double
          type: number
        source_layer:
          description: Original DXF layer name — preserved so the user knows where the text came from (the synthetic `__text_<id>` name takes over at pipeline time).
          type: string
        text:
          description: Full string. For Mtext, lines are `\n`-separated.
          type: string
      required:
      - kind
      - origin
      - size_mm
      - source_layer
      - text
      type: object
    ImportedTextKind:
      enum:
      - TEXT
      - MTEXT
      type: string
    Layer:
      properties:
        color:
          format: int32
          type: integer
        name:
          type: string
        segment_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - color
      - name
      - segment_count
      type: object
    LeadKind:
      enum:
      - off
      - straight
      - arc
      type: string
    LeadsConfig:
      properties:
        in:
          $ref: '#/components/schemas/LeadKind'
        in_lenght:
          description: 'Lead-in size. Interpreted by `LeadKind`: * `Straight`: straight-line LENGTH (mm) of the approach. * `Arc`: tangent roll-on arc RADIUS (mm). The arc sweeps a quarter turn from the approach point (radius away on the perpendicular) to the contour start, landing tangent to the first cut segment. * `Off`: ignored.'
          format: double
          type: number
        out:
          $ref: '#/components/schemas/LeadKind'
        out_lenght:
          description: Lead-out size. Same interpretation as `in_lenght` but applied at the END of the cut path (cutter rolls off the contour at Pn).
          format: double
          type: number
      required:
      - in
      - in_lenght
      - out
      - out_lenght
      type: object
    MachineConfig:
      properties:
        accel:
          anyOf:
          - $ref: '#/components/schemas/AxisLimits'
          - type: 'null'
          description: Per-axis acceleration in mm/s². When None the kinematic time estimator falls back to 250 mm/s² per axis (`LinuxCNC` default).
        arc_fit_tolerance_mm:
          description: Maximum deviation (mm) between the fitted G2/G3 arc and the original chord polyline. None ⇒ 0.01 mm. Only consulted when `arcs == true`.
          format: double
          type:
          - number
          - 'null'
        arcs:
          description: Whether the machine emits arc commands (G2/G3).
          type: boolean
        capabilities:
          description: 'h0tx: which op kinds the machine can run. Drives the frontend''s `OpKindPicker` filter — a laser-only machine doesn''t show milling ops. `mode` (above) stays as the PRIMARY mode used by the gcode emitter; capabilities is the broader set so a multi-purpose machine can pick the right op set without flipping `mode`. Empty Vec ⇒ implicitly `[mode]` (back-compat default for old project files).'
          items:
            $ref: '#/components/schemas/MachineMode'
          type: array
        comments:
          type: boolean
        decimal_separator:
          description: Decimal separator for emitted numbers (rt1.36). `'.'` (default) suits `LinuxCNC` / GRBL / Mach3 and any controller configured in US locale. `','` covers European-locale Siemens / Heidenhain controllers that require `X1,5` instead of `X1.5`. Anything other than '.' / ',' silently falls back to '.'.
          maxLength: 1
          minLength: 1
          type: string
        jerk:
          anyOf:
          - $ref: '#/components/schemas/AxisLimits'
          - type: 'null'
          description: Per-axis jerk in mm/s³. None ⇒ trapezoidal-only profiling (S-curve refinement is Phase 2).
        line_number_start:
          description: Starting line number for `N<n>` prefixes (rt1.36). `None` (the default) emits unnumbered lines. `Some(10)` emits `N10`, `N20`, `N30`, … incrementing by 10. Required by some FANUC / vintage controllers; useful operator reference even on modern ones.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        max_feed_mm_min:
          description: 'jcmx: upper bound on the cutting / plunge feed (mm/min) the machine can actually drive. Tool / op feeds above this clamp DOWN to the max and emit a `feed_clamped_above_max` warning, so an out-of-range feed (a fat-fingered op override, an aggressive tool-library value) can''t reach the controller as a verbatim `F<huge>` — which some controllers fault on and others silently cap, both producing a program that doesn''t run as previewed. `None` disables the ceiling (default, back-compat).'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        mode:
          $ref: '#/components/schemas/MachineMode'
        name:
          description: 'h0tx: free-text identifier for the machine setup ("Shop CNC", "Garage MPCNC", …). Empty string by default; persisted into the project file + the `.wiac-machine.json` save/load files.'
          type: string
        park_at_home:
          description: 'syol: when true, the `program_end` footer adds a `G53 G0 X0 Y0` retract-to-machine-home before the spindle-off + M30 sequence. Most hobby controllers (`LinuxCNC`, Mach3) honor G53; GRBL accepts it from v1.1 onward. When false, falls back to a `G0 X0 Y0` in the current WCS (the work zero) — still safer than leaving the spindle parked over the part. Both modes lift to `fast_move_z` first.'
          type: boolean
        park_xy:
          description: 'syol: optional explicit park XY (mm, in WCS coordinates). When `Some`, the `program_end` footer routes the head to this point after the safe-Z lift, overriding the machine-home / work-zero fallback. Useful for a known tool-station / load-station that isn''t (0, 0) in either frame.'
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type:
          - array
          - 'null'
        plot_mode_z:
          description: 'Plot-mode Z (rt1.35 / Estlcam `c_PP.Z_Up_Dn)`: when true, the pipeline collapses every cut to ONE pass at the op''s cut depth and skips the multi-step descent / ramp / helix machinery. Z values written into gcode are restricted to `fast_move_z` (pen up between cuts) and the op''s `depth` (pen down on cut moves). Right setting for laser / plasma / pen plotters / 3D-printer extrusion and drag-knife controllers.'
          type: boolean
        post_profile:
          anyOf:
          - $ref: '#/components/schemas/PostProfile'
          - type: 'null'
          description: User-configurable post-processor profile (rt1.15). When `Some`, the built-in posts (linuxcnc / grbl) read its templates instead of emitting their hard-coded `program_start` / `program_end` / `tool_change` / coolant lines. `None` = hard-coded defaults.
        rapid_speed:
          description: Rapid (G0) traverse speed in mm/min. None ⇒ 5000 mm/min default.
          format: double
          type:
          - number
          - 'null'
        spindle_rpm_max:
          description: '3nnj: upper bound on the spindle RPM the controller will accept. Tool / op RPMs above this clamp DOWN to the max and emit a `spindle_speed_clamped_above_max` warning. Without this clamp some controllers refuse the command mid-program; others silently cap and produce wrong chipload. `None` disables the ceiling (default, back-compat).'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        spindle_rpm_min:
          description: '3nnj: lower bound on the spindle RPM the controller will accept. Tool / op RPMs below this clamp UP to the min and emit a `spindle_speed_clamped_below_min` warning. `None` disables the floor (default, back-compat).'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        spindle_start_dwell_sec:
          description: Spindle-start dwell (seconds) inserted into the M6 toolchange envelope after `M3 S<rpm>`. Lets the new tool come up to commanded RPM before the next cut. Stacks with the per-tool `ToolEntry.pause` (the per-tool warm-up); think of this as the machine-wide floor and `tool.pause` as the per-tool top-up. `None` ⇒ 0.5 s default.
          format: double
          type:
          - number
          - 'null'
        spindle_stop_dwell_sec:
          description: Spindle-stop dwell (seconds) inserted into the M6 toolchange envelope between `M5` and the actual `T<n> M6`. Gives the spindle time to spin down before the chuck is touched. `None` (and the default `0.5 s`) covers most VFD-driven spindles; high-inertia big-iron may want 1–2 s. Set to `Some(0.0)` to skip entirely. See bd issues eaeq / m8sq / rwv8 / rfow.
          format: double
          type:
          - number
          - 'null'
        supports_toolchange:
          type: boolean
        toolchange_s:
          description: Tool-change time in seconds.
          format: double
          type: number
        toolchange_xy:
          description: 'ad0v: optional tool-change position (mm, in MACHINE coordinates). When `Some`, the toolchange envelope rapids the head here via `G53 G0 X<x> Y<y>` after the safe-Z lift and BEFORE the M0 / M6 pause, so a manual bit-swap happens at a fixed, reachable station instead of directly over the workpiece / clamps. MACHINE coords (not WCS like `park_xy`) because a tool-change station is a physical machine location independent of where the part zero sits — re-zeroing a job must not move the changer. Applies to both manual and ATC paths; on an ATC whose M6 macro homes to its own changer, leave this `None`. `None` (default) keeps the prior behavior: lift to `fast_move_z` only. Emitted via the post''s `rapid_machine_xy`, which HPGL / pen posts drop.'
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type:
          - array
          - 'null'
        unit:
          $ref: '#/components/schemas/UnitSystem'
        use_kinematic_time_estimate:
          description: When true (the default), use the accel/jerk-aware integrator. Set to false for the legacy length/feed-only estimator.
          type: boolean
        work_area:
          allOf:
          - $ref: '#/components/schemas/AxisLimits'
          description: Machine work area envelope in mm. Drives the stock's auto-mode fallback when no geometry is imported (the stock then sizes to the work-area XY footprint), and surfaces as the soft-limit reference in future sim warnings. Default 200×300×50 — a typical hobby gantry; users override in `MachineDialog`.
      required:
      - arcs
      - comments
      - mode
      - supports_toolchange
      - unit
      type: object
    MachineMode:
      oneOf:
      - enum:
        - mill
        - laser
        - drag
        type: string
      - description: 'zpuk: plasma torch. Emits a two-step Z entry — rapid to `pierce_height_mm` above stock, dwell `pierce_delay_sec` while the arc starts and pierces, then G1 to `cut_height_mm` for the cut. The torch-on / -off lines reuse the laser helpers (M3 S<power> / M5) since most plasma controllers accept the same idioms. Tool-on emit lives in [`crate::gcode::cut_tool_on`].'
        enum:
        - plasma
        type: string
    MillConfig:
      properties:
        active:
          type: boolean
        corner_feed_reduction:
          default: 0.0
          description: When > 0, slow the feedrate at sharp line-to-line corners by this fraction so the machine doesn't dwell on the corner with high accel demand. 0.0 = no reduction (current behavior). 0.5 = half the feed at corners. Most useful for zigzag pocket fills with their many 180° turns.
          format: double
          type: number
        depth:
          format: double
          type: number
        depth_list:
          default: []
          description: Explicit ordered list of Z depths to cut at. When non-empty, overrides the step / `finish_step` / `through_depth` schedule.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          format: double
          type: number
        finish_step:
          default: null
          description: Optional smaller step for the FINAL Z pass (cleaner bottom finish). None = use `step` for every pass.
          format: double
          type:
          - number
          - 'null'
        helix_mode:
          type: boolean
        objectorder:
          $ref: '#/components/schemas/ObjectOrder'
        offset:
          $ref: '#/components/schemas/ToolOffset'
        overcut:
          default: false
          description: When true, dip into sharp inner corners so the cutter fully clears them. Mirrors viaConstructor's `mill.overcut`.
          type: boolean
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          default:
            kind: direct
          description: How the cutter descends into material at the start of each Z pass. `Direct` is a straight plunge; `Ramp` walks the first `ramp_length` of the path while linearly descending Z so the cutter takes a chip in both Z and XY simultaneously.
        reverse:
          type: boolean
        start_depth:
          format: double
          type: number
        step:
          description: Per-pass z step (negative ⇒ down).
          format: double
          type: number
        through_depth:
          default: 0.0
          description: Cut past `depth` by this many mm (positive). Used for through-cuts on edge-clamped sheet.
          format: double
          type: number
      required:
      - active
      - depth
      - fast_move_z
      - helix_mode
      - objectorder
      - offset
      - reverse
      - start_depth
      - step
      type: object
    MoveKind:
      enum:
      - rapid
      - cut
      - plunge
      - retract
      - arc
      type: string
    ObjectOrder:
      enum:
      - nearest
      - per_object
      - unordered
      type: string
    Op:
      description: One operation in the project's program. Carries the kind-discriminator (which itself embeds the per-kind params via [`OpKind`]), the universal [`OpParamsCommon`] bag (depth schedule, plunge, feed overrides), tool refs, source selector, and that's it. Patterning is per-kind today (only `OpKind::Drill` carries it); add it to other variants if more kinds need patterning.
      properties:
        enabled:
          type: boolean
        finish_tool_id:
          description: Optional finish tool id for dual-tool Pocket ops (rt1.33 / Estlcam TS slot). When `Some(id)` and `id != tool_id`, the pipeline emits a toolchange after the rough cascade and runs the wall-defining ring with the finish tool's geometry + finish-set feed/speed. When `None` or equal to `tool_id`, the op runs single-tool (current behavior).
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        group:
          description: 'dp6b: optional group label. Consecutive enabled ops sharing the same value belong to the same logical phase ("rough", "finish", "drill cycle"), and the pipeline emits a `; === GROUP: <name> ===` comment at every boundary so the operator scrolling the gcode can see where each phase starts. Empty / `None` means the op carries no group and participates in no boundary line (a `Some("")` is treated the same as `None` at emit time). Default `None` keeps existing projects byte-identical.'
          type:
          - string
          - 'null'
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/OpKind'
        name:
          type: string
        params:
          $ref: '#/components/schemas/OpParamsCommon'
        source:
          $ref: '#/components/schemas/OpSource'
        tool_id:
          description: id of a `Project.tools` entry. For dual-tool Pocket ops this is the roughing tool; the finish ring is cut by `finish_tool_id`.
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - enabled
      - id
      - kind
      - name
      - params
      - source
      - tool_id
      type: object
    OpKind:
      oneOf:
      - description: Contour cut — equivalent to today's "mill" with a parallel-offset pass at `offset` of the tool radius. Embedded `contour` and `profile` carry the per-kind params (kbx5 step 1); legacy payloads land them at default and the migration deserializer fills them from the flat `OpParams` bag.
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          offset:
            $ref: '#/components/schemas/ToolOffset'
          profile:
            allOf:
            - $ref: '#/components/schemas/ProfileParams'
            default:
              helix: false
              overcut: false
              reverse: false
          type:
            enum:
            - profile
            type: string
        required:
        - offset
        - type
        type: object
      - description: Pocket fill — cascade of inward offsets, optionally zigzag. Embeds `contour` (lead-in/out, cut direction, tabs) and `pocket` (xy overlap, islands, finish allowance, Pocket-Outside frame).
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          pocket:
            allOf:
            - $ref: '#/components/schemas/PocketParams'
            default:
              pocket_insideout: false
              pocket_islands: false
              pocket_nocontour: false
              xy_overlap: 0.0
          strategy:
            $ref: '#/components/schemas/PocketStrategy'
          type:
            enum:
            - pocket
            type: string
        required:
        - strategy
        - type
        type: object
      - description: Drill cycle — point or circle smaller than tool. Carries a [`DrillCycle`] that picks G81 / G83 / G73 (or the manual G0/G1 fallback for posts that don't support canned cycles). Also carries the Stufenfase post-drill chamfer width (rt1.20), the optional pattern (kbx5 step 1 — Drill is the only kind patternable for now), and the optional spot/centerdrill pre-pass (r2af).
        properties:
          chamfer_after_width_mm:
            format: double
            type:
            - number
            - 'null'
          cycle:
            $ref: '#/components/schemas/DrillCycle'
          pattern:
            anyOf:
            - $ref: '#/components/schemas/PatternConfig'
            - type: 'null'
          spot_first:
            anyOf:
            - $ref: '#/components/schemas/SpotConfig'
            - type: 'null'
            description: 'r2af: optional spot/centerdrill pre-pass. When `Some`, the driver emits a shallow spot-drill block at every hole center BEFORE the main drill block. Twist drills walk on hard / polished stock — the spot dimple locks the chisel edge so the main drill plunges on-nominal instead of drifting by tip/2+. None ⇒ legacy behaviour (no spot pre-pass).'
          type:
            enum:
            - drill
            type: string
        required:
        - cycle
        - type
        type: object
      - description: Helical thread — single-point cutter walks a helix inside a bore (internal) or around a stud (external). Z descends linearly by `pitch_mm` per revolution between `start_depth` and `depth`. The source must be a closed circle (single Circle / closed Arc loop); the helix radius derives from the circle's radius plus tool radius for internal threads, or minus tool radius for external. (rt1.17)
        properties:
          climb:
            default: false
            description: Climb (CCW helix on a right-hand spindle) vs conventional (CW). Default conventional. Surface quality on hobby rigs almost always favors conventional even for threading.
            type: boolean
          internal:
            default: true
            description: '`true` = internal (tap-style, cutter walks INSIDE the bore); `false` = external (cutter walks AROUND a stud).'
            type: boolean
          pitch_mm:
            default: 1.0
            description: Thread pitch in mm — Z descent per full revolution. Positive; defaults to 1.0 mm (M6 fine).
            format: double
            type: number
          radial_passes:
            default: 1
            description: 'sqnh: number of radial roughing passes from `start_radius` → final thread radius. Single helix at full engagement is too aggressive for hard materials; multi- pass schedules let the chipload soften. Default 1 (single-pass; backward-compatible). Each pass cuts a deeper helix at radius = `lerp(start_radius_frac` → 1.0, i/N).'
            format: uint32
            minimum: 0.0
            type: integer
          start_angle_rad:
            default: 0.0
            description: '6uns: starting angle of the helix in radians, measured CCW from the +X axis. Default 0 (helix starts at `(center.x + radius, center.y)`) — the pre-6uns behavior. Override to re-cut partial threads where the previous run stopped mid-helix; the new run can pick up where the last one left off.'
            format: double
            type: number
          thread_depth_mm:
            description: |-
              mniu: radial thread depth (single-flank, mm). For an ISO metric 60° thread the canonical depth is `0.6495 × pitch_mm` (H × 5/8 where H = pitch × √3/2). The driver applies this as the cutter's radial bite past the source-circle radius: * internal: cutter outer edge sits at `bore_radius + thread_depth` (engages the wall by `thread_depth`), * external: cutter inner edge sits at `stud_radius - thread_depth` (cuts the stud's flank by `thread_depth`).

              `None` ⇒ ISO 60° default. Set explicitly for non-ISO thread forms (UN, Whitworth, ACME, …). Older serialized projects without this field deserialize as `None` and pick up the ISO default at planning time — backward compatible.
            format: double
            type:
            - number
            - 'null'
          type:
            enum:
            - thread
            type: string
        required:
        - type
        type: object
      - description: 'V-bit edge break (rt1.18). The cutter walks the source path itself at a single Z computed from the bit''s cone angle and the desired chamfer width: `z = -width_mm / tan(tip_angle / 2)`. One pass at that depth carves a beveled edge whose horizontal width on the workpiece equals `width_mm`. Optionally followed by a second pass at the tool''s finish-set feed/speed for surface quality. Default values for the variant fields keep legacy payloads (`{ "type": "chamfer" }`) backward-compatible.'
        properties:
          finish_pass:
            default: false
            description: When `true`, the chamfer is cut twice — once at the rough feed (cleanup) and once at the tool's finish-set feed (rt1.27) for surface quality. Default `false`.
            type: boolean
          type:
            enum:
            - chamfer
            type: string
          width_mm:
            default: 1.0
            description: Horizontal width of the chamfer cut on the workpiece, mm. Mirrors Estlcam's Fasenabstand. Positive; defaults to 1.0.
            format: double
            type: number
        required:
        - type
        type: object
      - description: Tool-on engraving — no offset, follows the source path. Carries `contour` params (leads / cut direction / approach point).
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          type:
            enum:
            - engrave
            type: string
        required:
        - type
        type: object
      - description: Drag-knife — emits trail-compensation moves. Carries `contour` params (mainly approach point + cut direction).
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          type:
            enum:
            - drag_knife
            type: string
        required:
        - type
        type: object
      - description: 'T-slot / undercut pass (3g6u). Drives a T-slot / keyway cutter (`ToolKind::TSlot`: wide cutting head at the tip, narrow neck above) along the source path as the slot centerline, at a single floor Z (= `params.depth`). The head sweeps its full diameter to carve the undercut "wings"; the neck rides in a stem slot that a prior endmill op must have cut to >= the neck width (a T-slot cutter physically cannot mill the narrow stem itself, since its head is the widest part). Behaviorally a single-Z centerline follow like `Engrave`; the dedicated kind exists so the op is discoverable, validates the tool kind, and carries the stem-slot prerequisite warning. Carries `contour` params for lead-in / cut direction (a lateral lead-in lets the head enter the floor plane without plunging through the narrow stem).'
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          type:
            enum:
            - t_slot
            type: string
        required:
        - type
        type: object
      - description: Dovetail / form-profile undercut pass (b7qz). Drives a form / profile cutter (`ToolKind::FormProfile` — e.g. a dovetail bit, widest at the bottom face) along the source path as the groove centerline, at a single floor Z (= `params.depth`). The bit's angled flanks carve the undercut walls in one pass; like the T-slot sibling it does NOT cascade through intermediate Z levels (that head-/flank-at-every-depth cascade is exactly the bug this op fixes). The undercut flank cannot be plunged into safely, so the op assumes a roughing channel (≈ the profile's neck width) was cut to depth by a prior endmill op and warns about it. Behaviorally a single-Z centerline follow like `Engrave`; the dedicated kind exists so the op is discoverable, validates the tool kind, and carries the roughing prerequisite. Carries `contour` params for lead-in / cut direction.
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          type:
            enum:
            - dovetail
            type: string
        required:
        - type
        type: object
      - description: Helical entry into a closed contour. Reserved for future thread-mill style expansion; no params today.
        properties:
          type:
            enum:
            - helix
            type: string
        required:
        - type
        type: object
      - description: 'V-Carve: drives a V-bit along the medial axis of a closed region, with depth varying per point so the V''s tip dips deepest where the region is widest. The depth at each point is `z = -R_inscribed / tan(tip_angle / 2)` for the inscribed-circle radius `R_inscribed` at that point of the medial axis. Embeds the per-kind `VCarveParams` (`carve_max_width` cap, second-pass refine).'
        properties:
          carve:
            allOf:
            - $ref: '#/components/schemas/VCarveParams'
            default:
              full_medial_axis: false
              multi_pass_refine: false
          type:
            enum:
            - v_carve
            type: string
        required:
        - type
        type: object
      - description: 'rt1.34: program-level optional-stop. Emits `M5` (spindle off) + `M0` + an operator-readable comment + `M3` (spindle back on) where the op sits in the operations list. The cutter doesn''t move and no source geometry is required — the op exists purely to pause the machine between two other ops so the operator can intervene (manual tool change on a machine without ATC, inspect the cut, flip the stock for double-sided work, etc.). Mirrors Estlcam''s "Insert M0" entry (decompile `_I.cs:3394`).'
        properties:
          message:
            default: ''
            description: One-line message shown on the operator console / pendant. Empty string is allowed; the post still emits the M0 stop.
            type: string
          type:
            enum:
            - pause
            type: string
        required:
        - type
        type: object
      - description: '8n4k: machine-home building block. Emits `G28` (move to the predefined machine-home position), optionally followed by a rapid Z retract to the program''s safe Z so the NEXT op''s rapid traversal starts from a known clearance. Like `Pause`, it carries no tool, no source, and no Z schedule — it''s a program-only building block so a project can scaffold shop workflow (start of program, between two-sided ops, end of program) without hand-written G-code.'
        properties:
          retract_to_safe_z:
            default: true
            description: When `true`, follow the `G28` with a rapid `G0 Z<safe>` using the op's `params.fast_move_z`. Most controllers leave the spindle wherever machine zero puts it after `G28` — rarely what the next op expects, so the default is `true`.
            type: boolean
          type:
            enum:
            - homing
            type: string
        required:
        - type
        type: object
      - description: '8n4k: touch-probe building block. Emits `G38.2 <axis><distance> F<feed>` — a probing-feed move along the chosen axis that stops as soon as the probe trips. Used at program start (zero the WCS Z to the stock top), between ops (verify a tool-length reference after a manual tool change), or as a repeatability sanity check. Probe tooling / electrical hookup is out of scope here; the op just emits the canned motion. No project tool / source needed — `tool_id` is ignored.'
        properties:
          axis:
            allOf:
            - $ref: '#/components/schemas/ProbeAxis'
            default: z
            description: Axis to probe along.
          distance_mm:
            description: 'Maximum search distance in mm. Sign convention follows the controller: NEGATIVE Z to probe DOWN into stock, the usual case; positive X / Y for an edge-finder cycle from outside the workpiece. The controller halts at the trigger; the magnitude here is the search limit.'
            format: double
            type: number
          feed_mm_min:
            description: Probe feedrate in mm/min. Typical 50–200 mm/min for a touch-trigger probe (slow enough to trip repeatably; fast enough that the run doesn't take forever).
            format: uint32
            minimum: 0.0
            type: integer
          type:
            enum:
            - probe
            type: string
        required:
        - distance_mm
        - feed_mm_min
        - type
        type: object
      - description: '8n4k: program navigation marker. Emits ONLY an operator- readable comment line at its slot in the op stream — the cutter doesn''t move and no controller state changes. Pendants and gcode-viewer UIs that index by program line use comment markers as jump targets so the operator can pause mid-program, navigate to the next marker, and continue from there. Also useful as a long-form note ("Flip stock NOW for second-op") preserved across gcode regenerations.'
        properties:
          label:
            default: ''
            description: Label text. Empty string is allowed but pointless. The post wraps the label with `--- … ---` so it stands out among the cut-block comments above and below.
            type: string
          type:
            enum:
            - cycle_marker
            type: string
        required:
        - type
        type: object
      - description: |-
          rxm9: external G-code include block. Splices a user-provided gcode file's contents into the program stream at this op's slot — manufacturer pierce / probe canned cycles, hand-tuned safety preambles, return-to-position macros, post-processed subroutines. Program-only kind (like the other building blocks): no tool, no source, no cut schedule.

          Variable expansion: `{name}` tokens in `content` are substituted at emit time against the post's live state. Supported variables today:

          * `{x}`, `{y}`, `{z}` — machine position right before the block (last X / Y / Z the post commanded; "0" if none). * `{f}` — last commanded feedrate, mm/min. * `{s}` — last commanded spindle RPM. * `{safe_z}` — the op's `params.fast_move_z`.

          Unknown `{tokens}` pass through as literal `{name}` text AND emit a `gcode_include_unknown_variable` warning so a typo doesn't silently leave a half-substituted line in the shipped program.

          Sim coverage (yhen): the heightmap-side simulator classifies the included body line-by-line. Lines that map to G0, G1, G2, G3 or canned cycles G73 / G81 / G82 / G83 are carved by the unified preview-interpret pass at `run_pipeline`'s tail. Everything else fires a counted `gcode_include_lines_skipped` summary warning so the user knows the carve is incomplete. When `verbose_unsim_warnings` is set (xi2g), the summary is followed by one `gcode_include_unsim_line` warning per skipped line for users debugging an exotic block.
        properties:
          content:
            default: ''
            description: The G-code text to splice in, verbatim except for variable substitution. Lines are emitted via `post.raw()` so the delta encoder doesn't reformat them. Trailing newline is optional.
            type: string
          path:
            default: ''
            description: Display-only path the user picked the file from. The file's CONTENTS live in `content` so the project round- trips even when the file moves. Empty allowed.
            type: string
          type:
            enum:
            - gcode_include
            type: string
          verbose_unsim_warnings:
            default: false
            description: 'xi2g: when `true`, fan out one `gcode_include_unsim_line` warning per skipped line in addition to the `gcode_include_lines_skipped` summary. Off by default so the warnings panel doesn''t drown on a multi-skip block; power users debugging an exotic canned cycle flip this on to see exactly which lines were skipped and why.'
            type: boolean
        required:
        - type
        type: object
      - description: 'f60x: 3-axis ball-nose relief surfacing. Finishes a curved Z(x,y) surface (a [`crate::project::ReliefSource`] referenced by `source_id`, e.g. a grayscale-image relief) with a ball-nose cutter: the drop-cutter engine (`cam::surface_mill`) produces gouge-free raster scanlines whose Z follows the surface. This is a FINISH pass — the bulk should be roughed first (constant-Z endmill). The source''s normalized brightness is mapped to Z in `[z_min_mm, z_max_mm]` at planning time, so depth is a cheap op-level knob (no image re-upload).'
        properties:
          along_step_mm:
            default: 0.5
            description: Sampling pitch along each scanline (mm). Finer = smoother path.
            format: double
            type: number
          invert:
            default: false
            description: Invert the brightness→Z mapping (dark = high instead of low).
            type: boolean
          scallop_height_mm:
            default: 0.05
            description: Target scallop height between adjacent passes (mm) — drives the stepover unless `stepover_mm` overrides.
            format: double
            type: number
          scan_direction:
            allOf:
            - $ref: '#/components/schemas/ScanDirection'
            default: along_x
            description: Raster scanline direction.
          source_id:
            description: Id of the [`crate::project::ReliefSource`] (in `Project.relief_sources`) this op surfaces. No matching source ⇒ the op emits nothing.
            format: uint32
            minimum: 0.0
            type: integer
          stepover_mm:
            description: Explicit stepover override (mm). `Some(s > 0)` wins over the scallop computation.
            format: double
            type:
            - number
            - 'null'
          type:
            enum:
            - relief_mill
            type: string
          z_max_mm:
            default: 0.0
            description: Shallowest cut Z (mm) — where the brightest pixels map. Usually 0 (stock top).
            format: double
            type: number
          z_min_mm:
            default: 0.0
            description: Deepest cut Z (mm, negative) — where the darkest pixels map.
            format: double
            type: number
        required:
        - source_id
        - type
        type: object
    OpParams:
      description: |-
        Universal per-op parameters — fields that apply to **every** op kind. Kind-specific config lives in the matching variant struct embedded in [`super::op::OpKind`]:

        - Closed-contour params (tabs, leads, cut direction, approach point, corner-feed) → [`ContourParams`] - Pocket cascade / islands / Pocket-Outside frame → [`PocketParams`] - Profile overcut / reverse / helix → [`ProfileParams`] - V-Carve cap / second-pass → [`VCarveParams`] - Drill Stufenfase chamfer width → [`super::op::OpKind::Drill`]

        (kbx5 step 3: the flat-junk-drawer `OpParams` was reduced to this common struct after readers and writers all moved to the variant structs.)
      properties:
        depth:
          default: 0.0
          description: |-
            Final cut depth (negative number — a depth, not a height).

            4dxb: `#[serde(default)]` so program-only ops (Pause, Homing, Probe, `CycleMarker`, `GcodeInclude`) — which have no meaningful depth schedule and whose FE constructors omit the field — deserialize without a "missing field `depth`" error. Cutting ops always emit the field explicitly; this default only fires for program-only ops whose params bag is ignored anyway.
          format: double
          type: number
        depth_list:
          description: Explicit list of Z depths for each pass, overriding the `step+finish_step` schedule. Useful for non-linear schedules (shallower at start for tough material, deeper later, slow finish at the end). Each entry is an absolute Z (negative number); the cutter visits them in order. Empty = use the step-down loop.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          default: 0.0
          description: |-
            Z for rapid moves between cuts.

            4dxb: defaulted to 0.0 alongside the other two universal scalars. Program-only ops never use this; cutting ops always emit it explicitly.
          format: double
          type: number
        feed_rate_override:
          description: 'Override the tool''s `feed_rate` for this op only. Some materials or finishing passes need a slower feed than the tool''s default; rather than editing the tool library, set this per-op. None = use the tool''s `feed_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        finish_step:
          description: Optional smaller step for the FINAL Z pass, for a cleaner bottom finish. None = use the same `step` for the last pass too. Negative just like `step`.
          format: double
          type:
          - number
          - 'null'
        objectorder:
          allOf:
          - $ref: '#/components/schemas/ObjectOrder'
          default: nearest
          description: Cut-order strategy for multiple objects.
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          description: How the cutter descends into material at the start of each Z pass. Default Direct (straight plunge). Ramp { `angle_deg` } walks forward along the path while descending Z, taking a chip in both directions simultaneously — required for non-center-cutting bits and for harder materials.
        plunge_rate_override:
          description: 'Override the tool''s `plunge_rate` (Z feed) for this op. Useful for slowing the plunge on hard materials without changing the XY feed. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        start_depth:
          default: 0.0
          description: |-
            Z at which the first pass starts.

            4dxb: same rationale as `depth` — defaulted to 0.0 so program-only ops decode cleanly.
          format: double
          type: number
        step:
          description: Per-pass step (negative ⇒ down). None = inherit from `ToolEntry.default_step`. Legacy projects wrote a bare `0.0` to mean "unset"; the deserializer maps that to None.
          format: double
          type:
          - number
          - 'null'
        stock_to_leave_mm:
          description: '1mlv: leave this much XY stock unmachined on every wall (Profile inside/outside cascade, Pocket cascade). Positive number — the cutter stays this far away from the geometric wall, so a later finishing pass (different tool / op) can clean it up. Differs from `PocketParams.finish_xy_allowance_mm` which is Pocket-only and triggers an extra contour pass; `stock_to_leave_mm` applies to ALL offset-cascade ops and is the universal "rough leaves material" knob. 0.0 = cutter walks the geometric wall (the default, matching prior wiac behaviour).'
          format: double
          type: number
        through_depth:
          description: Cut past the nominal `depth` by this much (positive number — gets subtracted from the working depth). Useful for through-cuts on edge-clamped sheet so the cutter clears the bottom even with minor stock thickness variation. 0.0 = no extension.
          format: double
          type: number
      type: object
    OpParamsCommon:
      description: |-
