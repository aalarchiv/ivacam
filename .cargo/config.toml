[alias]
xtask = "run --package xtask --"

# Cache compiled rustc artifacts keyed on input + flags. Big win after
# `cargo clean`, after rebases that touch only a few crates, and across
# worktrees. Local-disk cache by default (~/.cache/sccache). Same
# fail-loud policy as the lld block below: machines without sccache
# installed fail at build start — `cargo install sccache` or remove
# this block.
[build]
rustc-wrapper = "sccache"

# hzru: prefer lld for linking. GNU ld is single-threaded; lld
# parallelises and is ~5–10× faster on the link step alone — a
# meaningful chunk of incremental-build wall time on this workspace.
# The linker frontend (cc/gcc/clang) honors `-fuse-ld=<name>` and
# picks up `/usr/bin/lld` automatically. To upgrade to mold later:
#
#     sudo apt install mold
#     # swap `lld` → `mold` in the rustflags below.
#
# Both are drop-in compatible with the GNU-ld interface, so no other
# config needs to change. CI / shop machines without lld installed
# will fail loudly at link time, which is the right behavior — fix
# the install or revert this block.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# Android: align native .so LOAD segments to 16 KB. Android 15+ devices with
# 16 KB memory pages (Pixel 8+ on recent Android) refuse to load 4 KB-aligned
# libraries — the installer/loader flags
# "lib/arm64-v8a/libivac_tauri_lib.so: LOAD segment mismatch". NDK r27's
# linker still defaults to 4 KB max-page-size, so force 16 KB here. Applied to
# all Android ABIs (harmless on the 32-bit ones, which don't use 16 KB pages).
# See https://developer.android.com/16kb-page-size (ivac-7i08).
#
# `strip=symbols` also: 16 KB libs are STORED uncompressed in the APK (so they
# mmap page-aligned), which made the debug APK balloon to ~135 MB — almost all
# of it debug symbols in the .so. Strip them on Android only (per-target, so
# desktop keeps its backtraces); the lib still loads and stays 16 KB-aligned.
[target.aarch64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "strip=symbols"]

[target.armv7-linux-androideabi]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "strip=symbols"]

[target.x86_64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "strip=symbols"]

[target.i686-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "strip=symbols"]
