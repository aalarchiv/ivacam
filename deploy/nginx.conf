# ivaCAM — static web build (frontend/dist/)
#
# The production web build is fully static and serverless: it runs the
# CAM engine in-browser via WebAssembly, so there is NO API server to
# deploy. Just serve the dist/ tree.
#
#   cd frontend && pnpm build            # → frontend/dist/
#   # copy dist/ to the `root` below, then:
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/ivacam.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# This is a plain-HTTP block. Run `sudo certbot --nginx` to add TLS —
# it rewrites this into a :443 server plus an 80→443 redirect. HTTPS is
# recommended (the About / error "copy to clipboard" buttons need a
# secure context) but the app otherwise runs fine over HTTP.

server {
    listen      80;
    listen      [::]:80;
    server_name cnc.example.com;

    root  /srv/ivacam/dist;
    index index.html;

    # Compress the text-y assets and the wasm (gzips ~3x).
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      application/javascript application/wasm text/css
                    image/svg+xml application/json;

    # WASM MIME type. nginx >= 1.21.1 already maps .wasm in its default
    # mime.types; this per-location default_type is a no-clobber safety
    # net for older builds. (A bare `types { application/wasm wasm; }`
    # block here would REPLACE the whole inherited MIME map and break
    # css/js — don't do that; this is the safe way.) Same content-hashed
    # immutable caching as the rest of /assets/.
    location ~* \.wasm$ {
        default_type application/wasm;
        add_header   Cache-Control "public, max-age=31536000, immutable";
    }

    # Content-hashed bundles never change.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Always re-validate the entry point so a new deploy is picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # No client-side router — navigation is query-string based
    # (?api=wasm, ?sample=…). Fall back to the app shell so a stray deep
    # link or a refresh loads the app instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
