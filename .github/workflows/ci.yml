name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-features
      - name: schema drift guard
        run: cargo run -p xtask -- schema-check

  wasm:
    name: wasm-pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build ivac-wasm (web target)
        run: wasm-pack build crates/ivac-wasm --target web --release

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: codegen drift guard
        # Re-run openapi-typescript against schema/openapi.yaml; the
        # checked-in generated.ts must not diff. Pairs with the
        # `cargo run -p xtask -- schema-check` step in the rust job —
        # together they enforce Rust → YAML → TypeScript stay in sync.
        run: |
          pnpm run codegen
          git diff --exit-code -- src/lib/api/generated.ts
      - name: prettier
        run: pnpm run lint
      - name: type-check
        run: pnpm run check
      - name: test
        run: pnpm run test
      - name: build
        run: pnpm run build

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories
