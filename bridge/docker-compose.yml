# Stage-1 bridge — `docker compose -f bridge/docker-compose.yml up`.
#
# Run from the repo root so the build context resolves bridge/ and
# refs/viaconstructor/. The bridge listens on 8765 by default; override via
# WIAC_HOST / WIAC_PORT.

services:
  bridge:
    build:
      # Repo root so the Dockerfile can pull both bridge/ and refs/.
      context: ..
      dockerfile: bridge/Dockerfile
    image: wiac-bridge:dev
    ports:
      - "${WIAC_PORT:-8765}:8765"
    environment:
      - WIAC_HOST=0.0.0.0
      - WIAC_PORT=8765
      - WIAC_RELOAD=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
