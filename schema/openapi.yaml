openapi: 3.0.3
info:
  title: wiaConstructor API
  version: 0.0.1
  description: |
    JSON contract for wiaConstructor core operations.
    Implementation-agnostic: served by the Stage-1 Python FastAPI bridge,
    the Rust axum server, Tauri command bindings, and the WASM browser
    bindings — same shape everywhere.
  license:
    name: GPL-3.0-or-later
servers:
- url: http://localhost:8765
  description: local Stage-1 FastAPI bridge
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: health
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /version:
    get:
      summary: Version + capabilities
      operationId: version
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /import:
    post:
      summary: Parse a vector file into wiaConstructor geometry
      operationId: import
      description: |
        Accepts the bytes of a DXF, SVG, HPGL, NGC, STL or other supported
        format and returns the flattened geometry: layers, segments
        (LINE/ARC primitives with bulge for arcs), bounding box, and unit
        scale.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                format:
                  type: string
                  description: Optional explicit format hint (dxf|svg|hpgl|ngc|stl). Inferred from filename otherwise.
      responses:
        '200':
          description: Parsed geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /generate:
    post:
      summary: Generate gcode + 3D toolpath preview from imported geometry
      operationId: generate
      description: |
        Stub for Stage-1; full setup-tree input lands in d0d follow-ups.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generated output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /text:
    post:
      summary: Render TTF text into geometry segments
      operationId: renderText
      description: |
        Tessellates a TTF/OTF font + a string into the project's standard
        Segment shape. Used by the Add-Text dialog. The response also
        carries a `single_line` flag derived by `is_single_line_font` so
        the dialog can warn when a filled-outline font is paired with the
        Engraving style.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderTextRequest'
      responses:
        '200':
          description: Rendered text geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTextResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /helix-radius:
    post:
      summary: Preview the auto-fit helix radius for a pocket selection
      operationId: computeHelixRadius
      description: |
        Runs the same inscribed-circle search the gcode generator does at
        run time, so the OpPropertiesPanel can display the detected radius
        (or a short fallback reason) before the user clicks Generate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HelixRadiusRequest'
      responses:
        '200':
          description: Detected helix radius or a fallback reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelixRadiusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  schemas:
    AutoFix:
      oneOf:
      - properties:
          kind:
            enum:
            - assign_tool
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested_tool_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        - suggested_tool_id
        type: object
      - properties:
          kind:
            enum:
            - lower_sim_resolution
            type: string
          suggested_cell_mm:
            format: double
            type: number
        required:
        - kind
        - suggested_cell_mm
        type: object
      - properties:
          kind:
            enum:
            - disable_op
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        type: object
      - properties:
          kind:
            enum:
            - change_profile_offset
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested:
            $ref: '#/components/schemas/ToolOffset'
        required:
        - kind
        - op_id
        - suggested
        type: object
    AxesConfig:
      description: Bundle of per-axis output configs. Set on `PostProfile::axes` to take over from the hard-coded axis letters / `%.3f` format in the `LinuxCNC` / GRBL posts. All seven axes default to their natural letter + sensible format, so `AxesConfig::default()` is the same as the legacy hand-written behavior — the user only changes what they care about.
      properties:
        feed:
          $ref: '#/components/schemas/AxisFormat'
        i:
          $ref: '#/components/schemas/AxisFormat'
        j:
          $ref: '#/components/schemas/AxisFormat'
        speed:
          $ref: '#/components/schemas/AxisFormat'
        x:
          $ref: '#/components/schemas/AxisFormat'
        y:
          $ref: '#/components/schemas/AxisFormat'
        z:
          $ref: '#/components/schemas/AxisFormat'
      required:
      - feed
      - i
      - j
      - speed
      - x
      - y
      - z
      type: object
    AxisFormat:
      description: Per-axis output configuration. `enabled=false` means "drop this axis from the line entirely" (laser controllers commonly ignore Z; some lathes ignore Y). `name` is the output letter — rename Z to A for a rotary-as-Z setup. `format` is a tiny printf-ish spec. `scale` is a multiplier applied BEFORE formatting (`-1.0` flips the Z-up vs Z-down convention; `0.0393701` mm→inch).
      properties:
        enabled:
          default: true
          type: boolean
        format:
          type: string
        name:
          type: string
        scale:
          format: double
          type: number
      required:
      - format
      - name
      - scale
      type: object
    AxisLimits:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
        z:
          format: double
          type: number
      required:
      - x
      - y
      - z
      type: object
    BBox:
      properties:
        max_x:
          format: double
          type: number
        max_y:
          format: double
          type: number
        min_x:
          format: double
          type: number
        min_y:
          format: double
          type: number
      required:
      - max_x
      - max_y
      - min_x
      - min_y
      type: object
    ContourParams:
      description: Parameters shared by every closed-contour op (Profile / Pocket / Engrave / `DragKnife`). Embedded in the matching [`super::op::OpKind`] variants. Holds tab shape + placement, lead-in / lead-out, cut direction, corner-feed reduction, and the optional user-picked approach point. (kbx5 step 1.)
      properties:
        approach_point:
          description: 'Anfahrpunkt (rt1.26): user-picked XY where the cutter enters each closed-contour ring. `None` = auto.'
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type:
          - array
          - 'null'
        corner_feed_reduction:
          description: When > 0, slow the feed at sharp corners by this fraction.
          format: double
          type: number
        cut_direction:
          allOf:
          - $ref: '#/components/schemas/CutDirection'
          description: Cut direction for the main (roughing) passes.
        finish_cut_direction:
          allOf:
          - $ref: '#/components/schemas/CutDirection'
          description: Cut direction for the finishing pass — the offset that defines the wall surface (Pocket level=0 ring; Profile single-pass cut).
        leads:
          allOf:
          - $ref: '#/components/schemas/LeadsConfig'
          default:
            in: off
            in_lenght: 5.0
            out: off
            out_lenght: 5.0
          description: Lead-in / lead-out shape.
        tab_mode:
          allOf:
          - $ref: '#/components/schemas/TabPlacementMode'
          description: How tab positions are sourced for this op (rt1.10).
        tab_placements:
          description: User-placed tabs, anchored geometry-relative as `(object_id, t)`. Honored when `tab_mode` is `Manual` or `Mixed`; `Off` / `Auto` ignore.
          items:
            $ref: '#/components/schemas/TabPlacement'
          type: array
        tabs:
          allOf:
          - $ref: '#/components/schemas/TabsConfig'
          default:
            active: false
            height: 1.0
            tab_type: rectangle
            width: 10.0
          description: 'Per-op tab SHAPE config: width / height / kind (rectangle vs ramp) / ramp angle. Effective tab POSITIONS come from `tab_placements` (manual) and / or `tab_mode` (auto-spaced).'
      type: object
    Coolant:
      enum:
      - off
      - mist
      - flood
      type: string
    CutDirection:
      description: |-
        Climb vs conventional milling. Determines the path winding the generator emits — for a standard right-hand spindle:

        | context (cutter location) | conventional      | climb              | |---------------------------|-------------------|--------------------| | outer (cutter outside)    | CW (area < 0)     | CCW (area > 0)     | | inner (cutter in pocket)  | CCW (area > 0)    | CW (area < 0)      |

        "Conventional" is the safer default — most hobby and older mills don't have the rigidity / backlash takeup needed for clean climb cuts. Climb gives a better surface finish but requires a stiff machine. The finishing pass typically stays conventional regardless of the main strategy because the finish wall quality matters most.
      enum:
      - conventional
      - climb
      type: string
    DrillCycle:
      description: Drill-cycle picker for [`OpKind::Drill`]. Mirrors the canned cycles G81 / G83 / G73 from the `LinuxCNC` / Fanuc dialect plus the dwell-at-bottom parameter `PyCAM`'s `Drilling.py` exposes. Posts that don't support canned cycles fall back to a manual G0/G1 expansion of the same cycle (see `PostProcessor::drill_*` defaults).
      oneOf:
      - description: G81 — single plunge to depth, retract.
        properties:
          dwell_sec:
            default: 0.0
            description: Dwell at bottom in seconds before retract. 0 = no dwell.
            format: double
            type: number
          kind:
            enum:
            - simple
            type: string
        required:
        - kind
        type: object
      - description: G83 — peck with full retract to clearance plane between pecks.
        properties:
          dwell_sec:
            default: 0.0
            format: double
            type: number
          kind:
            enum:
            - peck
            type: string
          peck_step_mm:
            format: double
            type: number
        required:
        - kind
        - peck_step_mm
        type: object
      - description: G73 — peck with chip-break (small partial retract between pecks).
        properties:
          dwell_sec:
            default: 0.0
            format: double
            type: number
          kind:
            enum:
            - chip_break
            type: string
          peck_step_mm:
            format: double
            type: number
        required:
        - kind
        - peck_step_mm
        type: object
    Error:
      properties:
        details: true
        error:
          type: string
      required:
      - error
      type: object
    ErrorKind:
      enum:
      - bad_input
      - misconfigured
      - limit
      - unsupported
      - io
      - internal
      type: string
    Fixture:
      description: A user-declared physical obstacle on the stock the cutter must miss. Lives in stock-relative XY (same frame as the imported geometry) and occupies a Z range; the sim collision test gates on that range first then falls back to a per-shape XY swept-region check.
      properties:
        color:
          default: 4288696512
          description: Visual color in 2D / 3D previews, packed RGBA (0xRRGGBBAA).
          format: uint32
          minimum: 0.0
          type: integer
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/FixtureKind'
        name:
          type: string
        origin:
          description: Center of the fixture in stock XY (mm).
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type: array
        z_bottom:
          description: Z range the fixture occupies (relative to stock-top = 0). Typically `z_top` is positive (a clamp standing above stock); both can be negative for cleats below.
          format: double
          type: number
        z_top:
          format: double
          type: number
      required:
      - id
      - kind
      - name
      - origin
      - z_bottom
      - z_top
      type: object
    FixtureKind:
      oneOf:
      - description: Axis-aligned rectangle centered on `origin`.
        properties:
          depth:
            format: double
            type: number
          shape:
            enum:
            - box
            type: string
          width:
            format: double
            type: number
        required:
        - depth
        - shape
        - width
        type: object
      - description: Cylinder centered on `origin`.
        properties:
          radius:
            format: double
            type: number
          shape:
            enum:
            - cylinder
            type: string
        required:
        - radius
        - shape
        type: object
      - description: Polygon outline in fixture-local coordinates (origin-relative).
        properties:
          shape:
            enum:
            - polygon
            type: string
          vertices:
            items:
              items:
              - format: double
                type: number
              - format: double
                type: number
              maxItems: 2
              minItems: 2
              type: array
            type: array
        required:
        - shape
        - vertices
        type: object
    FrameShape:
      description: Shape of the synthetic frame built around a Pocket-Outside selection. Rectangle is a plain padded bbox; `RoundedRectangle` uses the same bbox with a quarter-arc bulge at each corner. Oval and `TightOutline` are deferred follow-ups (not yet implemented).
      enum:
      - rectangle
      - rounded_rectangle
      type: string
    GcodeIndex:
      description: 'Lookup table the frontend uses to wire the gcode text panel to the 3D toolpath: line N in the gcode corresponds to `segments[lines_to_segment[N]]`, and `segments_to_line[i]` is the 1-based gcode line that produced segment `i`. Both vectors are dense — gcode lines that don''t move the tool map to `usize::MAX` so callers can detect the gap.'
      properties:
        lines_to_segment:
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments_to_line:
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
      required:
      - lines_to_segment
      - segments_to_line
      type: object
    GenerateRequest:
      properties:
        post_processor:
          anyOf:
          - $ref: '#/components/schemas/PostProcessorKind'
          - type: 'null'
        project:
          allOf:
          - $ref: '#/components/schemas/Project'
          description: The full project — geometry + machine + tools + operations + tabs.
      required:
      - project
      type: object
    GenerateResponse:
      properties:
        gcode:
          type: string
        gcode_index:
          $ref: '#/components/schemas/GcodeIndex'
        regions:
          description: 'Filled-area preview for Pocket ops: the actual region the cutter will machine, computed via the per-op `SourceCombine` mode (Auto by default — outer + inner = annulus). The frontend paints these as translucent fills so the user sees what they''re cutting before reading the toolpath. Empty for non-Pocket ops.'
          items:
            $ref: '#/components/schemas/RegionPreview'
          type: array
        stats:
          $ref: '#/components/schemas/PipelineStats'
        time_estimate:
          allOf:
          - $ref: '#/components/schemas/TimeEstimate'
          description: Acceleration- and jerk-aware program-time estimate. See [`crate::sim::timing`] for the integrator. The total accounts for motion under the trapezoidal profile, tool-change time (`MachineConfig.toolchange_s` × number of M6s), and per-tool spindle pauses summed across used tools.
        toolpath:
          items:
            $ref: '#/components/schemas/ToolpathSegment'
          type: array
        warnings:
          description: Non-fatal warnings raised during planning — mostly tool-fit problems (cutter doesn't fit the geometry, kind mismatch, …). The frontend surfaces these in the operations list status badge and a sidebar list; the gcode is still emitted.
          items:
            $ref: '#/components/schemas/PipelineWarning'
          type: array
      required:
      - gcode
      - gcode_index
      - stats
      - time_estimate
      - toolpath
      type: object
    GenerateStats:
      properties:
        closed_object_count:
          format: uint
          minimum: 0.0
          type: integer
        object_count:
          format: uint
          minimum: 0.0
          type: integer
        offset_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - closed_object_count
      - object_count
      - offset_count
      type: object
    HealthResponse:
      properties:
        ok:
          type: boolean
      required:
      - ok
      type: object
    HelixRadiusRequest:
      description: Cross-transport request for the helix auto-fit preview. The frontend sends imported segments + the operation's selected object ids + the active tool diameter; the backend walks the same chaining/combine pipeline the gcode generator does and returns the largest inscribed circle that fits inside the resulting pocket boundary.
      properties:
        object_ids:
          description: Object ids from the import that should participate in the pocket boundary computation. Same shape as `OpSource::Objects.ids`. Empty = "use all segments as one region".
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments:
          description: Source segments to derive the closed-pocket boundary from.
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        tool_diameter_mm:
          format: double
          type: number
      required:
      - object_ids
      - segments
      - tool_diameter_mm
      type: object
    HelixRadiusResponse:
      properties:
        fallback_reason:
          description: Short reason string when None (so the UI can show "Pocket too small for tool" instead of just an empty Auto state).
          type:
          - string
          - 'null'
        radius_mm:
          description: Some(r) when an inscribed circle fits; None when the auto path would fall back to Ramp/Direct.
          format: double
          type:
          - number
          - 'null'
      type: object
    HolderShape:
      description: Geometry of the tool holder above the shank. The holder is treated as cylindrically symmetric around the tool axis (Z), so set-screw flats / asymmetric ER nuts get approximated by their bounding cylinder/cone — good enough to flag clear collisions, conservative on tight cases.
      oneOf:
      - properties:
          diameter_mm:
            format: double
            type: number
          kind:
            enum:
            - cylinder
            type: string
          length_mm:
            format: double
            type: number
        required:
        - diameter_mm
        - kind
        - length_mm
        type: object
      - properties:
          bottom_diameter_mm:
            format: double
            type: number
          kind:
            enum:
            - cone
            type: string
          length_mm:
            format: double
            type: number
          top_diameter_mm:
            format: double
            type: number
        required:
        - bottom_diameter_mm
        - kind
        - length_mm
        - top_diameter_mm
        type: object
      - properties:
          cone_length_mm:
            format: double
            type: number
          cone_top_diameter_mm:
            format: double
            type: number
          cylinder_diameter_mm:
            format: double
            type: number
          cylinder_length_mm:
            format: double
            type: number
          kind:
            enum:
            - stepped
            type: string
        required:
        - cone_length_mm
        - cone_top_diameter_mm
        - cylinder_diameter_mm
        - cylinder_length_mm
        - kind
        type: object
    ImportResponse:
      properties:
        bbox:
          $ref: '#/components/schemas/BBox'
        filename:
          type: string
        format:
          type: string
        layers:
          items:
            $ref: '#/components/schemas/Layer'
          type: array
        object_meta:
          default: []
          description: Object metadata (closed flag, layer, color, bbox) keyed by the same 1-based id — `object_meta[id - 1]` is the entry for object `id`.
          items:
            $ref: '#/components/schemas/ImportedObject'
          type: array
        objects:
          default: []
          description: Per-segment object id from the chaining pass — `objects[i]` is the 1-based id of the chained object that consumed `segments[i]` (0 means "didn't chain into any object", e.g. an isolated point). The frontend uses this to do object-level selection in 2D.
          items:
            format: uint32
            minimum: 0.0
            type: integer
          type: array
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        text_entities:
          description: DXF TEXT / MTEXT entities — emitted as editable metadata instead of being rendered to opaque polylines at import time. The frontend converts each into a `TextLayer` so the user can edit the content, font, size, rotation, etc., and the pipeline re-renders them at Generate. Empty for formats that don't carry text entities (SVG).
          items:
            $ref: '#/components/schemas/ImportedTextEntity'
          type: array
        unit_scale:
          format: double
          type: number
        warnings:
          items:
            type: string
          type: array
      required:
      - bbox
      - filename
      - format
      - layers
      - segments
      - unit_scale
      - warnings
      type: object
    ImportedObject:
      properties:
        bbox:
          $ref: '#/components/schemas/BBox'
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        id:
          format: uint32
          minimum: 0.0
          type: integer
        layer:
          type: string
      required:
      - bbox
      - closed
      - color
      - id
      - layer
      type: object
    ImportedTextEntity:
      description: Metadata for a TEXT / MTEXT entity captured during import. Carries just enough for the frontend to construct a `TextLayer` — the editable inputs the pipeline pre-pass uses to render glyphs.
      properties:
        kind:
          $ref: '#/components/schemas/ImportedTextKind'
        origin:
          description: Anchor in stock XY (mm).
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type: array
        rotation_deg:
          default: 0.0
          description: CCW degrees around `origin`.
          format: double
          type: number
        size_mm:
          format: double
          type: number
        source_layer:
          description: Original DXF layer name — preserved so the user knows where the text came from (the synthetic `__text_<id>` name takes over at pipeline time).
          type: string
        text:
          description: Full string. For Mtext, lines are `\n`-separated.
          type: string
      required:
      - kind
      - origin
      - size_mm
      - source_layer
      - text
      type: object
    ImportedTextKind:
      enum:
      - TEXT
      - MTEXT
      type: string
    Layer:
      properties:
        color:
          format: int32
          type: integer
        name:
          type: string
        segment_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - color
      - name
      - segment_count
      type: object
    LeadKind:
      enum:
      - off
      - straight
      - arc
      type: string
    LeadsConfig:
      properties:
        in:
          $ref: '#/components/schemas/LeadKind'
        in_lenght:
          description: 'Lead-in size. Interpreted by `LeadKind`: * `Straight`: straight-line LENGTH (mm) of the approach. * `Arc`: tangent roll-on arc RADIUS (mm). The arc sweeps a quarter turn from the approach point (radius away on the perpendicular) to the contour start, landing tangent to the first cut segment. * `Off`: ignored.'
          format: double
          type: number
        out:
          $ref: '#/components/schemas/LeadKind'
        out_lenght:
          description: Lead-out size. Same interpretation as `in_lenght` but applied at the END of the cut path (cutter rolls off the contour at Pn).
          format: double
          type: number
      required:
      - in
      - in_lenght
      - out
      - out_lenght
      type: object
    MachineConfig:
      properties:
        accel:
          anyOf:
          - $ref: '#/components/schemas/AxisLimits'
          - type: 'null'
          description: Per-axis acceleration in mm/s². When None the kinematic time estimator falls back to 250 mm/s² per axis (`LinuxCNC` default).
        arc_fit_tolerance_mm:
          description: Maximum deviation (mm) between the fitted G2/G3 arc and the original chord polyline. None ⇒ 0.01 mm. Only consulted when `arcs == true`.
          format: double
          type:
          - number
          - 'null'
        arcs:
          description: Whether the machine emits arc commands (G2/G3).
          type: boolean
        comments:
          type: boolean
        decimal_separator:
          description: Decimal separator for emitted numbers (rt1.36). `'.'` (default) suits `LinuxCNC` / GRBL / Mach3 and any controller configured in US locale. `','` covers European-locale Siemens / Heidenhain controllers that require `X1,5` instead of `X1.5`. Anything other than '.' / ',' silently falls back to '.'.
          maxLength: 1
          minLength: 1
          type: string
        jerk:
          anyOf:
          - $ref: '#/components/schemas/AxisLimits'
          - type: 'null'
          description: Per-axis jerk in mm/s³. None ⇒ trapezoidal-only profiling (S-curve refinement is Phase 2).
        line_number_start:
          description: Starting line number for `N<n>` prefixes (rt1.36). `None` (the default) emits unnumbered lines. `Some(10)` emits `N10`, `N20`, `N30`, … incrementing by 10. Required by some FANUC / vintage controllers; useful operator reference even on modern ones.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        mode:
          $ref: '#/components/schemas/MachineMode'
        plot_mode_z:
          description: 'Plot-mode Z (rt1.35 / Estlcam `c_PP.Z_Up_Dn)`: when true, the pipeline collapses every cut to ONE pass at the op''s cut depth and skips the multi-step descent / ramp / helix machinery. Z values written into gcode are restricted to `fast_move_z` (pen up between cuts) and the op''s `depth` (pen down on cut moves). Right setting for laser / plasma / pen plotters / 3D-printer extrusion and drag-knife controllers.'
          type: boolean
        post_profile:
          anyOf:
          - $ref: '#/components/schemas/PostProfile'
          - type: 'null'
          description: User-configurable post-processor profile (rt1.15). When `Some`, the built-in posts (linuxcnc / grbl) read its templates instead of emitting their hard-coded `program_start` / `program_end` / `tool_change` / coolant lines. `None` = hard-coded defaults.
        rapid_speed:
          description: Rapid (G0) traverse speed in mm/min. None ⇒ 5000 mm/min default.
          format: double
          type:
          - number
          - 'null'
        supports_toolchange:
          type: boolean
        toolchange_s:
          description: Tool-change time in seconds.
          format: double
          type: number
        unit:
          $ref: '#/components/schemas/UnitSystem'
        use_kinematic_time_estimate:
          description: When true (the default), use the accel/jerk-aware integrator. Set to false for the legacy length/feed-only estimator.
          type: boolean
        work_area:
          allOf:
          - $ref: '#/components/schemas/AxisLimits'
          description: Machine work area envelope in mm. Drives the stock's auto-mode fallback when no geometry is imported (the stock then sizes to the work-area XY footprint), and surfaces as the soft-limit reference in future sim warnings. Default 200×300×50 — a typical hobby gantry; users override in `MachineDialog`.
      required:
      - arcs
      - comments
      - mode
      - supports_toolchange
      - unit
      type: object
    MachineMode:
      enum:
      - mill
      - laser
      - drag
      type: string
    MillConfig:
      properties:
        active:
          type: boolean
        corner_feed_reduction:
          default: 0.0
          description: When > 0, slow the feedrate at sharp line-to-line corners by this fraction so the machine doesn't dwell on the corner with high accel demand. 0.0 = no reduction (current behavior). 0.5 = half the feed at corners. Most useful for zigzag pocket fills with their many 180° turns.
          format: double
          type: number
        depth:
          format: double
          type: number
        depth_list:
          default: []
          description: Explicit ordered list of Z depths to cut at. When non-empty, overrides the step / `finish_step` / `through_depth` schedule.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          format: double
          type: number
        finish_step:
          default: null
          description: Optional smaller step for the FINAL Z pass (cleaner bottom finish). None = use `step` for every pass.
          format: double
          type:
          - number
          - 'null'
        helix_mode:
          type: boolean
        objectorder:
          $ref: '#/components/schemas/ObjectOrder'
        offset:
          $ref: '#/components/schemas/ToolOffset'
        overcut:
          default: false
          description: When true, dip into sharp inner corners so the cutter fully clears them. Mirrors viaConstructor's `mill.overcut`.
          type: boolean
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          default:
            kind: direct
          description: How the cutter descends into material at the start of each Z pass. `Direct` is a straight plunge; `Ramp` walks the first `ramp_length` of the path while linearly descending Z so the cutter takes a chip in both Z and XY simultaneously.
        reverse:
          type: boolean
        start_depth:
          format: double
          type: number
        step:
          description: Per-pass z step (negative ⇒ down).
          format: double
          type: number
        through_depth:
          default: 0.0
          description: Cut past `depth` by this many mm (positive). Used for through-cuts on edge-clamped sheet.
          format: double
          type: number
      required:
      - active
      - depth
      - fast_move_z
      - helix_mode
      - objectorder
      - offset
      - reverse
      - start_depth
      - step
      type: object
    MoveKind:
      enum:
      - rapid
      - cut
      - plunge
      - retract
      - arc
      type: string
    ObjectOrder:
      enum:
      - nearest
      - per_object
      - unordered
      type: string
    Op:
      description: One operation in the project's program. Carries the kind-discriminator (which itself embeds the per-kind params via [`OpKind`]), the universal [`OpParamsCommon`] bag (depth schedule, plunge, feed overrides), tool refs, source selector, and that's it. Patterning is per-kind today (only `OpKind::Drill` carries it); add it to other variants if more kinds need patterning.
      properties:
        enabled:
          type: boolean
        finish_tool_id:
          description: Optional finish tool id for dual-tool Pocket ops (rt1.33 / Estlcam TS slot). When `Some(id)` and `id != tool_id`, the pipeline emits a toolchange after the rough cascade and runs the wall-defining ring with the finish tool's geometry + finish-set feed/speed. When `None` or equal to `tool_id`, the op runs single-tool (current behavior).
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/OpKind'
        name:
          type: string
        params:
          $ref: '#/components/schemas/OpParamsCommon'
        source:
          $ref: '#/components/schemas/OpSource'
        tool_id:
          description: id of a `Project.tools` entry. For dual-tool Pocket ops this is the roughing tool; the finish ring is cut by `finish_tool_id`.
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - enabled
      - id
      - kind
      - name
      - params
      - source
      - tool_id
      type: object
    OpKind:
      oneOf:
      - description: Contour cut — equivalent to today's "mill" with a parallel-offset pass at `offset` of the tool radius. Embedded `contour` and `profile` carry the per-kind params (kbx5 step 1); legacy payloads land them at default and the migration deserializer fills them from the flat `OpParams` bag.
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          offset:
            $ref: '#/components/schemas/ToolOffset'
          profile:
            allOf:
            - $ref: '#/components/schemas/ProfileParams'
            default:
              helix: false
              overcut: false
              reverse: false
          type:
            enum:
            - profile
            type: string
        required:
        - offset
        - type
        type: object
      - description: Pocket fill — cascade of inward offsets, optionally zigzag. Embeds `contour` (lead-in/out, cut direction, tabs) and `pocket` (xy overlap, islands, finish allowance, Pocket-Outside frame).
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          pocket:
            allOf:
            - $ref: '#/components/schemas/PocketParams'
            default:
              pocket_insideout: false
              pocket_islands: false
              pocket_nocontour: false
              xy_overlap: 0.0
          strategy:
            $ref: '#/components/schemas/PocketStrategy'
          type:
            enum:
            - pocket
            type: string
        required:
        - strategy
        - type
        type: object
      - description: Drill cycle — point or circle smaller than tool. Carries a [`DrillCycle`] that picks G81 / G83 / G73 (or the manual G0/G1 fallback for posts that don't support canned cycles). Also carries the Stufenfase post-drill chamfer width (rt1.20) and the optional pattern (kbx5 step 1 — Drill is the only kind patternable for now).
        properties:
          chamfer_after_width_mm:
            format: double
            type:
            - number
            - 'null'
          cycle:
            $ref: '#/components/schemas/DrillCycle'
          pattern:
            anyOf:
            - $ref: '#/components/schemas/PatternConfig'
            - type: 'null'
          type:
            enum:
            - drill
            type: string
        required:
        - cycle
        - type
        type: object
      - description: Helical thread — single-point cutter walks a helix inside a bore (internal) or around a stud (external). Z descends linearly by `pitch_mm` per revolution between `start_depth` and `depth`. The source must be a closed circle (single Circle / closed Arc loop); the helix radius derives from the circle's radius plus tool radius for internal threads, or minus tool radius for external. (rt1.17)
        properties:
          climb:
            default: false
            description: Climb (CCW helix on a right-hand spindle) vs conventional (CW). Default conventional. Surface quality on hobby rigs almost always favors conventional even for threading.
            type: boolean
          internal:
            default: true
            description: '`true` = internal (tap-style, cutter walks INSIDE the bore); `false` = external (cutter walks AROUND a stud).'
            type: boolean
          pitch_mm:
            default: 1.0
            description: Thread pitch in mm — Z descent per full revolution. Positive; defaults to 1.0 mm (M6 fine).
            format: double
            type: number
          type:
            enum:
            - thread
            type: string
        required:
        - type
        type: object
      - description: 'V-bit edge break (rt1.18). The cutter walks the source path itself at a single Z computed from the bit''s cone angle and the desired chamfer width: `z = -width_mm / tan(tip_angle / 2)`. One pass at that depth carves a beveled edge whose horizontal width on the workpiece equals `width_mm`. Optionally followed by a second pass at the tool''s finish-set feed/speed for surface quality. Default values for the variant fields keep legacy payloads (`{ "type": "chamfer" }`) backward-compatible.'
        properties:
          finish_pass:
            default: false
            description: When `true`, the chamfer is cut twice — once at the rough feed (cleanup) and once at the tool's finish-set feed (rt1.27) for surface quality. Default `false`.
            type: boolean
          type:
            enum:
            - chamfer
            type: string
          width_mm:
            default: 1.0
            description: Horizontal width of the chamfer cut on the workpiece, mm. Mirrors Estlcam's Fasenabstand. Positive; defaults to 1.0.
            format: double
            type: number
        required:
        - type
        type: object
      - description: Tool-on engraving — no offset, follows the source path. Carries `contour` params (leads / cut direction / approach point).
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          type:
            enum:
            - engrave
            type: string
        required:
        - type
        type: object
      - description: Drag-knife — emits trail-compensation moves. Carries `contour` params (mainly approach point + cut direction).
        properties:
          contour:
            allOf:
            - $ref: '#/components/schemas/ContourParams'
            default:
              leads:
                in: off
                in_lenght: 5.0
                out: off
                out_lenght: 5.0
              tabs:
                active: false
                height: 1.0
                tab_type: rectangle
                width: 10.0
          type:
            enum:
            - drag_knife
            type: string
        required:
        - type
        type: object
      - description: Helical entry into a closed contour. Reserved for future thread-mill style expansion; no params today.
        properties:
          type:
            enum:
            - helix
            type: string
        required:
        - type
        type: object
      - description: 'V-Carve: drives a V-bit along the medial axis of a closed region, with depth varying per point so the V''s tip dips deepest where the region is widest. The depth at each point is `z = -R_inscribed / tan(tip_angle / 2)` for the inscribed-circle radius `R_inscribed` at that point of the medial axis. Embeds the per-kind `VCarveParams` (`carve_max_width` cap, second-pass refine).'
        properties:
          carve:
            allOf:
            - $ref: '#/components/schemas/VCarveParams'
            default:
              multi_pass_refine: false
          type:
            enum:
            - v_carve
            type: string
        required:
        - type
        type: object
    OpParams:
      description: |-
        Universal per-op parameters — fields that apply to **every** op kind. Kind-specific config lives in the matching variant struct embedded in [`super::op::OpKind`]:

        - Closed-contour params (tabs, leads, cut direction, approach point, corner-feed) → [`ContourParams`] - Pocket cascade / islands / Pocket-Outside frame → [`PocketParams`] - Profile overcut / reverse / helix → [`ProfileParams`] - V-Carve cap / second-pass → [`VCarveParams`] - Drill Stufenfase chamfer width → [`super::op::OpKind::Drill`]

        (kbx5 step 3: the flat-junk-drawer `OpParams` was reduced to this common struct after readers and writers all moved to the variant structs.)
      properties:
        depth:
          description: Final cut depth (negative number — a depth, not a height).
          format: double
          type: number
        depth_list:
          description: Explicit list of Z depths for each pass, overriding the `step+finish_step` schedule. Useful for non-linear schedules (shallower at start for tough material, deeper later, slow finish at the end). Each entry is an absolute Z (negative number); the cutter visits them in order. Empty = use the step-down loop.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          description: Z for rapid moves between cuts.
          format: double
          type: number
        feed_rate_override:
          description: 'Override the tool''s `feed_rate` for this op only. Some materials or finishing passes need a slower feed than the tool''s default; rather than editing the tool library, set this per-op. None = use the tool''s `feed_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        finish_step:
          description: Optional smaller step for the FINAL Z pass, for a cleaner bottom finish. None = use the same `step` for the last pass too. Negative just like `step`.
          format: double
          type:
          - number
          - 'null'
        objectorder:
          allOf:
          - $ref: '#/components/schemas/ObjectOrder'
          default: nearest
          description: Cut-order strategy for multiple objects.
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          description: How the cutter descends into material at the start of each Z pass. Default Direct (straight plunge). Ramp { `angle_deg` } walks forward along the path while descending Z, taking a chip in both directions simultaneously — required for non-center-cutting bits and for harder materials.
        plunge_rate_override:
          description: 'Override the tool''s `plunge_rate` (Z feed) for this op. Useful for slowing the plunge on hard materials without changing the XY feed. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        start_depth:
          description: Z at which the first pass starts.
          format: double
          type: number
        step:
          description: Per-pass step (negative ⇒ down). None = inherit from `ToolEntry.default_step`. Legacy projects wrote a bare `0.0` to mean "unset"; the deserializer maps that to None.
          format: double
          type:
          - number
          - 'null'
        through_depth:
          description: Cut past the nominal `depth` by this much (positive number — gets subtracted from the working depth). Useful for through-cuts on edge-clamped sheet so the cutter clears the bottom even with minor stock thickness variation. 0.0 = no extension.
          format: double
          type: number
      required:
      - depth
      - fast_move_z
      - start_depth
      type: object
    OpParamsCommon:
      description: |-
        Universal per-op parameters — fields that apply to **every** op kind. Kind-specific config lives in the matching variant struct embedded in [`super::op::OpKind`]:

        - Closed-contour params (tabs, leads, cut direction, approach point, corner-feed) → [`ContourParams`] - Pocket cascade / islands / Pocket-Outside frame → [`PocketParams`] - Profile overcut / reverse / helix → [`ProfileParams`] - V-Carve cap / second-pass → [`VCarveParams`] - Drill Stufenfase chamfer width → [`super::op::OpKind::Drill`]

        (kbx5 step 3: the flat-junk-drawer `OpParams` was reduced to this common struct after readers and writers all moved to the variant structs.)
      properties:
        depth:
          description: Final cut depth (negative number — a depth, not a height).
          format: double
          type: number
        depth_list:
          description: Explicit list of Z depths for each pass, overriding the `step+finish_step` schedule. Useful for non-linear schedules (shallower at start for tough material, deeper later, slow finish at the end). Each entry is an absolute Z (negative number); the cutter visits them in order. Empty = use the step-down loop.
          items:
            format: double
            type: number
          type: array
        fast_move_z:
          description: Z for rapid moves between cuts.
          format: double
          type: number
        feed_rate_override:
          description: 'Override the tool''s `feed_rate` for this op only. Some materials or finishing passes need a slower feed than the tool''s default; rather than editing the tool library, set this per-op. None = use the tool''s `feed_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        finish_step:
          description: Optional smaller step for the FINAL Z pass, for a cleaner bottom finish. None = use the same `step` for the last pass too. Negative just like `step`.
          format: double
          type:
          - number
          - 'null'
        objectorder:
          allOf:
          - $ref: '#/components/schemas/ObjectOrder'
          default: nearest
          description: Cut-order strategy for multiple objects.
        plunge:
          allOf:
          - $ref: '#/components/schemas/PlungeStrategy'
          description: How the cutter descends into material at the start of each Z pass. Default Direct (straight plunge). Ramp { `angle_deg` } walks forward along the path while descending Z, taking a chip in both directions simultaneously — required for non-center-cutting bits and for harder materials.
        plunge_rate_override:
          description: 'Override the tool''s `plunge_rate` (Z feed) for this op. Useful for slowing the plunge on hard materials without changing the XY feed. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        start_depth:
          description: Z at which the first pass starts.
          format: double
          type: number
        step:
          description: Per-pass step (negative ⇒ down). None = inherit from `ToolEntry.default_step`. Legacy projects wrote a bare `0.0` to mean "unset"; the deserializer maps that to None.
          format: double
          type:
          - number
          - 'null'
        through_depth:
          description: Cut past the nominal `depth` by this much (positive number — gets subtracted from the working depth). Useful for through-cuts on edge-clamped sheet so the cutter clears the bottom even with minor stock thickness variation. 0.0 = no extension.
          format: double
          type: number
      required:
      - depth
      - fast_move_z
      - start_depth
      type: object
    OpSource:
      oneOf:
      - description: Run on every chain on the listed layer names.
        properties:
          combine:
            $ref: '#/components/schemas/SourceCombine'
          kind:
            enum:
            - layers
            type: string
          layers:
            items:
              type: string
            type: array
        required:
        - kind
        - layers
        type: object
      - description: Run on the listed chain ids only.
        properties:
          combine:
            $ref: '#/components/schemas/SourceCombine'
          ids:
            items:
              format: uint32
              minimum: 0.0
              type: integer
            type: array
          kind:
            enum:
            - objects
            type: string
        required:
        - ids
        - kind
        type: object
      - description: Run on every chained object in the project.
        properties:
          kind:
            enum:
            - all
            type: string
        required:
        - kind
        type: object
    PatternConfig:
      description: |-
        Pattern repetition for an [`Op`]. When attached, the pipeline expands the op into N instances by translating (or rotating) the source geometry per instance — useful for "drill the same hole pattern N times" or "pocket N copies of the same shape on a grid".

        The original geometry stays at the (0, 0) translation / 0° rotation instance so a single-instance pattern is identical to no pattern at all.
      oneOf:
      - description: 1D linear array. `count` instances total (including the original at offset (0, 0)). Each instance i is translated by (i*dx, i*dy).
        properties:
          count:
            format: uint32
            minimum: 0.0
            type: integer
          dx:
            format: double
            type: number
          dy:
            format: double
            type: number
          kind:
            enum:
            - linear
            type: string
        required:
        - count
        - dx
        - dy
        - kind
        type: object
      - description: 2D rectangular grid. `count_x × count_y` instances total. Instance (i, j) is translated by (i*dx, j*dy).
        properties:
          count_x:
            format: uint32
            minimum: 0.0
            type: integer
          count_y:
            format: uint32
            minimum: 0.0
            type: integer
          dx:
            format: double
            type: number
          dy:
            format: double
            type: number
          kind:
            enum:
            - grid
            type: string
        required:
        - count_x
        - count_y
        - dx
        - dy
        - kind
        type: object
      - description: Polar (rotational) array. `count` instances around (`center_x`, `center_y`), with `angle_step_deg` between consecutive instances. Instance i is rotated by `start_angle_deg + i * angle_step_deg` about the center — `start_angle_deg` shifts the whole ring so the first instance doesn't have to land at 0°.
        properties:
          angle_step_deg:
            format: double
            type: number
          center_x:
            format: double
            type: number
          center_y:
            format: double
            type: number
          count:
            format: uint32
            minimum: 0.0
            type: integer
          kind:
            enum:
            - polar
            type: string
          start_angle_deg:
            format: double
            type: number
        required:
        - angle_step_deg
        - center_x
        - center_y
        - count
        - kind
        type: object
    PipelineStats:
      properties:
        closed_object_count:
          format: uint
          minimum: 0.0
          type: integer
        object_count:
          format: uint
          minimum: 0.0
          type: integer
        offset_count:
          format: uint
          minimum: 0.0
          type: integer
      required:
      - closed_object_count
      - object_count
      - offset_count
      type: object
    PipelineWarning:
      description: One non-fatal warning attached to (optionally) a specific op.
      properties:
        kind:
          description: Stable identifier — frontend can branch on this to render an icon, link to docs, etc.
          type: string
        message:
          description: Human-readable description.
          type: string
        op_id:
          description: Op the warning applies to. `None` means project-wide.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
      required:
      - kind
      - message
      type: object
    PlungeStrategy:
      description: Per-pass entry strategy.
      oneOf:
      - description: Straight plunge — current behavior. Safe for end mills with center-cutting geometry on shallow steps; risky on harder materials or non-center-cutting bits.
        properties:
          kind:
            enum:
            - direct
            type: string
        required:
        - kind
        type: object
      - description: 'Linear ramp into the first cut: descend Z at `angle_deg` from the previous Z to the current pass Z while walking forward along the path. The horizontal distance traveled during the ramp is `step / tan(angle_deg)`. Falls back to Direct if the path is shorter than the required ramp.'
        properties:
          angle_deg:
            format: double
            type: number
          kind:
            enum:
            - ramp
            type: string
        required:
        - angle_deg
        - kind
        type: object
      - description: 'Helical descent: spiral down on a circle of `radius_mm` around a point inside the closed pocket boundary, descending Z at `angle_deg` per revolution. `radius_mm = None` ⇒ auto-fit to the largest inscribed circle inside the pocket boundary at gcode-emission time. Falls back to Ramp (and then Direct) when the helix circle can''t fit.'
        properties:
          angle_deg:
            format: double
            type: number
          kind:
            enum:
            - helix
            type: string
          radius_mm:
            format: double
            type:
            - number
            - 'null'
        required:
        - angle_deg
        - kind
        type: object
    PocketConfig:
      properties:
        active:
          type: boolean
        insideout:
          type: boolean
        islands:
          type: boolean
        nocontour:
          description: Skip the boundary contour pass (used by HATCH-equivalent layers).
          type: boolean
        zigzag:
          type: boolean
      required:
      - active
      - insideout
      - islands
      - nocontour
      - zigzag
      type: object
    PocketParams:
      description: Parameters specific to [`super::op::OpKind::Pocket`]. (kbx5 step 1.)
      properties:
        finish_xy_allowance_mm:
          description: XY stock allowance left uncut by roughing (rt1.24).
          format: double
          type:
          - number
          - 'null'
        frame_corner_radius_mm:
          description: Corner radius for `FrameShape::RoundedRectangle`.
          format: double
          type:
          - number
          - 'null'
        frame_padding_mm:
          description: Padding around the selection bbox to size the frame.
          format: double
          type:
          - number
          - 'null'
        frame_shape:
          anyOf:
          - $ref: '#/components/schemas/FrameShape'
          - type: 'null'
          description: Pocket-Outside wrapper shape. Set only on ops created via the Pocket-Outside UX.
        pocket_insideout:
          default: false
          description: Cascade outward-in instead of inward-out.
          type: boolean
        pocket_islands:
          default: false
          description: Treat inner contours as islands (don't cut them).
          type: boolean
        pocket_nocontour:
          default: false
          description: Skip the wall-defining ring (contour cut).
          type: boolean
        xy_overlap:
          default: 0.0
          description: XY overlap between consecutive pocket cuts (0..1). Stored at 0.0 means "use the default".
          format: double
          type: number
      type: object
    PocketStrategy:
      oneOf:
      - enum:
        - cascade
        - zigzag
        - spiral
        type: string
      - properties:
          engagement_angle_deg:
            format: double
            type: number
          kind:
            enum:
            - trochoidal
            type: string
          loop_radius_factor:
            format: double
            type: number
        required:
        - engagement_angle_deg
        - kind
        - loop_radius_factor
        type: object
      - properties:
          kind:
            enum:
            - halfpipe
            type: string
          profile:
            oneOf:
            - properties:
                kind:
                  enum:
                  - circular_arc
                  type: string
                radius_mm:
                  format: double
                  type: number
              required:
              - kind
              - radius_mm
              type: object
            - properties:
                included_angle_deg:
                  format: double
                  type: number
                kind:
                  enum:
                  - v_bottom
                  type: string
              required:
              - included_angle_deg
              - kind
              type: object
        required:
        - kind
        - profile
        type: object
    Point2:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
      required:
      - x
      - y
      type: object
    PolylineOffset:
      description: One concentric offset of a closed object — used for both the boundary pass and any inward pocket cascade rings.
      properties:
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        is_finish:
          description: When true, the gcode emitter swaps in the finish-set feed / speed / plunge rates (`ToolConfig::*_finish`) before cutting this offset. The pipeline tags the wall-defining level=0 ring of a Pocket op as finish; everything else stays at the rough rates.
          type: boolean
        is_pocket:
          description: 0 = boundary, 1 = zigzag fill stroke, 2 = pocket ring.
          format: uint8
          minimum: 0.0
          type: integer
        layer:
          type: string
        level:
          description: 0 = outer boundary, 1+ = pocket cascade inward.
          format: uint32
          minimum: 0.0
          type: integer
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        source_object_idx:
          format: uint
          minimum: 0.0
          type: integer
        tabs:
          description: Tab positions (data-space XY) the cutter should lift over while cutting this offset. Frontend places these via mtm.10; the gcode emitter splits the cut at each crossing and lifts Z to tabs.height.
          items:
            $ref: '#/components/schemas/TabPoint'
          type: array
      required:
      - closed
      - color
      - is_pocket
      - layer
      - level
      - segments
      - source_object_idx
      type: object
    Pose3:
      properties:
        x:
          format: double
          type: number
        y:
          format: double
          type: number
        z:
          format: double
          type: number
      required:
      - x
      - y
      - z
      type: object
    PostProcessorKind:
      enum:
      - linuxcnc
      - grbl
      - hpgl
      type: string
    PostProfile:
      description: A named bundle of override templates the user attaches to a machine config. Any field left at `None` keeps the built-in emitter's default behavior. The active variant of `PostProcessorKind` is unaffected — wiac's linuxcnc / grbl / hpgl emitters continue to drive line-level formatting (delta encoding, arc fitting, drill cycles). The profile only swaps the PROGRAM-LEVEL strings.
      properties:
        axes:
          anyOf:
          - $ref: '#/components/schemas/AxesConfig'
          - type: 'null'
          description: Per-axis output format (hev). When set, replaces the hard-coded `X{val} Y{val} Z{val}` / `I{val} J{val}` / `F{rate}` / `S{rpm}` emission with the user's axis names + printf-ish format + scale, with per-axis enable so disabled axes drop out entirely.
        coolant_flood_off:
          type:
          - string
          - 'null'
        coolant_flood_on:
          description: '`COOLANT_FLOOD` ON / OFF templates. Replace `M8` / `M9`.'
          type:
          - string
          - 'null'
        coolant_mist_off:
          type:
          - string
          - 'null'
        coolant_mist_on:
          description: '`COOLANT_MIST` ON / OFF templates. Replace `M7` / `M9`.'
          type:
          - string
          - 'null'
        file_extension:
          description: File extension for save-to-disk (no leading dot). Default `"nc"`. Mach3 commonly uses `"tap"`, GRBL stays `"nc"`.
          type:
          - string
          - 'null'
        line_ending:
          description: Line separator on save. None ⇒ `"\n"`. Set to `"\r\n"` for FANUC / vintage Windows-y controllers.
          type:
          - string
          - 'null'
        name:
          default: ''
          description: User-facing label. Shown in `MachineDialog`'s profile picker; not interpreted by the engine.
          type: string
        program_end:
          description: '`PROGRAM_END` template. Replaces the `M30` footer line.'
          type:
          - string
          - 'null'
        program_start:
          description: '`PROGRAM_START` template. Replaces the `(generated by …)` header line. Can contain multiple `\n`-separated lines via the `<NL>` token.'
          type:
          - string
          - 'null'
        tool_change:
          description: '`TOOL_CHANGE` template. Replaces the `T<n> M6` toolchange line. Substitution context exposes the FUTURE tool''s metadata.'
          type:
          - string
          - 'null'
      type: object
    ProfileParams:
      description: Parameters specific to [`super::op::OpKind::Profile`]. (kbx5 step 1.)
      properties:
        helix:
          default: false
          description: Helical descent inside a closed contour.
          type: boolean
        overcut:
          default: false
          description: Dip into sharp inner corners so the cutter clears the geometric corner. Only meaningful when the offset is non-zero.
          type: boolean
        reverse:
          default: false
          description: Reverse the cut direction (climb ↔ conventional).
          type: boolean
      type: object
    Project:
      properties:
        fixtures:
          description: 'Fixtures (clamps, dogs, vise jaws, hold-downs) the cutter must avoid throughout the entire program — including rapids. The sim pass tests every toolpath segment against this set and emits `SimWarning::FixtureCollision` on overlap. Default empty: a project with no fixtures behaves exactly as before.'
          items:
            $ref: '#/components/schemas/Fixture'
          type: array
        machine:
          $ref: '#/components/schemas/MachineConfig'
        operations:
          items:
            $ref: '#/components/schemas/Op'
          type: array
        segments:
          description: Imported geometry — the same `segments` the existing pipeline consumes. We keep it inline rather than referencing it by id so the project file is self-contained.
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        text_layers:
          description: First-class editable text entities — content / font / size / position / rotation / spacing. The pipeline pre-pass renders each `TextLayer` to segments before any op runs so the existing `Engrave` (and friends) op can target the rendered geometry by layer name `__text_<id>`. Edits to a `TextLayer` re-run the pipeline; cache keys include `text_layers` content.
          items:
            $ref: '#/components/schemas/TextLayer'
          type: array
        tools:
          items:
            $ref: '#/components/schemas/ToolEntry'
          type: array
      required:
      - machine
      - operations
      - segments
      - tools
      type: object
    RegionPreview:
      description: One filled region attached to a specific operation. `outer` is the outer boundary; `holes` are the islands the cutter must avoid. Both in project units (typically mm).
      properties:
        holes:
          items:
            items:
              $ref: '#/components/schemas/Point2'
            type: array
          type: array
        op_id:
          format: uint32
          minimum: 0.0
          type: integer
        outer:
          items:
            $ref: '#/components/schemas/Point2'
          type: array
      required:
      - op_id
      - outer
      type: object
    RenderTextLayerResponse:
      description: Live-preview response — the rendered `TextLayer` segments plus the cached single-line classification. The pipeline produces the same segments at Generate time; this endpoint lets the frontend show the text on the 2D canvas without round-tripping a full pipeline run.
      properties:
        family_name:
          type:
          - string
          - 'null'
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        single_line:
          type: boolean
      required:
      - segments
      - single_line
      type: object
    RenderTextRequest:
      description: Request payload for the cross-transport `/text` endpoint. The frontend hands us TTF bytes (uploaded by the user or pulled from `frontend/public/fonts/`) plus a string + placement parameters; we return flattened [`Segment`]s and a single-line / outline classification the dialog uses to drive the engraving warning chip.
      properties:
        color:
          default: 7
          format: int32
          type: integer
        font_bytes:
          description: The font file as bytes (TTF / OTF). Encoded as a JSON `Vec<u8>` (i.e. an array of byte values) so the contract works equally well over HTTP/Tauri/WASM without picking a base64 layer.
          items:
            format: uint8
            minimum: 0.0
            type: integer
          type: array
        height_mm:
          format: double
          type: number
        layer:
          default: TEXT
          type: string
        origin:
          $ref: '#/components/schemas/Point2'
        text:
          type: string
      required:
      - font_bytes
      - height_mm
      - origin
      - text
      type: object
    RenderTextResponse:
      description: Response payload — the rendered geometry plus metadata the dialog uses to warn the user when an outline font is paired with the Engraving style.
      properties:
        family_name:
          description: Family / style names (best-effort). Useful for showing what the user actually loaded next to the dropdown.
          type:
          - string
          - 'null'
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        single_line:
          description: True if the font is a single-line / engraving / Hershey-port style font. Drives the dialog's "use a single-line font" chip.
          type: boolean
      required:
      - segments
      - single_line
      type: object
    Segment:
      description: A flat LINE/ARC primitive. ARC geometry is encoded as the bulge between `start` and `end` (bulge = `tan(included_angle / 4)`).
      properties:
        bulge:
          default: 0.0
          format: double
          type: number
        center:
          anyOf:
          - $ref: '#/components/schemas/Point2'
          - type: 'null'
        color:
          default: 7
          format: int32
          type: integer
        end:
          $ref: '#/components/schemas/Point2'
        layer:
          default: '0'
          type: string
        start:
          $ref: '#/components/schemas/Point2'
        type:
          $ref: '#/components/schemas/SegmentKind'
      required:
      - end
      - start
      - type
      type: object
    SegmentKind:
      enum:
      - LINE
      - ARC
      - CIRCLE
      - POINT
      type: string
    Setup:
      properties:
        leads:
          $ref: '#/components/schemas/LeadsConfig'
        machine:
          $ref: '#/components/schemas/MachineConfig'
        mill:
          $ref: '#/components/schemas/MillConfig'
        pockets:
          $ref: '#/components/schemas/PocketConfig'
        tabs:
          $ref: '#/components/schemas/TabsConfig'
        tool:
          $ref: '#/components/schemas/ToolConfig'
      required:
      - leads
      - machine
      - mill
      - pockets
      - tabs
      - tool
      type: object
    SimDiagnostics:
      properties:
        warnings:
          items:
            $ref: '#/components/schemas/SimWarning'
          type: array
      required:
      - warnings
      type: object
    SimSeverity:
      enum:
      - critical
      - warning
      - info
      type: string
    SimWarning:
      oneOf:
      - properties:
          kind:
            enum:
            - rapid_through_material
            type: string
          rapid_pz:
            format: double
            type: number
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
          worst_cell_z:
            format: float
            type: number
          worst_x:
            format: double
            type: number
          worst_y:
            format: double
            type: number
        required:
        - kind
        - rapid_pz
        - segment_idx
        - worst_cell_z
        - worst_x
        - worst_y
        type: object
      - properties:
          fixture_id:
            format: uint32
            minimum: 0.0
            type: integer
          kind:
            enum:
            - fixture_collision
            type: string
          nearest_x:
            format: double
            type: number
          nearest_y:
            format: double
            type: number
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
        required:
        - fixture_id
        - kind
        - nearest_x
        - nearest_y
        - segment_idx
        type: object
      - properties:
          kind:
            enum:
            - holder_collision
            type: string
          required_clearance_mm:
            format: float
            type: number
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
          wall_z:
            format: float
            type: number
          worst_x:
            format: double
            type: number
          worst_y:
            format: double
            type: number
        required:
        - kind
        - required_clearance_mm
        - segment_idx
        - wall_z
        - worst_x
        - worst_y
        type: object
      - properties:
          engagement_pct:
            format: float
            type: number
          kind:
            enum:
            - engagement_overload
            type: string
          segment_idx:
            format: uint
            minimum: 0.0
            type: integer
        required:
        - engagement_pct
        - kind
        - segment_idx
        type: object
      - properties:
          count:
            format: uint
            minimum: 0.0
            type: integer
          first_segment_idx:
            format: uint
            minimum: 0.0
            type: integer
          kind:
            enum:
            - dragging_rapids
            type: string
        required:
        - count
        - first_segment_idx
        - kind
        type: object
    SourceCombine:
      description: How a multi-object source selection is combined into the region(s) the operation actually consumes. Default is `Auto` — containment-based, which gives the user "outer + inner = annulus" behavior with no extra thought. The other modes are clipper2-driven boolean ops; `None` keeps each selected object as its own boundary (the pre-combine behavior, surfaced for callers who really want it).
      oneOf:
      - description: 'Containment-aware: nested closed objects in the selection become islands of their outermost selected ancestor. Equivalent to today''s pipeline-level behavior (see pipeline.rs''s `selected_set` logic).'
        enum:
        - auto
        type: string
      - description: Boolean union of all selected closed polygons.
        enum:
        - union
        type: string
      - description: First selected polygon minus the union of the rest.
        enum:
        - difference
        type: string
      - description: Boolean intersection of all selected closed polygons.
        enum:
        - intersection
        type: string
      - description: Symmetric difference (xor) of all selected closed polygons.
        enum:
        - xor
        type: string
      - description: No combination — emit one boundary per selected object as-is. This is the pre-j7y behavior, kept for callers who explicitly want it.
        enum:
        - none
        type: string
    SourceSpan:
      properties:
        column:
          format: uint32
          minimum: 0.0
          type: integer
        file:
          type: string
        line:
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - column
      - file
      - line
      type: object
    TabPlacement:
      description: A user-placed tab anchored geometry-relative (rt1.10). The `object_id` is 1-based to match `OpSource::Objects::ids`; `t ∈ [0, 1)` is the arc-length parameter along the chained object's segments. `cam/tabs.rs::polyline_at_t` resolves the parameter to a world point at gcode-emission time, so the tab follows the geometry through transforms.
      properties:
        height_override_mm:
          description: Optional per-tab height override (mm). None ⇒ use `OpParams.tabs.height`.
          format: double
          type:
          - number
          - 'null'
        object_id:
          format: uint32
          minimum: 0.0
          type: integer
        t:
          format: double
          type: number
        width_override_mm:
          description: Optional per-tab width override (mm). None ⇒ use `OpParams.tabs.width`.
          format: double
          type:
          - number
          - 'null'
      required:
      - object_id
      - t
      type: object
    TabPlacementMode:
      description: How an op sources tab positions (rt1.10).
      oneOf:
      - description: No tabs emitted. Default — matches the pre-rt1.10 behavior of "user must opt in". Distinct from `TabsConfig.active` (which is the SHAPE config's active flag).
        properties:
          kind:
            enum:
            - off
            type: string
        required:
        - kind
        type: object
      - description: N tabs evenly spaced around each closed source contour. Open contours get tabs inset by 0.5/N to avoid endpoint placement.
        properties:
          count:
            format: uint32
            minimum: 0.0
            type: integer
          kind:
            enum:
            - auto
            type: string
        required:
        - count
        - kind
        type: object
      - description: Only user-placed `tab_placements`. Auto-spacing disabled.
        properties:
          kind:
            enum:
            - manual
            type: string
        required:
        - kind
        type: object
      - description: '`Auto { count: auto_count }` ∪ `tab_placements`. v1 makes no attempt to dedupe: auto positions ignore manual ones and vice versa.'
        properties:
          auto_count:
            format: uint32
            minimum: 0.0
            type: integer
          kind:
            enum:
            - mixed
            type: string
        required:
        - auto_count
        - kind
        type: object
    TabPoint:
      properties:
        height_override_mm:
          description: Per-tab height override (mm). When `Some`, the cutter lifts to `cut_z + override` over this tab instead of the op-level `setup.tabs.height`. None ⇒ inherit.
          format: double
          type:
          - number
          - 'null'
        width_override_mm:
          description: 'Per-tab width override (mm). When `Some`, this tab uses the override; when `None`, falls back to the op-level setup width (`setup.tabs.width`). Audit 3wv: was hashed into the cache key but never consumed by `emit_path_with_tabs` — toggling overrides produced identical output. Now drives the per-tab crossing radius + zone half-width.'
          format: double
          type:
          - number
          - 'null'
        x:
          format: double
          type: number
        y:
          format: double
          type: number
      required:
      - x
      - y
      type: object
    TabType:
      enum:
      - rectangle
      - ramp
      type: string
    TabsConfig:
      properties:
        active:
          type: boolean
        height:
          description: Z height the cutter lifts to over a tab (positive distance above the cut floor). The actual tab Z is `mill.depth + tabs.height`.
          format: double
          type: number
        ramp_angle_deg:
          description: Ramp angle in degrees, used only when `tab_type == Ramp`. The horizontal length of each ramp into / out of a tab is `tabs.height / tan(ramp_angle_deg)`. 30° gives a 1:√3 slope. Ignored for Rectangle tabs.
          format: double
          type: number
        tab_type:
          $ref: '#/components/schemas/TabType'
        width:
          format: double
          type: number
      required:
      - active
      - height
      - tab_type
      - width
      type: object
    TextAlignment:
      enum:
      - left
      - center
      - right
      type: string
    TextLayer:
      description: |-
        Persistent editable text entity. Phase 2 of the text-engraving rework: the pipeline renders these to segments at generate time so edits propagate to gcode without re-baking.

        Distinct from DXF TEXT/MTEXT entities currently parsed into `project.segments` as opaque polylines (phase 4 will route those through `TextLayer` too).
      properties:
        alignment:
          allOf:
          - $ref: '#/components/schemas/TextAlignment'
          default: left
        font_bytes:
          description: TTF/OTF font as a byte vector. JSON serialises as an array of integers — matches the [`crate::input::text::RenderTextRequest`] convention so the same transport-agnostic encoding applies.
          items:
            format: uint8
            minimum: 0.0
            type: integer
          type: array
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/TextLayerKind'
        letter_spacing_mm:
          default: 0.0
          description: Extra advance between glyphs in mm. `0.0` (default) = font's natural advance.
          format: double
          type: number
        line_spacing_mm:
          default: 0.0
          description: MTEXT line spacing in mm. Ignored when `kind == TextLayerKind::Text`. `0.0` (default) = ~1.2 × `size_mm`.
          format: double
          type: number
        name:
          description: Display name in the sidebar list.
          type: string
        origin:
          description: Anchor in stock XY (mm). Alignment offsets are applied relative to this point (see [`TextAlignment`]).
          items:
          - format: double
            type: number
          - format: double
            type: number
          maxItems: 2
          minItems: 2
          type: array
        rotation_deg:
          default: 0.0
          format: double
          type: number
        size_mm:
          format: double
          type: number
        text:
          description: Full string. For `Mtext`, lines are `\n`-separated.
          type: string
      required:
      - font_bytes
      - id
      - kind
      - name
      - origin
      - size_mm
      - text
      type: object
    TextLayerKind:
      enum:
      - TEXT
      - MTEXT
      type: string
    TimeEstimate:
      properties:
        arc_s:
          format: double
          type: number
        cut_s:
          format: double
          type: number
        plunge_s:
          format: double
          type: number
        rapid_s:
          format: double
          type: number
        retract_s:
          format: double
          type: number
        spindle_warmup_s:
          format: double
          type: number
        toolchange_s:
          format: double
          type: number
        total_s:
          format: double
          type: number
      required:
      - arc_s
      - cut_s
      - plunge_s
      - rapid_s
      - retract_s
      - spindle_warmup_s
      - toolchange_s
      - total_s
      type: object
    ToolConfig:
      properties:
        diameter:
          format: double
          type: number
        dragoff:
          description: Drag-knife offset (if present, otherwise None).
          format: double
          type:
          - number
          - 'null'
        flood:
          type: boolean
        mist:
          type: boolean
        name:
          default: ''
          description: User-facing tool name, for token substitution in post-profile templates (rt1.15 `<n>`). Empty by default.
          type: string
        number:
          format: uint32
          minimum: 0.0
          type: integer
        pause:
          description: Spindle warm-up pause in seconds.
          format: uint32
          minimum: 0.0
          type: integer
        pierce_sec:
          default: 0.0
          description: Laser pierce time (rt1.29) — seconds to dwell after laser-on before each plunge so the beam burns through stock. Resolved from `ToolEntry.laser_pierce_sec` at synth time; 0 = no pierce dwell.
          format: double
          type: number
        rate_h:
          description: Cutting feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        rate_h_finish:
          default: 0
          description: Resolved cutting feedrate for the finishing pass. mm/min.
          format: uint32
          minimum: 0.0
          type: integer
        rate_v:
          description: Plunge feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        rate_v_finish:
          default: 0
          description: Resolved plunge feedrate for the finishing pass. mm/min.
          format: uint32
          minimum: 0.0
          type: integer
        speed:
          format: uint32
          minimum: 0.0
          type: integer
        speed_finish:
          default: 0
          description: Resolved RPM for the finishing pass. Equal to `speed` unless the tool library carried a `speed_finish` override. The gcode emitter switches to these on level=0 rings of a Pocket op.
          format: uint32
          minimum: 0.0
          type: integer
        wirbeln_climb:
          default: true
          description: Wirbeln spiral rotation direction (climb = `true`, conventional = `false`). Resolved from the op's contour cut direction — matches Estlcam's `Einstellungen.Gleichlauf` flag.
          type: boolean
        wirbeln_osc:
          default: 0.0
          description: Wirbeln Z-wobble amplitude (mm). The overlay adds a `cos(3θ)·osc − osc` Z ripple between revolutions when > 0. Resolved from `ToolEntry.wirbeln_osc_mm`.
          format: double
          type: number
        wirbeln_radius:
          default: 0.0
          description: Wirbeln helical-overlay spiral radius (3e5). > 0 enables the `cos/sin` displacement on every cut move; 0 disables. Resolved from `ToolEntry.wirbeln_extra_width_mm / 2` at synth time when the tool is Wirbeln-tagged.
          format: double
          type: number
        wirbeln_stepover:
          default: 0.0
          description: Wirbeln stride along the toolpath per full spiral revolution (mm). Resolved from `ToolEntry.wirbeln_stepover_mm`, falling back to half the tool radius. Ignored when `wirbeln_radius` is 0.
          format: double
          type: number
      required:
      - diameter
      - flood
      - mist
      - number
      - pause
      - rate_h
      - rate_v
      - speed
      type: object
    ToolEntry:
      properties:
        coolant:
          $ref: '#/components/schemas/Coolant'
        corner_radius_mm:
          description: Bull-nose / radius-endmill corner radius (rt1.28). Honored only when `kind == BullNose`. The corner radius produces a fillet on the cut floor edge — relevant for sim cross-section (the sim envelope falls below `corner_radius_mm` of the nominal flat floor). mm, positive only.
          format: double
          type:
          - number
          - 'null'
        default_peck_step_mm:
          description: Default peck step (positive, mm) for `DrillCycle::Peck` / `ChipBreak` ops that don't set their own `peck_step_mm`. None = the op must specify its own.
          format: double
          type:
          - number
          - 'null'
        default_step:
          description: Default depth-per-pass (negative, mm). Operations using this tool inherit this when their own `step` is unset. None = no default.
          format: double
          type:
          - number
          - 'null'
        diameter:
          format: double
          type: number
        dragoff:
          description: Drag-knife trailing offset (None for everything else).
          format: double
          type:
          - number
          - 'null'
        feed_rate:
          description: Cutting feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        feed_rate_drill:
          description: 'Cutting feedrate override when this tool is used in a Drill op. None = inherit `feed_rate`. Units: mm/min. Only meaningful for posts that emit XY-traverse feed lines between drill points.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        feed_rate_finish:
          description: 'Cutting feedrate override for the finishing pass. None = inherit `feed_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        flute_length_mm:
          description: Length of cutting flutes (mm). None = treat entire tool as cutting.
          format: double
          type:
          - number
          - 'null'
        flutes:
          format: uint8
          minimum: 0.0
          type: integer
        holder:
          anyOf:
          - $ref: '#/components/schemas/HolderShape'
          - type: 'null'
          description: Holder geometry above the shank. None = no holder check.
        id:
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/ToolKind'
        laser_lead_in_mm:
          description: 'Laser lead-in distance (rt1.29 / Estlcam `T_Lead_In)`: mm of approach travel the head takes along the entry tangent before the cut starts, to reduce edge entry burn. Honored only when `kind == LaserBeam`. Wired into `LeadsConfig` at op synth time — the per-op lead-in field overrides this if set explicitly. None = no tool-level lead-in.'
          format: double
          type:
          - number
          - 'null'
        laser_pierce_sec:
          description: 'Laser pierce time (rt1.29 / Estlcam `T_Pierce_Time)`: seconds the beam dwells at the start point BEFORE the cut begins so it burns through thick stock. Honored only when `kind == LaserBeam`. The post emits a `G4 P<seconds>` after the laser-on before each plunge. None = no pierce dwell.'
          format: double
          type:
          - number
          - 'null'
        name:
          type: string
        pause:
          description: Spindle warm-up pause in seconds applied once per used tool by the time estimator. Mirrors `ToolConfig.pause`.
          format: uint32
          minimum: 0.0
          type: integer
        plunge_rate:
          description: Plunge feedrate (mm/min).
          format: uint32
          minimum: 0.0
          type: integer
        plunge_rate_drill:
          description: 'Plunge feedrate override when this tool is used in a Drill op. None = inherit `plunge_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        plunge_rate_finish:
          description: 'Plunge feedrate override for the finishing pass. None = inherit `plunge_rate`. Units: mm/min.'
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        shank_diameter_mm:
          description: Shank diameter (mm). None = same as `diameter` (parallel-shank bit).
          format: double
          type:
          - number
          - 'null'
        speed:
          format: uint32
          minimum: 0.0
          type: integer
        speed_drill:
          description: Spindle RPM override when this tool is used in a Drill op. None = inherit `speed`.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        speed_finish:
          description: Spindle RPM override for the finishing pass (the wall-defining level=0 ring of a Pocket). None = inherit `speed`. Hard-material finish quality usually wants a slower RPM than roughing.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        tip_angle_deg:
          default: 60.0
          description: V-bit full included tip angle in degrees (apex angle of the cone). Drives the V-Carve depth-from-width relationship `z = -R / tan(tip_angle / 2)`. Validated to (0, 180); defaults to 60° for the most common engraving V-bit.
          format: double
          type: number
        tip_diameter:
          description: V-bit tip diameter (None for endmill / ball nose / drag knife).
          format: double
          type:
          - number
          - 'null'
        tslot_neck_diameter_mm:
          description: T-slot / keyway cutter neck diameter (rt1.28). Honored only when `kind == TSlot`. The undercut cutter has a wide disk (`diameter`) at the tip and a narrow neck of this diameter above. mm, positive only.
          format: double
          type:
          - number
          - 'null'
        tslot_neck_length_mm:
          description: T-slot / keyway cutter neck length (rt1.28). Honored only when `kind == TSlot`. The vertical extent of the narrow neck above the disk. mm, positive only.
          format: double
          type:
          - number
          - 'null'
        wirbeln:
          description: 'Wirbeln (rt1.25 / Estlcam `T_Wirbeln)`: automatic chip-thinning. When `true`, Pocket ops using this tool clamp their effective `xy_step` down to `wirbeln_stepover_mm.unwrap_or(tool_radius / 2)` — the classic chip-thinning rule that bounds radial engagement at half-radius. Use for hard materials where the user wants fast cascade / spiral pockets but doesn''t want the cutter to overload at high-engagement points. Default `false`.'
          type: boolean
        wirbeln_extra_width_mm:
          description: 'Wirbeln extra-width (Estlcam `T_Wirbelzusatzbreite` / rt1.25 / 3e5). The *diameter* in mm by which the helical overlay widens the effective cut path: the cutter centerline scrolls on a small circle of radius `wirbeln_extra_width_mm / 2` around the cascade ring. Net cut width is `diameter + wirbeln_extra_width_mm`. None / 0 ⇒ overlay disabled even when `wirbeln == true` (which then falls back to a no-op — the v1 step clamp is gone in 3e5).'
          format: double
          type:
          - number
          - 'null'
        wirbeln_osc_mm:
          description: Wirbeln Z-wobble amplitude (Estlcam `T_Osc`, 3e5). When > 0, the spiral overlay adds a `cos(3·θ) · osc − osc` Z ripple so the cutter dips slightly below the cut plane between revolutions — improves chip evacuation on the wobbly cutters the feature targets. mm, positive only. None / 0 ⇒ flat (no Z motion added by the overlay).
          format: double
          type:
          - number
          - 'null'
        wirbeln_stepover_mm:
          description: Wirbeln stepover override (rt1.25). When `wirbeln` is `true`, this is the **stride along the toolpath per full revolution of the spiral overlay** — Estlcam's `T_Wirbel_Stepover`. mm, positive only. None = use the half-radius default. (3e5 made this the spiral stride; before 3e5 it was the cascade-step clamp, which was the "fake Wirbeln" v1 implementation.)
          format: double
          type:
          - number
          - 'null'
        z_shift_mm:
          description: Per-tool Z origin offset (rt1.30 / Estlcam `Z_Shift`). For machines without automatic tool-length probing — the user pre-measures each tool's tip Z relative to a reference tool and records the delta here (positive = sticks out further; negative = shorter). At toolchange / program-start the post emits a `G92 Z<shift>` that pins the new tool's tip at the same work-Z the reference tool used. mm. None = no shift.
          format: double
          type:
          - number
          - 'null'
      required:
      - coolant
      - diameter
      - feed_rate
      - flutes
      - id
      - kind
      - name
      - plunge_rate
      - speed
      type: object
    ToolKind:
      oneOf:
      - enum:
        - endmill
        - ball_nose
        - v_bit
        - engraver
        - drag_knife
        - drill
        type: string
      - description: Used for laser cutting / etching — no physical tool radius.
        enum:
        - laser_beam
        type: string
      - description: 'Bull-nose / radius-corner endmill (rt1.28): flat endmill with a rounded transition between the cylindrical wall and the flat floor. Cuts a fillet on the floor edge. `ToolEntry.corner_radius_mm` carries the radius.'
        enum:
        - bull_nose
        type: string
      - description: Compression / up-down spiral endmill (rt1.28 / Estlcam Obenunten). Cuts down on top half, up on bottom half — clean edges on both faces of sheet material. v1 treats it like an Endmill at the cutting algorithm; the variant is here so the tool library can label it accurately for the user.
        enum:
        - compression
        type: string
      - description: 'T-slot / keyway / undercut cutter (rt1.28): plunges vertically down a narrow neck, then a wider disk at the tip cuts the undercut slot. `ToolEntry.tslot_neck_diameter_mm` / `tslot_neck_length_mm` carry the neck geometry.'
        enum:
        - t_slot
        type: string
      - description: 'Form / profile cutter (rt1.28 / Estlcam Profil): bull-nose / cove / ogee / dovetail / custom — a profile bit with a fixed cross-section. v1 treats as an Endmill at the algorithm; the variant labels it.'
        enum:
        - form_profile
        type: string
    ToolOffset:
      enum:
      - none
      - outside
      - inside
      - on
      type: string
    ToolpathSegment:
      properties:
        from:
          $ref: '#/components/schemas/Pose3'
        gcode_line:
          default: 0
          description: 1-based line number in the source gcode that produced this move. 0 means "synthetic / unknown".
          format: uint32
          minimum: 0.0
          type: integer
        kind:
          $ref: '#/components/schemas/MoveKind'
        op_id:
          default: 0
          description: Op id from the per-op emitter. 0 = legacy / unstamped.
          format: uint32
          minimum: 0.0
          type: integer
        to:
          $ref: '#/components/schemas/Pose3'
      required:
      - from
      - kind
      - to
      type: object
    TransportKind:
      enum:
      - python-bridge
      - rust-server
      - tauri
      - wasm
      type: string
    UnitSystem:
      enum:
      - mm
      - inch
      type: string
    VCarveParams:
      description: Parameters specific to [`super::op::OpKind::VCarve`]. (kbx5 step 1.)
      properties:
        carve_max_width_mm:
          description: V-Carve cap on the inscribed-circle radius (mm). `None` = no cap.
          format: double
          type:
          - number
          - 'null'
        multi_pass_refine:
          default: false
          description: V-Carve "second-pass" toggle. When true, re-cuts only the points whose first pass fell short of the geometric target.
          type: boolean
      type: object
    VcObject:
      description: '`VcObject` analogue: a chain of segments grouped after `segments2objects`.'
      properties:
        closed:
          type: boolean
        color:
          format: int32
          type: integer
        inner_objects:
          description: IDs of objects fully contained by this one.
          items:
            format: uint
            minimum: 0.0
            type: integer
          type: array
        layer:
          type: string
        outer_objects:
          description: IDs of objects fully containing this one.
          items:
            format: uint
            minimum: 0.0
            type: integer
          type: array
        overwrite_offset:
          description: Per-object override of the tool-radius offset (None ⇒ tool diameter / 2).
          format: double
          type:
          - number
          - 'null'
        segments:
          items:
            $ref: '#/components/schemas/Segment'
          type: array
        setup:
          allOf:
          - $ref: '#/components/schemas/Setup'
          description: Per-object setup overrides (mill depth, leads, tabs, …).
        start:
          anyOf:
          - $ref: '#/components/schemas/Point2'
          - type: 'null'
          description: Optional starting point for cut-order seeding.
        tool_offset:
          allOf:
          - $ref: '#/components/schemas/ToolOffset'
          description: '"outside" / "inside" / "none" — see `setup::ToolOffset`.'
      required:
      - closed
      - color
      - inner_objects
      - layer
      - outer_objects
      - segments
      - setup
      - tool_offset
      type: object
    VersionResponse:
      properties:
        capabilities:
          items:
            type: string
          type: array
        transport:
          $ref: '#/components/schemas/TransportKind'
        version:
          type: string
      required:
      - capabilities
      - transport
      - version
      type: object
    WiacAutoFix:
      oneOf:
      - properties:
          kind:
            enum:
            - assign_tool
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested_tool_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        - suggested_tool_id
        type: object
      - properties:
          kind:
            enum:
            - lower_sim_resolution
            type: string
          suggested_cell_mm:
            format: double
            type: number
        required:
        - kind
        - suggested_cell_mm
        type: object
      - properties:
          kind:
            enum:
            - disable_op
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
        required:
        - kind
        - op_id
        type: object
      - properties:
          kind:
            enum:
            - change_profile_offset
            type: string
          op_id:
            format: uint32
            minimum: 0.0
            type: integer
          suggested:
            $ref: '#/components/schemas/ToolOffset'
        required:
        - kind
        - op_id
        - suggested
        type: object
    WiacError:
      properties:
        auto_fix:
          anyOf:
          - $ref: '#/components/schemas/AutoFix'
          - type: 'null'
        kind:
          $ref: '#/components/schemas/ErrorKind'
        message:
          type: string
        recovery_hint:
          type:
          - string
          - 'null'
        span:
          anyOf:
          - $ref: '#/components/schemas/SourceSpan'
          - type: 'null'
      required:
      - kind
      - message
      type: object
    WiacErrorKind:
      enum:
      - bad_input
      - misconfigured
      - limit
      - unsupported
      - io
      - internal
      type: string
    WiacSourceSpan:
      properties:
        column:
          format: uint32
          minimum: 0.0
          type: integer
        file:
          type: string
        line:
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - column
      - file
      - line
      type: object
  responses:
    BadRequest:
      description: Malformed input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Could not parse content
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
